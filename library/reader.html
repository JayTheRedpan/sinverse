<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../_shared/agegate.js?v=1780259511"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reader — Sinverse Library</title>
  <!-- Social preview (Open Graph / Discord / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Sinverse" />
  <meta property="og:title" content="Sinverse" />
  <meta property="og:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta property="og:image" content="https://sinverse.net/images/logo.png" />
  <meta property="og:image:width" content="598" />
  <meta property="og:image:height" content="598" />
  <meta property="og:url" content="https://sinverse.net/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sinverse" />
  <meta name="twitter:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta name="twitter:image" content="https://sinverse.net/images/logo.png" />
  <meta name="theme-color" content="#c49a78" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css?v=1780204503" />
  <link rel="stylesheet" href="styles.css?v=1780283081" />
</head>
<body class="reader-body">

  <!-- Top bar -->
  <div class="reader-topbar">
    <a id="reader-back" href="index.html" class="btn-ghost reader-back-btn">&#8592; Library</a>
    <span id="reader-topbar-title" class="reader-topbar-title"></span>
    <div class="reader-reading-controls">
      <div class="reader-ctrl-group" title="Font size">
        <button id="font-dec" class="reader-ctrl-btn" aria-label="Decrease font size">A&#8722;</button>
        <button id="font-inc" class="reader-ctrl-btn" aria-label="Increase font size">A&#43;</button>
      </div>
      <div class="reader-ctrl-group" title="Line spacing">
        <button id="lh-dec" class="reader-ctrl-btn" aria-label="Decrease line spacing">&#8801;</button>
        <button id="lh-inc" class="reader-ctrl-btn" aria-label="Increase line spacing">&#8803;</button>
      </div>
    </div>
    <div class="reader-topbar-progress"><div id="reader-topbar-progress-fill" class="reader-topbar-progress-fill"></div></div>
  </div>

  <!-- Chapter nav for serials -->
  <div id="chapter-nav" class="chapter-nav" style="display:none">
    <div class="chapter-nav-inner">
      <span class="chapter-nav-label">Chapters</span>
      <div id="chapter-list" class="chapter-list"></div>
    </div>
  </div>

  <!-- Reader layout -->
  <div class="reader-layout">

    <!-- Sidebar -->
    <aside class="reader-sidebar">
      <div class="reader-meta-block">
        <h1 id="reader-title" class="reader-title"></h1>
        <span id="reader-canonical" class="reader-canonical-badge" style="display:none">&#10022; Canonical</span>
        <p id="reader-author" class="reader-author"></p>
        <div id="reader-tags" class="reader-tags"></div>
        <p id="reader-summary" class="reader-summary"></p>
        <div id="reader-wordcount" class="reader-wordcount"></div>
        <div id="reader-dates" class="reader-dates"></div>
      </div>

      <!-- Chapter list for serials (sidebar version) -->
      <div id="reader-chapters" class="reader-chapters" style="display:none">
        <div class="reader-chapters-label">Chapters</div>
        <div id="reader-chapter-list" class="reader-chapter-list"></div>
      </div>

      <!-- Reading progress -->
      <div class="reader-progress-wrap" id="reader-progress-wrap" style="display:none">
        <div class="reader-progress-label">Reading progress</div>
        <div class="reader-progress-bar">
          <div class="reader-progress-fill" id="reader-progress-fill"></div>
        </div>
        <span class="reader-progress-pct" id="reader-progress-pct">0%</span>
      </div>
    </aside>

    <!-- Story content -->
    <main class="reader-main">
      <!-- Serial chapter header -->
      <div id="reader-chapter-header" class="reader-chapter-header" style="display:none">
        <span id="reader-chapter-title" class="reader-chapter-title"></span>
      </div>

      <div id="reader-content" class="reader-content">
        <div class="loading-placeholder">Loading story...</div>
      </div>

      <!-- Chapter navigation for serials -->
      <div id="reader-chapter-nav" class="reader-chapter-nav" style="display:none">
        <button id="prev-chapter" class="btn-ghost chapter-nav-btn">&#8592; Previous chapter</button>
        <span id="chapter-counter" class="chapter-counter"></span>
        <button id="next-chapter" class="btn-ghost chapter-nav-btn">Next chapter &#8594;</button>
      </div>

      <!-- End of story -->
      <div id="reader-end" class="reader-end" style="display:none">
        <div class="reader-end-ornament">&#8212; &#10022; &#8212;</div>
        <div class="reader-end-label">The End</div>
        <a href="index.html" class="btn-ghost">Back to library</a>
      </div>
    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="../_shared/dates.js?v=1780107972"></script>
  <script src="reader.js?v=1780260512"></script>

<script src="../_shared/nav.js?v=1780201284"></script>
<script>initNav('library');</script>
</body>
</html>
