<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../_shared/agegate.js?v=1780259511"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — Sinverse</title>
  <!-- Social preview (Open Graph / Discord / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Sinverse" />
  <meta property="og:title" content="Sinverse" />
  <meta property="og:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta property="og:image" content="https://sinverse.net/images/logo.png" />
  <meta property="og:image:width" content="598" />
  <meta property="og:image:height" content="598" />
  <meta property="og:url" content="https://sinverse.net/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sinverse" />
  <meta name="twitter:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta name="twitter:image" content="https://sinverse.net/images/logo.png" />
  <meta name="theme-color" content="#c49a78" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="apple-touch-icon" href="../apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css?v=1780202227" />
  <link rel="stylesheet" href="styles.css?v=1780425222" />
</head>
<body>

  <header class="lib-header">
    <div class="lib-brand">
      <div class="lib-title-block">
        <h1 class="lib-title">Library</h1>
        <span class="lib-eyebrow">Complete Stories</span>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <div class="lib-controls">
    <div class="lib-search-row">
      <input id="search-input" class="search-input" type="text" placeholder="Search…" />
      <button id="search-clear-btn" class="search-clear-btn" title="Clear search and reset filters">✕ Clear</button>
      <button id="filter-toggle-btn" class="filter-toggle-btn" title="Show/hide filters">Filters ▾</button>
    </div>
    <div id="filter-panel" class="filter-panel">
      <div class="filter-row" id="story-controls">
        <div class="filter-group">
          <span class="filter-group-label">Search</span>
          <div class="search-mode-toggles">
            <button class="search-mode-btn active" data-mode="title"     title="Search titles">Title</button>
            <button class="search-mode-btn active" data-mode="author"    title="Search authors">Author</button>
            <button class="search-mode-btn active" data-mode="character" title="Search characters">Character</button>
          </div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-group-label">Type</span>
          <div class="filter-btns" id="type-filters">
            <button class="type-toggle-btn active" data-type="standalone">Stories</button>
            <button class="type-toggle-btn active" data-type="serial">Serials</button>
          </div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <span class="filter-group-label">Canon</span>
          <div class="filter-btns">
            <button id="canon-filter-btn" class="type-toggle-btn" data-canon="on" title="Show only canonical works">&#10022; Canonical only</button>
          </div>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group filter-group-tags">
          <span class="filter-group-label">Tags</span>
          <div class="tag-controls">
            <div class="tag-mode-toggle" id="tag-mode-toggle" role="group" aria-label="Tag filter mode">
              <button class="tag-mode-btn active" data-mode="exclude">Hide these</button>
              <button class="tag-mode-btn" data-mode="include">Show only these</button>
            </div>
            <div class="tag-bulk">
              <button id="tag-select-all" class="tag-bulk-btn">Select all</button>
              <button id="tag-select-none" class="tag-bulk-btn">Clear</button>
            </div>
          </div>
          <div class="tag-mode-hint" id="tag-mode-hint"></div>
          <div id="tag-filters" class="tag-filter-row"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="results-bar">
    <span id="results-count" class="results-count"></span>
    <span class="canon-legend"><span class="canon-legend-star">&#10022;</span> marks canon works</span>
    <div class="results-sort">
      <label class="results-sort-label" for="sort-select">Sort:</label>
      <select id="sort-select" class="sort-select-inline">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title">Title A–Z</option>
        <option value="author">Author A–Z</option>
        <option value="wordcount">Word count</option>
      </select>
    </div>
    <div class="view-toggle" id="story-view-toggle">
      <button id="view-list-btn" class="view-toggle-btn" title="List view">&#9776; List</button>
      <button id="view-grid-btn" class="view-toggle-btn active" title="Grid view">&#9783; Grid</button>
    </div>
    <div class="view-toggle" id="content-toggle">
      <button id="tab-stories" class="view-toggle-btn active">Stories</button>
      <button id="tab-collections" class="view-toggle-btn">Collections</button>
    </div>
  </div>
  <div id="lib-grid" class="lib-grid">
    <div class="loading-placeholder">Loading library...</div>
  </div>

  <footer class="lib-footer">
    <a href="../" class="footer-home-link">&#8592; Sinverse Home</a>
    <span class="footer-sep">&middot;</span>
    <span id="lib-count" class="lib-count"></span>
    <span class="footer-sep">&middot;</span>
  </footer>

  <!-- Collection overlay -->
  <div id="collection-panel" class="collection-panel" style="display:none">
    <div class="collection-panel-inner">
      <button id="collection-close" class="btn-ghost collection-close-btn">&#8592; Back to collections</button>
      <div id="collection-header" class="collection-header"></div>
      <div id="collection-stories" class="collection-stories"></div>
    </div>
  </div>

  <script src="library.js?v=1780425222"></script>

<script src="../_shared/nav.js?v=1780201284"></script>
<script>initNav('library');</script>
</body>
</html>
