<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Size Reference — Sinverse</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="sr-app">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside class="sr-sidebar">
    <div class="sr-sidebar-header">
      <a href="../"><img src="../images/logo.png" alt="Sinverse" class="sr-logo" /></a>
      <div>
        <div class="sr-title">Size Reference</div>
        <div class="sr-eyebrow">Character Scale Comparison</div>
      </div>
    </div>

    <div class="sr-tabs">
      <button class="sr-tab active" data-tab="compare">Compare</button>
      <button class="sr-tab" data-tab="custom1">Custom 1</button>
      <button class="sr-tab" data-tab="custom2">Custom 2</button>
    </div>

    <!-- Compare panel -->
    <div id="tab-compare" class="sr-tab-panel">

      <div class="sr-section">
        <div class="sr-section-label">Characters</div>
        <div id="sr-char-slots"></div>
        <button id="btn-add-slot" class="slot-add-btn">+ Add character</button>
      </div>
      <div class="sr-section">
        <div class="sr-section-label">Scale object</div>
        <select id="sel-obj" class="sr-select"></select>
      </div>
    </div>

    <!-- Custom 1 panel -->
    <div id="tab-custom1" class="sr-tab-panel" style="display:none">
      <div class="custom-header">
        <span class="custom-header-title">Custom Character 1</span>
        <button class="custom-clear-btn" data-slot="1">Clear</button>
      </div>
      <div id="custom1-form" class="custom-form"></div>
    </div>

    <!-- Custom 2 panel -->
    <div id="tab-custom2" class="sr-tab-panel" style="display:none">
      <div class="custom-header">
        <span class="custom-header-title">Custom Character 2</span>
        <button class="custom-clear-btn" data-slot="2">Clear</button>
      </div>
      <div id="custom2-form" class="custom-form"></div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────── -->
  <main class="sr-main">

    <div class="sr-toolbar">
      <div class="unit-toggle-toolbar">
        <button id="btn-imperial" class="unit-btn active">Imperial</button>
        <button id="btn-metric" class="unit-btn">Metric</button>
      </div>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="zoom-btn">&#8722;</button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button id="btn-zoom-in"  class="zoom-btn">&#43;</button>
        <button id="btn-zoom-reset" class="zoom-btn zoom-reset-btn">Reset</button>
      </div>
    </div>

    <!-- Canvas area: ruler + scroll -->
    <div class="sr-canvas-area" id="sr-canvas-area">

      <!-- Ruler column: separate from zoom -->
      <div class="sr-ruler-col" id="sr-ruler-col">
        <div class="sr-ruler-inner" id="sr-ruler-inner"></div>
      </div>

      <!-- Scroll area: figures zoom here -->
      <div class="sr-scroll" id="sr-scroll">
        <div id="sr-empty" class="sr-empty">Select at least one character to begin</div>
        <div id="sr-scene" class="sr-scene" style="display:none">
          <!-- This div is zoom-scaled -->
          <div id="sr-zoom" class="sr-zoom">
            <div id="sr-figures" class="sr-figures"></div>
            <div class="sr-ground"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Stat blocks -->
    <div id="sr-stats" class="sr-stats"></div>

  </main>
</div>

<script src="../_shared/registry.js"></script>
<script src="sizeref.js"></script>
</body>
</html>
