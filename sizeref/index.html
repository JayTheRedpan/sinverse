<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../_shared/agegate.js?v=1780259511"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Size Reference — Sinverse</title>
  <!-- Social preview (Open Graph / Discord / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Sinverse" />
  <meta property="og:title" content="Sinverse" />
  <meta property="og:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta property="og:image" content="https://sinverse.net/images/logo.png" />
  <meta property="og:image:width" content="598" />
  <meta property="og:image:height" content="598" />
  <meta property="og:url" content="https://sinverse.net/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sinverse" />
  <meta name="twitter:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta name="twitter:image" content="https://sinverse.net/images/logo.png" />
  <meta name="theme-color" content="#c49a78" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css?v=1780202227" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="sr-app">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside class="sr-sidebar">
    <div class="sr-sidebar-header">
      <div>
        <div class="sr-title">Size Reference</div>
        <div class="sr-eyebrow">Character Scale Comparison</div>
      </div>
    </div>

    <div class="sr-tabs">
      <button class="sr-tab active" data-tab="compare">Compare</button>
      <button class="sr-tab" data-tab="mychars">My Characters</button>
    </div>

    <!-- Compare panel -->
    <div id="tab-compare" class="sr-tab-panel">
      <div class="sr-section">
        <div class="sr-section-label">Characters &amp; Objects</div>
        <div class="sr-list-hint">Higher in list = closer to front in sandbox</div>
        <div id="sr-char-slots"></div>
        <div class="slot-add-row">
          <button id="btn-add-char" class="slot-add-btn">+ Add character</button>
          <button id="btn-add-obj"  class="slot-add-btn">+ Add object</button>
        </div>
      </div>
    </div>

    <!-- My Characters panel -->
    <div id="tab-mychars" class="sr-tab-panel" style="display:none">
      <div class="mychars-header">
        <span class="mychars-title">My Characters</span>
        <span class="mychars-count" id="mychars-count">0 / 8</span>
      </div>
      <div id="mychars-roster" class="mychars-roster"></div>
      <div class="mychars-add-row">
        <button id="mychars-add-btn" class="mychars-add-btn">+ New Character</button>
        <button id="mychars-import-btn" class="mychars-import-btn" title="Load a character someone shared with you">&#8681; Import character</button>
        <input id="mychars-import-file" type="file" accept="application/json,.json" style="display:none" />
      </div>
    </div>

    <!-- Custom char edit modal -->
    <div id="custom-modal" class="custom-modal-overlay" style="display:none">
      <div class="custom-modal-box">
        <div class="custom-modal-topbar">
          <span class="custom-modal-title" id="custom-modal-title">New Character</span>
          <button class="custom-modal-close" id="custom-modal-close">&#10005;</button>
        </div>
        <div id="custom-modal-form" class="custom-form custom-modal-form"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────── -->
  <main class="sr-main">

    <!-- View tabs -->
    <div class="sr-view-tabs">
      <button class="sr-view-tab active" data-view="height">Height</button>
      <button class="sr-view-tab" data-view="length">Length</button>
      <button class="sr-view-tab" data-view="stats">Stats</button>
    </div>

    <!-- Shared toolbar -->
    <div class="sr-toolbar">
      <div class="unit-toggle-toolbar">
        <button id="btn-imperial" class="unit-btn active">Imperial</button>
        <button id="btn-metric" class="unit-btn">Metric</button>
      </div>
      <button id="btn-grid-lines" class="unit-btn sr-grid-btn" title="Toggle scale grid lines">Grid</button>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="zoom-btn">&#8722;</button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button id="btn-zoom-in"  class="zoom-btn">&#43;</button>
        <button id="btn-zoom-reset" class="zoom-btn zoom-reset-btn">Reset</button>
      </div>
    </div>

    <!-- ── Height view ─────────────────────────── -->
    <div id="view-height" class="sr-view">
      <div class="sr-canvas-area" id="sr-canvas-area">
        <div id="sr-ruler-svg-wrap" style="display:none;position:absolute;inset:0;z-index:50;pointer-events:none;">
          <svg id="sr-ruler-svg" width="100%" height="100%" style="position:absolute;inset:0;">
            <line id="ruler-line" stroke="#e03030" stroke-width="2.5" stroke-dasharray="8,5" x1="0" y1="0" x2="0" y2="0"/>
            <circle id="ruler-dot-a" r="9" fill="#e03030" stroke="white" stroke-width="2" style="cursor:grab;pointer-events:all"/>
            <circle id="ruler-dot-b" r="9" fill="#e03030" stroke="white" stroke-width="2" style="cursor:grab;pointer-events:all"/>
            <text id="ruler-label" dominant-baseline="middle" text-anchor="middle" font-size="13" font-family="monospace" fill="white" paint-order="stroke" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"></text>
          </svg>
        </div>
        <div class="sr-ruler-col" id="sr-ruler-col">
          <div class="sr-ruler-inner" id="sr-ruler-inner"></div>
        </div>
        <div class="sr-scroll" id="sr-scroll">
          <div id="sr-empty" class="sr-empty">Select at least one character to begin</div>
          <div id="sr-scene" class="sr-scene" style="display:none">
            <div id="sr-zoom" class="sr-zoom">
              <div id="sr-figures" class="sr-figures"></div>
              <div class="sr-ground"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="sr-copy-bar">
        <div class="sr-copy-bar-left">
          <button id="btn-sandbox" class="sandbox-btn">Sandbox: Off</button>
          <button id="btn-ruler" class="sandbox-btn">Ruler: Off</button>
        </div>
        <div class="sr-copy-bar-right">
          <button id="btn-copy-img" class="copy-img-btn" title="Copy viewer to clipboard">&#128203; Copy image</button>
          <button id="btn-copy-scale" class="copy-scale-btn" title="Include scale in copy">&#128207;</button>
        </div>
      </div>
      <div id="sr-stats" class="sr-stats"></div>
    </div>

    <!-- ── Length view ─────────────────────────── -->
    <div id="view-length" class="sr-view" style="display:none">
      <div class="sr-length-area" id="sr-length-area">
        <div class="sr-length-scroll" id="sr-length-scroll">
          <div id="sr-length-empty" class="sr-empty">Select characters with anatomy data to compare</div>
          <div id="sr-length-zoom" class="sr-length-zoom">
              <div id="sr-length-grid-overlay" class="sr-grid-overlay sr-length-grid-overlay"></div>
            <div id="sr-length-rows" class="sr-length-rows"></div>
          </div>
        </div>
        <div class="sr-length-ruler-wrap" id="sr-length-ruler-wrap">
          <div class="sr-headshot-spacer"></div>
          <div class="sr-length-ruler" id="sr-length-ruler"></div>
        </div>
      </div>
      <div id="sr-length-stats" class="sr-stats"></div>
    </div>

    <!-- ── Stats view ──────────────────────────── -->
    <div id="view-stats" class="sr-view" style="display:none"></div>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../_shared/registry.js"></script>
<script src="../_shared/images.js?v=1780172445"></script>
<script src="sizeref.js?v=1780371884"></script>

<!-- ── Resize popup backdrop ──────────────────── -->
<div id="sr-resize-backdrop" class="sr-resize-backdrop"></div>

<!-- ── Character picker modal ─────────────────── -->
<div id="char-modal-overlay" class="char-modal-overlay" style="display:none">
  <div class="char-modal">
    <div class="char-modal-header">
      <div class="char-modal-title">Select Character</div>
      <input id="char-modal-search" class="char-modal-search" type="text" placeholder="Search…" autocomplete="off" />
      <button id="char-modal-close" class="char-modal-close" title="Close">&#10005;</button>
    </div>
    <div class="char-modal-sortbar">
      <span class="char-modal-sort-label">Sort</span>
      <button class="char-modal-sort-btn" data-sort="name" title="Sort A–Z">Name</button>
      <button class="char-modal-sort-btn" data-sort="height-desc" title="Tallest first">Height &#9660;</button>
      <button class="char-modal-sort-btn" data-sort="height-asc" title="Shortest first">Height &#9650;</button>
    </div>
    <div id="char-modal-grid" class="char-modal-grid"></div>
  </div>
</div>

    <!-- Object picker modal -->
    <div id="obj-modal-overlay" class="char-modal-overlay" style="display:none">
      <div class="char-modal">
        <div class="char-modal-header">
          <div class="char-modal-title">Select Object</div>
          <input id="obj-modal-search" class="char-modal-search" type="text" placeholder="Search…" autocomplete="off" />
          <button id="obj-modal-close" class="char-modal-close" title="Close">&#10005;</button>
        </div>
        <div id="obj-modal-grid" class="char-modal-grid obj-modal-grid"></div>
      </div>
    </div>


<script src="../_shared/nav.js?v=1780201284"></script>
<script>initNav('sizeref');</script>
</body>
</html>
