<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Size Reference — Sinverse</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="sr-app">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside class="sr-sidebar">
    <div class="sr-sidebar-header">
      <a href="../"><img src="../images/logo.png" alt="Sinverse" class="sr-logo" /></a>
      <div>
        <div class="sr-title">Size Reference</div>
        <div class="sr-eyebrow">Character Scale Comparison</div>
      </div>
    </div>

    <div class="sr-tabs">
      <button class="sr-tab active" data-tab="compare">Compare</button>
      <button class="sr-tab" data-tab="custom1">Custom 1</button>
      <button class="sr-tab" data-tab="custom2">Custom 2</button>
    </div>

    <!-- Compare panel -->
    <div id="tab-compare" class="sr-tab-panel">
      <div class="sr-section">
        <div class="sr-section-label">Characters &amp; Objects</div>
        <div id="sr-char-slots"></div>
        <div class="slot-add-row">
          <button id="btn-add-char" class="slot-add-btn">+ Add character</button>
          <button id="btn-add-obj"  class="slot-add-btn">+ Add object</button>
        </div>
      </div>
    </div>

    <!-- Custom 1 panel -->
    <div id="tab-custom1" class="sr-tab-panel" style="display:none">
      <div class="custom-header">
        <span class="custom-header-title">Custom Character 1</span>
        <button class="custom-clear-btn" data-slot="1">Clear</button>
      </div>
      <div id="custom1-form" class="custom-form"></div>
    </div>

    <!-- Custom 2 panel -->
    <div id="tab-custom2" class="sr-tab-panel" style="display:none">
      <div class="custom-header">
        <span class="custom-header-title">Custom Character 2</span>
        <button class="custom-clear-btn" data-slot="2">Clear</button>
      </div>
      <div id="custom2-form" class="custom-form"></div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────── -->
  <main class="sr-main">

    <!-- View tabs -->
    <div class="sr-view-tabs">
      <button class="sr-view-tab active" data-view="height">Height</button>
      <button class="sr-view-tab" data-view="length">Length</button>
      <button class="sr-view-tab" data-view="stats">Stats</button>
    </div>

    <!-- Shared toolbar -->
    <div class="sr-toolbar">
      <div class="unit-toggle-toolbar">
        <button id="btn-imperial" class="unit-btn active">Imperial</button>
        <button id="btn-metric" class="unit-btn">Metric</button>
      </div>
      <button id="btn-grid-lines" class="unit-btn sr-grid-btn" title="Toggle scale grid lines">Grid</button>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="zoom-btn">&#8722;</button>
        <span id="zoom-label" class="zoom-label">100%</span>
        <button id="btn-zoom-in"  class="zoom-btn">&#43;</button>
        <button id="btn-zoom-reset" class="zoom-btn zoom-reset-btn">Reset</button>
        <button id="btn-copy-img" class="zoom-btn zoom-reset-btn" title="Copy viewer to clipboard">&#128203;</button>

      </div>
    </div>

    <!-- ── Height view ─────────────────────────── -->
    <div id="view-height" class="sr-view">
      <div class="sr-canvas-area" id="sr-canvas-area">
        <div class="sr-ruler-col" id="sr-ruler-col">
          <div class="sr-ruler-inner" id="sr-ruler-inner"></div>
        </div>
        <div class="sr-scroll" id="sr-scroll">
          <div id="sr-empty" class="sr-empty">Select at least one character to begin</div>
          <div id="sr-scene" class="sr-scene" style="display:none">
            <div id="sr-zoom" class="sr-zoom">
              <div id="sr-figures" class="sr-figures"></div>
              <div class="sr-ground"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="sr-stats" class="sr-stats"></div>
    </div>

    <!-- ── Length view ─────────────────────────── -->
    <div id="view-length" class="sr-view" style="display:none">
      <div class="sr-length-area" id="sr-length-area">
        <div class="sr-length-scroll" id="sr-length-scroll">
          <div id="sr-length-empty" class="sr-empty">Select characters with anatomy data to compare</div>
          <div id="sr-length-zoom" class="sr-length-zoom">
              <div id="sr-length-grid-overlay" class="sr-grid-overlay sr-length-grid-overlay"></div>
            <div id="sr-length-rows" class="sr-length-rows"></div>
          </div>
        </div>
        <div class="sr-length-ruler-wrap" id="sr-length-ruler-wrap">
          <div class="sr-headshot-spacer"></div>
          <div class="sr-length-ruler" id="sr-length-ruler"></div>
        </div>
      </div>
      <div id="sr-length-stats" class="sr-stats"></div>
    </div>

    <!-- ── Stats view ──────────────────────────── -->
    <div id="view-stats" class="sr-view" style="display:none"></div>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="../_shared/registry.js"></script>
<script src="sizeref.js?v=1779945470"></script>

<!-- ── Resize popup backdrop ──────────────────── -->
<div id="sr-resize-backdrop" class="sr-resize-backdrop"></div>

<!-- ── Character picker modal ─────────────────── -->
<div id="char-modal-overlay" class="char-modal-overlay" style="display:none">
  <div class="char-modal">
    <div class="char-modal-header">
      <div class="char-modal-title">Select Character</div>
      <input id="char-modal-search" class="char-modal-search" type="text" placeholder="Search…" autocomplete="off" />
      <button id="char-modal-close" class="char-modal-close" title="Close">&#10005;</button>
    </div>
    <div id="char-modal-grid" class="char-modal-grid"></div>
  </div>
</div>
</body>
</html>
