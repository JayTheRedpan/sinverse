<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../_shared/agegate.js?v=1780259511"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer — Sinverse Gallery</title>
  <!-- Social preview (Open Graph / Discord / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Sinverse" />
  <meta property="og:title" content="Sinverse" />
  <meta property="og:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta property="og:image" content="https://sinverse.net/images/logo.png" />
  <meta property="og:image:width" content="598" />
  <meta property="og:image:height" content="598" />
  <meta property="og:url" content="https://sinverse.net/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Sinverse" />
  <meta name="twitter:description" content="A collaborative adult creative universe — stories, art, lore, and interactive adventures. 18+." />
  <meta name="twitter:image" content="https://sinverse.net/images/logo.png" />
  <meta name="theme-color" content="#c49a78" />
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css?v=1780202227" />
  <link rel="stylesheet" href="styles.css?v=1780448456" />
</head>
<body class="viewer-body">

  <div class="viewer-topbar">
    <a href="index.html" class="btn-ghost viewer-back">&#8592; Gallery</a>
    <span id="viewer-title" class="viewer-topbar-title"></span>
  </div>

  <!-- ── COMIC READER ─────────────────────────── -->
  <div id="view-comic" class="view-panel" style="display:none">
    <div class="scene-viewer-layout">
      <div class="scene-image-panel comic-image-panel">
        <img id="comic-page-img" src="" alt="Comic page" class="scene-full-img" />
        <div class="img-zoom-controls">
          <div class="img-zoom-fitrow">
            <button id="comic-zoom-reset" class="img-zoom-btn img-zoom-fit" aria-label="Fit whole image" title="Fit whole image">&#9974;</button>
            <button id="comic-zoom-width" class="img-zoom-btn img-zoom-fit" aria-label="Fit width" title="Fit width">&#8596;</button>
          </div>
          <div class="img-zoom-row">
            <button id="comic-zoom-out" class="img-zoom-btn" aria-label="Zoom out" title="Zoom out">&#8722;</button>
            <span id="comic-zoom-pct" class="img-zoom-pct">100%</span>
            <button id="comic-zoom-in" class="img-zoom-btn" aria-label="Zoom in" title="Zoom in">&#43;</button>
          </div>
        </div>
        <div class="comic-controls">
          <button id="comic-prev" class="btn-ghost comic-nav-btn">&#8592; Prev</button>
          <span id="comic-page-counter" class="comic-counter"></span>
          <button id="comic-next" class="btn-ghost comic-nav-btn">Next &#8594;</button>
        </div>
        <div id="comic-thumb-strip" class="comic-thumb-strip"></div>
      </div>
      <aside class="scene-meta-panel comic-meta-panel">
        <span class="type-badge type-comic">Comic</span>
        <span id="comic-canonical-reader" class="canonical-badge" style="display:none">&#10022; Canonical</span>
        <h1 id="comic-title-reader" class="viewer-h1"></h1>
        <p id="comic-artist-reader" class="viewer-artist"></p>
        <div id="comic-tags-reader" class="viewer-tags"></div>
        <div id="comic-dates" class="viewer-dates"></div>
        <p id="comic-synopsis-reader" class="viewer-synopsis"></p>
        <div id="comic-characters-reader" class="viewer-characters"></div>
        <a id="comic-download" href="#" download class="btn-ghost viewer-download">&#8595; Download page</a>
      </aside>
    </div>
  </div>

  <!-- ── SCENE VIEWER ─────────────────────────── -->
  <div id="view-scene" class="view-panel" style="display:none">
    <div class="scene-viewer-layout">
      <div class="scene-image-panel">
        <img id="scene-img" src="" alt="" class="scene-full-img" />
        <div class="img-zoom-controls">
          <div class="img-zoom-fitrow">
            <button id="scene-zoom-reset" class="img-zoom-btn img-zoom-fit" aria-label="Fit whole image" title="Fit whole image">&#9974;</button>
            <button id="scene-zoom-width" class="img-zoom-btn img-zoom-fit" aria-label="Fit width" title="Fit width">&#8596;</button>
          </div>
          <div class="img-zoom-row">
            <button id="scene-zoom-out" class="img-zoom-btn" aria-label="Zoom out" title="Zoom out">&#8722;</button>
            <span id="scene-zoom-pct" class="img-zoom-pct">100%</span>
            <button id="scene-zoom-in" class="img-zoom-btn" aria-label="Zoom in" title="Zoom in">&#43;</button>
          </div>
        </div>
      </div>
      <aside class="scene-meta-panel">
        <span id="scene-type-badge" class="type-badge type-scene">World Scene</span>
        <span id="scene-canonical" class="canonical-badge" style="display:none">&#10022; Canonical</span>
        <h1 id="scene-title" class="viewer-h1"></h1>
        <p id="scene-artist" class="viewer-artist"></p>
        <div id="scene-tags" class="viewer-tags"></div>
        <div id="scene-dates" class="viewer-dates"></div>
        <p id="scene-description" class="viewer-synopsis"></p>
        <div id="scene-characters" class="viewer-characters"></div>
        <a id="scene-download" href="#" download class="btn-ghost viewer-download">&#8595; Download</a>
      </aside>
    </div>
  </div>

  <!-- ── CHAR REF VIEWER ──────────────────────── -->
  <div id="view-charref" class="view-panel" style="display:none">
    <div class="scene-viewer-layout">
      <div class="scene-image-panel">
        <img id="ref-img" src="" alt="" class="scene-full-img" />
        <div class="img-zoom-controls">
          <div class="img-zoom-fitrow">
            <button id="ref-zoom-reset" class="img-zoom-btn img-zoom-fit" aria-label="Fit whole image" title="Fit whole image">&#9974;</button>
            <button id="ref-zoom-width" class="img-zoom-btn img-zoom-fit" aria-label="Fit width" title="Fit width">&#8596;</button>
          </div>
          <div class="img-zoom-row">
            <button id="ref-zoom-out" class="img-zoom-btn" aria-label="Zoom out" title="Zoom out">&#8722;</button>
            <span id="ref-zoom-pct" class="img-zoom-pct">100%</span>
            <button id="ref-zoom-in" class="img-zoom-btn" aria-label="Zoom in" title="Zoom in">&#43;</button>
          </div>
        </div>
      </div>
      <aside class="scene-meta-panel">
        <span class="type-badge type-charref">Character Reference</span>
        <span id="ref-canonical" class="canonical-badge" style="display:none">&#10022; Canonical</span>
        <h1 id="ref-title" class="viewer-h1"></h1>
        <p id="ref-artist" class="viewer-artist"></p>
        <div id="ref-tags" class="viewer-tags"></div>
        <div id="ref-dates" class="viewer-dates"></div>
        <div id="ref-char-link" class="ref-char-link"></div>
        <div class="ref-detail-block" id="ref-height-block" style="display:none">
          <span class="ref-detail-label">Height</span>
          <span id="ref-height" class="ref-detail-value"></span>
        </div>
        <div class="ref-detail-block" id="ref-notes-block" style="display:none">
          <span class="ref-detail-label">Artist notes</span>
          <p id="ref-notes" class="ref-notes-text"></p>
        </div>
        <a id="ref-download" href="#" download class="btn-ghost viewer-download">&#8595; Download</a>
      </aside>
    </div>
  </div>

  <!-- ── SET VIEWER ───────────────────────────── -->
  <div id="view-set" class="view-panel" style="display:none">
    <div class="set-viewer-layout">
      <aside class="scene-meta-panel set-meta-panel">
        <span class="type-badge type-set">Set</span>
        <span id="set-canonical" class="canonical-badge" style="display:none">&#10022; Canonical</span>
        <h1 id="set-title" class="viewer-h1"></h1>
        <p id="set-artist" class="viewer-artist"></p>
        <div id="set-count" class="set-count"></div>
        <div id="set-tags" class="viewer-tags"></div>
        <div id="set-dates" class="viewer-dates"></div>
        <p id="set-synopsis" class="viewer-synopsis"></p>
        <div id="set-characters" class="viewer-characters"></div>
      </aside>
      <div class="set-grid-panel">
        <div id="set-grid" class="set-grid"></div>
      </div>
    </div>
  </div>

  <!-- Set lightbox: same image experience as scene/comic, as an overlay -->
  <div id="set-lightbox" class="set-lightbox" style="display:none">
    <button id="set-lightbox-close" class="set-lightbox-close" aria-label="Close">&#10005;</button>
    <div class="scene-image-panel set-lightbox-panel">
      <img id="set-lightbox-img" class="scene-full-img" src="" alt="" />
      <div class="img-zoom-controls">
        <div class="img-zoom-fitrow">
          <button id="set-zoom-reset" class="img-zoom-btn img-zoom-fit" aria-label="Fit whole image" title="Fit whole image">&#9974;</button>
          <button id="set-zoom-width" class="img-zoom-btn img-zoom-fit" aria-label="Fit width" title="Fit width">&#8596;</button>
        </div>
        <div class="img-zoom-row">
          <button id="set-zoom-out" class="img-zoom-btn" aria-label="Zoom out" title="Zoom out">&#8722;</button>
          <span id="set-zoom-pct" class="img-zoom-pct">100%</span>
          <button id="set-zoom-in" class="img-zoom-btn" aria-label="Zoom in" title="Zoom in">&#43;</button>
        </div>
      </div>
      <button id="set-lightbox-prev" class="set-lightbox-nav set-lightbox-prev" aria-label="Previous">&#8249;</button>
      <button id="set-lightbox-next" class="set-lightbox-nav set-lightbox-next" aria-label="Next">&#8250;</button>
      <div class="set-lightbox-bar">
        <span id="set-lightbox-counter" class="comic-counter"></span>
        <a id="set-lightbox-download" href="#" download class="btn-ghost viewer-download">&#8595; Download</a>
      </div>
    </div>
  </div>

  <script src="../_shared/registry.js"></script>
  <script src="../_shared/dates.js?v=1780108110"></script>
  <script src="viewer.js?v=1780448891"></script>

<script src="../_shared/nav.js?v=1780201284"></script>
<script>initNav('gallery');</script>
</body>
</html>
