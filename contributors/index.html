<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contributors — Sinverse</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico" />
  <link rel="apple-touch-icon" href="../apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cormorant+SC:wght@300;400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../_shared/styles-global.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="con-header">
    <div class="con-brand">
      <a href="../"><img src="../images/logo.png" alt="Sinverse" class="header-logo" /></a>
      <div class="con-title-block">
        <span class="con-title">Contributors</span>
        <span class="con-subtitle">The people who bring Sinverse to life</span>
      </div>
    </div>
  </header>

  <section class="jay-dedication" id="jay-dedication">
    <div class="jay-inner">
      <div class="jay-portrait-wrap">
        <img id="jay-portrait" class="jay-portrait" src="" alt="Jay" />
      </div>
      <div class="jay-text">
        <div class="jay-eyebrow">In honour of</div>
        <h1 class="jay-name">Jay</h1>
        <p class="jay-bio" id="jay-bio"></p>
        <div class="jay-socials" id="jay-socials"></div>
      </div>
    </div>
  </section>

  <section class="con-section">
    <div class="con-section-header">
      <span class="con-section-eyebrow">Roster</span>
      <h2 class="con-section-title">All Contributors</h2>
    </div>
    <div class="con-grid" id="con-grid">
      <div class="con-loading">Loading contributors…</div>
    </div>
  </section>

  <section class="anon-section">
    <div class="anon-inner">
      <div class="anon-icon">✦</div>
      <div class="anon-eyebrow">Community</div>
      <h2 class="anon-title">Anonymous Contributions</h2>
      <p class="anon-body">Some creators prefer to remain uncredited. Their contributions are no less valued.</p>
      <div class="anon-counts">
        <div class="anon-count-item"><span class="anon-count-n" id="anon-gallery">—</span><span class="anon-count-label">Gallery pieces</span></div>
        <div class="anon-count-item"><span class="anon-count-n" id="anon-library">—</span><span class="anon-count-label">Stories</span></div>
        <div class="anon-count-item"><span class="anon-count-n" id="anon-cyoa">—</span><span class="anon-count-label">Adventures</span></div>
      </div>
    </div>
  </section>

  <footer class="con-footer">
    <a href="../" class="footer-home-link">← Sinverse Home</a>
  </footer>

  <script src="contributors.js"></script>
</body>
</html>
