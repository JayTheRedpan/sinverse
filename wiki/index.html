// ── Timeline (vertical, era-grouped) ───────────────────────────
// Replaces the old proportional horizontal track + zoom/drag system.
// Reuses shared globals: timelineEvents, erasData, fTDate, LORE_PAGES,
// loadLorePage, loadCharPage, characters.
var _vtlViewMode = 'expanded';   // 'expanded' (default) | 'collapsed'

// Muted, theme-harmonised palette. Each era gets one by position, so colours
// work with zero config; an optional "accent" field in eras.json overrides.
var VTL_PALETTE = ['#8a93a6','#c0925e','#c97a8c','#cf8a55','#a3ad77','#d9b87f','#b08fc4','#9aa0b8','#cba06a'];
function vtlHexToRgba(hex, a) {
  var h = String(hex).replace('#','');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var n = parseInt(h, 16);
  return 'rgba(' + ((n>>16)&255) + ',' + ((n>>8)&255) + ',' + (n&255) + ',' + a + ')';
}
// Resolve an era's accent (override or palette) and apply its colour vars.
function vtlApplyAccent(el, era, idx) {
  var c = era.accent || VTL_PALETTE[idx % VTL_PALETTE.length];
  el.style.setProperty('--era-accent', c);
  el.style.setProperty('--era-accent-line', vtlHexToRgba(c, 0.5));
  el.style.setProperty('--era-accent-rail', vtlHexToRgba(c, 0.55));
  el.style.setProperty('--era-accent-glow', vtlHexToRgba(c, 0.22));
}

function vtlEvDate(ev) {
  return (ev.date === null || ev.date === undefined || ev.date === '') ? null : (parseInt(ev.date, 10) || 0);
}
function vtlEraRange(e) {
  if (e.point) return fTDate(e.start);
  var s  = (e.start === null || e.start === undefined) ? '\u2026'   : fTDate(e.start);
  var en = (e.end   === null || e.end   === undefined) ? 'present' : fTDate(e.end);
  return s + '  \u2192  ' + en;
}
// Render order is by start date, so era order in eras.json never matters.
function vtlSortedEras(list) {
  return list.slice().sort(function(a, b) {
    var sa = (a.start === null || a.start === undefined) ? -Infinity : a.start;
    var sb = (b.start === null || b.start === undefined) ? -Infinity : b.start;
    if (sa !== sb) return sa - sb;
    return (a.point ? 0 : 1) - (b.point ? 0 : 1); // an instant precedes the span that follows it
  });
}
// Match a dated event to its era: exact point match -> era starting that year
// -> containing range. Returns null if no era contains the year.
function vtlEraForDate(eras, d) {
  if (d === null) return null;
  for (var p = 0; p < eras.length; p++) if (eras[p].point && eras[p].start === d) return eras[p];
  for (var q = 0; q < eras.length; q++) if (!eras[q].point && eras[q].start === d) return eras[q];
  for (var i = 0; i < eras.length; i++) {
    var e = eras[i]; if (e.point) continue;
    var s  = (e.start === null || e.start === undefined) ? -Infinity : e.start;
    var en = (e.end   === null || e.end   === undefined) ?  Infinity : e.end;
    if (d >= s && d <= en) return e;
  }
  return null;
}

function buildTimeline() {
  var container = document.getElementById('timeline-container');
  var nav = document.getElementById('vtl-nav');
  if (!container) return;
  container.innerHTML = '';
  if (nav) nav.innerHTML = '';

  var ordered = vtlSortedEras(erasData);

  // Assign each event to an era id; collect dated orphans and undated events.
  var assigned = {}, orphans = [], present = [];
  timelineEvents.forEach(function(ev) {
    var d = vtlEvDate(ev);
    if (d === null) { present.push(ev); return; }
    var er = vtlEraForDate(ordered, d);
    if (er) { (assigned[er.id] = assigned[er.id] || []).push(ev); }
    else orphans.push(ev);
  });

  // Render list: real eras, then a catch-all for orphaned dated events (so era
  // edits never lose anything), then a Present zone for undated events.
  var renderList = ordered.slice();
  if (orphans.length) {
    renderList.push({ id: '__uncharted', name: 'Uncharted', start: null, end: null, uncharted: true, accent: '#9a7d6a',
      description: 'Events whose date falls outside every defined era. They still appear here so nothing is lost \u2014 adjust the eras to reclaim them.' });
    assigned.__uncharted = orphans;
  }
  if (present.length) {
    renderList.push({ id: '__present', name: 'The Present', start: null, end: null, present: true, accent: '#a08870',
      description: 'Ongoing or undated events.' });
    assigned.__present = present;
  }

  function eraLoreId(id) { return 'era-' + id; }
  function eraHasLore(id) { return !!LORE_PAGES.find(function(p){ return p.id === eraLoreId(id); }); }

  renderList.forEach(function(era, idx) {
    var evs = (assigned[era.id] || []).slice().sort(function(a, b){
      var da = vtlEvDate(a), db = vtlEvDate(b);
      return (da === null ? Infinity : da) - (db === null ? Infinity : db);
    });

    // Jump-nav pill
    if (nav) {
      var pill = document.createElement('button');
      pill.type = 'button';
      pill.className = 'wiki-vtl-pill';
      pill.textContent = era.name;
      vtlApplyAccent(pill, era, idx);
      pill.addEventListener('click', function() {
        var sec = document.getElementById('vtl-era-' + era.id);
        if (!sec) return;
        sec.classList.remove('collapsed');
        sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      nav.appendChild(pill);
    }

    var section = document.createElement('div');
    section.className = 'wiki-vtl-era'
      + (era.point ? ' anchor' : '')
      + (era.uncharted ? ' uncharted' : '')
      + (era.present ? ' present' : '')
      + (_vtlViewMode === 'collapsed' ? ' collapsed' : '');
    section.id = 'vtl-era-' + era.id;
    vtlApplyAccent(section, era, idx);

    // Header
    var head = document.createElement('div');
    head.className = 'wiki-vtl-era-head';
    var eyebrow = era.uncharted ? 'Outside defined eras'
                : era.present   ? 'Ongoing'
                : vtlEraRange(era);
    var countTxt = evs.length ? evs.length + (evs.length > 1 ? ' events' : ' event') : '';
    var nameClickable = (!era.uncharted && !era.present && eraHasLore(era.id));
    head.innerHTML =
      '<div class="wiki-vtl-node"></div>' +
      '<div class="wiki-vtl-eyebrow">' + eyebrow + '</div>' +
      '<div class="wiki-vtl-era-name">' +
        '<span class="wiki-vtl-caret">\u25BC</span>' +
        (nameClickable
          ? '<a class="wiki-vtl-era-name-text wiki-vtl-era-link" href="#lore-era-' + encodeURIComponent(era.id) + '" data-era="' + era.id + '">' + era.name + '</a>'
          : '<span class="wiki-vtl-era-name-text">' + era.name + '</span>') +
        (countTxt ? '<span class="wiki-vtl-count">' + countTxt + '</span>' : '') +
      '</div>' +
      (era.description ? '<div class="wiki-vtl-era-desc">' + era.description + '</div>' : '');
    section.appendChild(head);

    // Toggle collapse on header click (let an era-name lore link through).
    head.addEventListener('click', function(e) {
      if (e.target.closest('.wiki-vtl-era-link')) return;
      section.classList.toggle('collapsed');
    });
    var nameLink = head.querySelector('.wiki-vtl-era-link');
    if (nameLink) {
      nameLink.addEventListener('click', function(e) {
        if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
        e.preventDefault();
        e.stopPropagation();
        loadLorePage(eraLoreId(this.getAttribute('data-era')));
      });
    }

    var body = document.createElement('div');
    body.className = 'wiki-vtl-era-body';

    if (!evs.length) {
      var empty = document.createElement('div');
      empty.className = 'wiki-vtl-empty';
      empty.textContent = 'No recorded events yet';
      body.appendChild(empty);
    }

    evs.forEach(function(ev, idx) {
      // "N years pass" marker for large jumps within an era.
      if (idx > 0) {
        var da = vtlEvDate(evs[idx - 1]), db = vtlEvDate(ev);
        if (da !== null && db !== null && (db - da) >= 20) {
          var gap = document.createElement('div');
          gap.className = 'wiki-vtl-gap';
          gap.innerHTML = '<span>\u2248 ' + (db - da) + ' years pass</span>';
          body.appendChild(gap);
        }
      }

      var card = document.createElement('div');
      card.className = 'wiki-vtl-event' + (ev.era === 'anchor' ? ' anchor' : '');
      card.setAttribute('data-ev-id', ev.id);

      // Related links (lore pages / characters) — same resolution as before.
      var relatedHtml = '';
      if (ev.tags && ev.tags.length) {
        var relLinks = ev.tags.map(function(tag) {
          var lp = LORE_PAGES.find(function(p){ return p.id === tag; });
          var ch = characters.find(function(c){ return c.name.toLowerCase() === tag; });
          if (lp) return '<a class="wiki-vtl-tag wiki-lore-link" href="#lore-' + encodeURIComponent(tag) + '" data-target="' + tag + '">' + lp.label + '</a>';
          if (ch) {
            var cslug = ch.wiki || ch.name.toLowerCase().replace(/\s+/g, '-');
            return '<a class="wiki-vtl-tag wiki-lore-link" href="#char-' + encodeURIComponent(cslug) + '" data-target="' + ch.name.toLowerCase() + '">' + ch.name + '</a>';
          }
          return null;
        }).filter(Boolean);
        if (relLinks.length) relatedHtml =
          '<div class="wiki-vtl-related"><span class="wiki-vtl-related-label">Related</span>' + relLinks.join('') + '</div>';
      }

      card.innerHTML =
        '<div class="wiki-vtl-dot"></div>' +
        '<div class="wiki-vtl-card">' +
          '<span class="wiki-vtl-date">' + fTDate(ev.date) + '</span>' +
          '<div class="wiki-vtl-title">' + ev.title + '</div>' +
          '<div class="wiki-vtl-body">' +
            '<div class="wiki-vtl-summary">' + (ev.summary || '') + '</div>' +
            relatedHtml +
          '</div>' +
        '</div>';

      // Expand/collapse the event; clicks on a related link route instead.
      card.querySelector('.wiki-vtl-card').addEventListener('click', function(e) {
        var link = e.target.closest('.wiki-lore-link');
        if (link) {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          e.preventDefault();
          var t = link.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id === t; });
          if (isLore) loadLorePage(t);
          else {
            var cByName = characters.find(function(c){ return c.name.toLowerCase() === t.toLowerCase(); });
            if (cByName) loadCharPage(cByName.id);
          }
          return;
        }
        card.classList.toggle('open');
      });

      body.appendChild(card);
    });

    section.appendChild(body);
    container.appendChild(section);
  });

  // Footnote (carried over from the old timeline).
  var fn = document.createElement('p');
  fn.className = 'wiki-vtl-footnote';
  fn.innerHTML = 'Dates relative to TDay (T&plusmn;0) \u2014 <em>T-N</em> = N years before; <em>T+N</em> = N years after. Tap an event to expand; tap an era heading to collapse it.';
  container.appendChild(fn);
}

// View toggle: Expanded (default) vs Overview (all eras collapsed).
function initTimelineView() {
  var seg = document.getElementById('vtl-seg');
  if (!seg || seg._bound) return;
  seg._bound = true;
  seg.addEventListener('click', function(e) {
    var b = e.target.closest('button');
    if (!b) return;
    _vtlViewMode = b.getAttribute('data-mode');
    seg.querySelectorAll('button').forEach(function(x){ x.classList.toggle('on', x === b); });
    document.querySelectorAll('.wiki-vtl-era').forEach(function(sec){
      sec.classList.toggle('collapsed', _vtlViewMode === 'collapsed');
    });
  });
}


// ── Character grid ────────────────────────────────────────────
var SIZE_BUCKETS = [];   // loaded from size-classes.json (ordered, smallest first)
// Per-grid state (the full character list + active filter selections) now
// lives inside each createCharGrid() instance below, so the Characters and Fan
// Characters pages each keep their own.

// Computes a character's size-class label from its height using the buckets
// defined in size-classes.json. Each bucket has a `max` (exclusive upper bound
// in inches); a null/absent max is the open-ended top bucket. Because this is
// derived live, renaming or re-bucketing in that one file updates every
// character automatically — nothing is stored on the character.
function sizeClassFor(heightIn) {
  if (heightIn == null) return '';
  for (var i = 0; i < SIZE_BUCKETS.length; i++) {
    var b = SIZE_BUCKETS[i];
    if (b.max == null || heightIn < b.max) return b.label;
  }
  return SIZE_BUCKETS.length ? SIZE_BUCKETS[SIZE_BUCKETS.length - 1].label : '';
}

// Filter definitions. `arr` = field is an array (match if selected is in it).
// `compute` = derive the match value from the character (used for size_class).
// `options` = supply ordered option labels instead of scanning the data.
var CHAR_FILTER_DEFS = [
  { key: 'faction',    label: 'Organizations', arr: true  },
  { key: 'role',       label: 'Role',       arr: true  },
  { key: 'species',    label: 'Species',    arr: true  },
  { key: 'size_class', label: 'Size',       arr: false,
    compute: function(c){ return sizeClassFor(c.height); },
    options: function(){ return SIZE_BUCKETS.map(function(b){ return b.label; }); } },
  { key: 'class', label: 'Class', arr: false }
];

// Reusable character-grid controller. Both the Characters page and the Fan
// Characters page create one of these; each keeps its own data + filter state
// and targets its own DOM ids, but they share this one implementation and the
// CHAR_FILTER_DEFS above. `opts`:
//   ids:   { toggle, active, panel, filters, count, grid }  (element ids)
//   href:  function(c) -> string   (anchor href for a card)
//   open:  function(c)             (called on a normal left-click)
//   emptyAllText: string           (shown when the dataset itself is empty)
function createCharGrid(opts) {
  var all = [];
  var filters = { faction: '', role: '', species: '', size_class: '', 'class': '' };

  function build(chars) {
    all = (chars || []).slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    buildFilters();
    apply();
  }

  function buildFilters() {
    var wrap = document.getElementById(opts.ids.filters);
    if (!wrap) return;
    wrap.innerHTML = '';

    CHAR_FILTER_DEFS.forEach(function(def) {
      var optlist;
      if (def.options) {
        optlist = def.options();
      } else {
        var values = {};
        all.forEach(function(c) {
          var v = c[def.key];
          if (def.arr) { (v || []).forEach(function(x){ if (x) values[x] = true; }); }
          else if (v) { values[v] = true; }
        });
        optlist = Object.keys(values).sort();
      }
      if (!optlist.length) return;   // skip a filter with no values/data yet

      var field = document.createElement('div');
      field.className = 'wiki-char-filter';
      var lab = document.createElement('span');
      lab.className = 'wiki-char-filter-label';
      lab.textContent = def.label;
      field.appendChild(lab);

      var sel = document.createElement('select');
      sel.setAttribute('data-key', def.key);
      var allOpt = document.createElement('option');
      allOpt.value = '';
      allOpt.textContent = '--All--';
      sel.appendChild(allOpt);
      optlist.forEach(function(o) {
        var op = document.createElement('option');
        op.value = o;
        op.textContent = def.fmt ? def.fmt(o) : o;
        sel.appendChild(op);
      });
      sel.value = filters[def.key] || '';
      sel.addEventListener('change', function() {
        filters[def.key] = sel.value;
        apply();
      });
      field.appendChild(sel);
      wrap.appendChild(field);
    });

    var reset = document.createElement('button');
    reset.type = 'button';
    reset.className = 'wiki-char-filter-reset';
    reset.textContent = 'Reset';
    reset.addEventListener('click', function() {
      Object.keys(filters).forEach(function(k){ filters[k] = ''; });
      wrap.querySelectorAll('select').forEach(function(s){ s.value = ''; });
      apply();
    });
    wrap.appendChild(reset);

    var toggle = document.getElementById(opts.ids.toggle);
    var panel  = document.getElementById(opts.ids.panel);
    if (toggle && panel && !toggle._wired) {
      toggle._wired = true;
      toggle.addEventListener('click', function() {
        var open = panel.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
  }

  function matches(c) {
    return CHAR_FILTER_DEFS.every(function(def) {
      var sel = filters[def.key];
      if (!sel) return true;
      if (def.compute) return def.compute(c) === sel;
      if (def.arr) return (c[def.key] || []).indexOf(sel) !== -1;
      return c[def.key] === sel;
    });
  }

  function apply() {
    var list = all.filter(matches);
    render(list);
    var activeCount = Object.keys(filters).filter(function(k){ return filters[k]; }).length;
    var count = document.getElementById(opts.ids.count);
    if (count) {
      count.textContent = activeCount
        ? (list.length + ' of ' + all.length + ' characters')
        : (all.length + ' characters');
    }
    var active = document.getElementById(opts.ids.active);
    if (active) active.textContent = activeCount ? '(' + activeCount + ' active)' : '';
  }

  function render(chars) {
    var grid = document.getElementById(opts.ids.grid);
    if (!grid) return;
    grid.innerHTML = '';

    if (!chars.length) {
      var empty = document.createElement('div');
      empty.className = 'community-empty';
      empty.style.cssText = 'padding:2rem 0;font-style:italic;color:var(--text-secondary)';
      empty.textContent = all.length
        ? 'No characters match those filters.'
        : (opts.emptyAllText || 'Nothing here yet.');
      grid.appendChild(empty);
      return;
    }

    chars.forEach(function(c) {
      var card = document.createElement('a');
      card.className = 'wiki-char-card';
      card.href = opts.href(c);

      var imgEl = document.createElement('img');
      imgEl.className = 'wiki-char-portrait';
      imgEl.src = c.profile_image || c.image || '';
      imgEl.alt = c.name;
      if (!c.profile_image && !c.image) {
        imgEl.style.filter = 'invert(0.72) sepia(0.25) saturate(450%) hue-rotate(350deg) brightness(0.88)';
        imgEl.src = 'https://res.cloudinary.com/dq40xaaux/image/upload/v1779738249/giantess_ktiwfb.png';
      }

      var name = document.createElement('div');
      name.className = 'wiki-char-name';
      name.textContent = c.name;

      var species = document.createElement('div');
      species.className = 'wiki-char-species';
      species.textContent = (c.species && c.species.length) ? c.species.join(' / ') : '';

      card.appendChild(imgEl);
      card.appendChild(name);
      card.appendChild(species);

      var fac = (c.faction && c.faction.length) ? c.faction[0] : '';
      if (fac) {
        var tag = document.createElement('div');
        tag.className = 'wiki-char-tag';
        tag.textContent = fac;
        card.appendChild(tag);
      }

      card.addEventListener('click', function(e) {
        if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
        e.preventDefault();
        opts.open(c);
      });
      grid.appendChild(card);
    });
  }

  return { build: build };
}

// Canon characters page.
var canonCharGrid = createCharGrid({
  ids: { toggle: 'char-filter-toggle', active: 'char-filter-active', panel: 'char-filters-panel', filters: 'char-filters', count: 'char-count', grid: 'char-grid' },
  href: function(c){ return '#char-' + (c.wiki || c.id); },
  open: function(c){ loadCharPage(c.id); },
  emptyAllText: 'No characters yet.'
});

// Fan (community) characters page — same UI, separate data + routing.
var fanCharGrid = createCharGrid({
  ids: { toggle: 'fanchar-filter-toggle', active: 'fanchar-filter-active', panel: 'fanchar-filters-panel', filters: 'fanchar-filters', count: 'fanchar-count', grid: 'fanchar-grid' },
  href: function(c){ return '#fanchar-' + (c.wiki || c.id); },
  open: function(c){ loadFanCharPage(c.id); },
  emptyAllText: 'No fan characters yet — add entries to _data/fan-characters.json to populate this page.'
});


// ── Character references ("handles") ──────────────────────────
// A character is referenced by a HANDLE. Normally that's just the name
// (case-insensitive). A bare name resolves CANON first, then FAN — so if only
// one character owns that name, it just works. When a name exists in BOTH sets,
// disambiguate with a prefix: "canon:Name" or "fan:Name". The key part after
// the prefix may be the character's name OR its wiki slug.
//   resolveCharLink("Sin")       -> canon Sin (canon wins a bare name)
//   resolveCharLink("fan:Sin")   -> the fan Sin
//   resolveCharLink("mara-vell") -> fan Mara (no canon match, falls through)
// Detail URLs are already namespaced (#char- vs #fanchar-), so once resolved
// there is never a routing collision.
function resolveCharLink(handle) {
  var raw = String(handle == null ? '' : handle).trim();
  var set = null, key = raw;
  var m = raw.match(/^\s*(canon|fan)\s*:\s*(.+)$/i);
  if (m) { set = m[1].toLowerCase(); key = m[2]; }
  key = key.trim().toLowerCase();
  function findIn(list) {
    return list.find(function(x) {
      return x.name.toLowerCase() === key || (x.wiki && String(x.wiki).toLowerCase() === key);
    });
  }
  var c = null, f = null;
  if (set === 'canon') c = findIn(characters);
  else if (set === 'fan') f = findIn(fanCharacters);
  else { c = findIn(characters); if (!c) f = findIn(fanCharacters); }   // bare: canon first, then fan
  if (c) return { char: c, fan: false, href: '#char-' + (c.wiki || c.id), open: function(){ loadCharPage(c.id); } };
  if (f) return { char: f, fan: true, href: '#fanchar-' + (f.wiki || f.id), open: function(){ loadFanCharPage(f.id); } };
  return null;
}
// Does a gallery/library tag refer to THIS exact character? Compares by identity
// (set + id) via the resolver, so Featured Content counts stay correct even when
// a name is shared by a canon and a fan character.
function tagRefersTo(tag, char, isFan) {
  var r = resolveCharLink(tag);
  return !!r && r.fan === isFan && r.char.id === char.id;
}
// The handle to emit when linking OUT to the gallery/library filtered by this
// character. Namespaced only when the name exists in both sets — otherwise the
// bare name, so existing (non-colliding) links are unchanged.
function charOutboundHandle(char, isFan) {
  var nm = char.name.toLowerCase();
  var inCanon = characters.some(function(c){ return c.name.toLowerCase() === nm; });
  var inFan   = fanCharacters.some(function(c){ return c.name.toLowerCase() === nm; });
  return (inCanon && inFan) ? (isFan ? 'fan:' : 'canon:') + char.name : char.name;
}
function loadCharPage(charId, pushState) {
  renderCharDetail(characters.find(function(c){ return c.id === charId; }),
    { routePrefix: '#char-', stateType: 'character', mdDir: 'characters/' }, pushState);
}
function loadFanCharPage(charId, pushState) {
  if (!FAN_CHARACTERS_ENABLED) { loadLorePage('world-of-sinverse', false); return; }
  renderCharDetail(fanCharacters.find(function(c){ return c.id === charId; }),
    { routePrefix: '#fanchar-', stateType: 'fanchar', mdDir: 'fan-characters/' }, pushState);
}
// Shared detail renderer used by both canon and fan characters. cfg:
//   { routePrefix:'#char-'|'#fanchar-', stateType:'character'|'fanchar', mdDir:'characters/'|'fan-characters/' }
function renderCharDetail(char, cfg, pushState) {
  if (!char) return;

  var slug = char.wiki || char.name.toLowerCase().replace(/\s+/g, '-');
  var container = document.getElementById('char-detail-content');
  container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;padding:2rem 0">Loading…</p>';
  showPage('character', false);
  if (pushState !== false) history.pushState({ type: cfg.stateType, id: char.id, slug: slug }, '', cfg.routePrefix + slug);

  // Build stat block from JSON
  var factionStr = (char.faction && char.faction.length) ? char.faction.join(', ') : '—';
  var statRows = [
    ['Species',    (char.species && char.species.length) ? char.species.join(' / ') : '—'],
    ['Pronouns',   char.pronouns || '—'],
    ['Height',     '<span class="char-stat-val" data-inches="' + char.height + '">' + fH(char.height) + '</span>'],
    ['Weight',     char.weight ? '<span class="char-stat-val" data-lbs="' + char.weight + '">' + fW(char.weight) + '</span>' : '—'],
    ['Organizations', factionStr],
  ];
  if (char.role && char.role.length) statRows.push(['Role', char.role.join(', ')]);
  var sizeClass = sizeClassFor(char.height);
  if (sizeClass) statRows.push(['Size class', sizeClass]);
  if (char['class']) statRows.push(['Class', char['class']]);
  if (char.transformed_by) {
    var xfLabel = char.transformed_by.split('-').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
    statRows.push(['Transformed by', xfLabel]);
  }
  if (char.anatomy && char.anatomy.penis && char.length) {
    var rawLenIn = char.length * (char.length_correction||1);
    var lenStr = fLen(rawLenIn);
    statRows.push(['Length', '<span class="char-stat-val" data-inches="' + rawLenIn + '">' + lenStr + '</span>']);
  }

  var statTable = '<table class="wiki-stat-table">' +
    statRows.map(function(r){ return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>'; }).join('') +
    '</table>';

  var heroSrc = char.image || char.profile_image || '';
  var heroInner = heroSrc
    ? '<div class="wiki-char-hero"><img src="' + heroSrc + '" alt="' + char.name + '" /></div>'
    : '<div class="wiki-char-hero"><div class="wiki-char-hero-placeholder">No image yet</div></div>';

  // If this is a fan character that represents a contributor, link to their
  // profile. The link FILTERS the contributors page to that creator (?creator=);
  // a stale id just hides the button (the contributor must exist).
  var creatorHtml = '';
  if (cfg.routePrefix === '#fanchar-' && char.contributor) {
    var contrib = (contributorsData || []).find(function(c){
      return String(c.id).toLowerCase() === String(char.contributor).toLowerCase();
    });
    if (contrib) {
      creatorHtml = '<a class="wiki-char-creator" href="../contributors/?creator=' + encodeURIComponent(contrib.id) + '">Created by ' + contrib.name + ' &rarr;</a>';
    }
  }

  // Hero column: the image, plus (for a contributor's fan character) the creator
  // button directly beneath it — so it extends the image rather than lengthening
  // the stat block beside it.
  var heroHtml = '<div class="wiki-char-hero-col">' + heroInner + creatorHtml + '</div>';

  var header = '<div class="wiki-char-header">' +
    heroHtml +
    '<div class="wiki-char-meta">' +
      '<div class="wiki-char-meta-name">' + char.name + '</div>' +
      statTable +
    '</div>' +
  '</div>';

  // Try to load markdown
  fetch(cfg.mdDir + slug + '.md')
    .then(function(r) { return r.ok ? r.text() : null; })
    .then(function(md) {
      if (!document.getElementById('page-character').classList.contains('active')) return;
      var bodyHtml = '';
      if (md && typeof marked !== 'undefined') {
        // Strip frontmatter
        var stripped = md.replace(/^---[\s\S]*?---\n/, '');
        bodyHtml = '<div class="wiki-md-content">' + marked.parse(stripped) + '</div>';
      } else {
        bodyHtml = '<p style="color:var(--text-secondary);font-style:italic">No wiki page written yet for this character.</p>';
      }
      var charName = char.name;
      var isFan = cfg.routePrefix === '#fanchar-';
      var galleryCount = galleryItems.filter(function(g){
        return (g.characters || []).some(function(tag){ return tagRefersTo(tag, char, isFan); });
      }).length;
      var libraryCount = libraryItems.filter(function(l){
        return (l.characters || []).some(function(tag){ return tagRefersTo(tag, char, isFan); });
      }).length;

      var outHandle = charOutboundHandle(char, isFan);
      var gUrl = '../gallery/?character=' + encodeURIComponent(outHandle.toLowerCase());
      var lUrl = '../library/?character=' + encodeURIComponent(outHandle.toLowerCase());
      var gSub = galleryCount === 0 ? 'No artworks yet' : (galleryCount === 1 ? '1 artwork' : galleryCount + ' artworks');
      var lSub = libraryCount === 0 ? 'No stories yet' : (libraryCount === 1 ? '1 story' : libraryCount + ' stories');
      var contentLinks =
        '<div class="wiki-char-content-links">' +
          '<div class="wiki-section-h">Featured Content</div>' +
          '<div class="wiki-char-content-row">' +
            '<a class="wiki-char-content-card" href="' + gUrl + '">' +
              '<div class="wiki-char-content-card-count">' + galleryCount + '</div>' +
              '<div>' +
                '<div class="wiki-char-content-card-label">Gallery</div>' +
                '<div class="wiki-char-content-card-sub">' + gSub + '</div>' +
              '</div>' +
            '</a>' +
            '<a class="wiki-char-content-card" href="' + lUrl + '">' +
              '<div class="wiki-char-content-card-count">' + libraryCount + '</div>' +
              '<div>' +
                '<div class="wiki-char-content-card-label">Library</div>' +
                '<div class="wiki-char-content-card-sub">' + lSub + '</div>' +
              '</div>' +
            '</a>' +
          '</div>' +
        '</div>';
      // Relationships — auto-rendered from characters.json (single source of
      // truth). Always shown, so an absence of relationships is itself clear.
      var relInner;
      if (char.relationships && char.relationships.length) {
        var relRows = char.relationships.map(function(rel) {
          var link = resolveCharLink(rel.name);
          var nameHtml = link
            ? '<a class="wiki-rel-link" href="' + link.href + '" data-target="' + String(rel.name).toLowerCase() + '">' + rel.name + '</a>'
            : rel.name;
          var noteHtml = rel.note ? ' <span class="wiki-rel-note">— ' + rel.note + '</span>' : '';
          return '<li><span class="wiki-rel-type">' + (rel.type || 'Connection') + '</span> ' + nameHtml + noteHtml + '</li>';
        }).join('');
        relInner = '<ul class="wiki-rel-list">' + relRows + '</ul>';
      } else {
        relInner = '<p class="wiki-rel-none">No known relationships on record.</p>';
      }
      var relHtml =
        '<div class="wiki-char-relationships">' +
          '<div class="wiki-section-h">Relationships</div>' +
          relInner +
        '</div>';

      // Place the auto-generated blocks (Featured Content, Relationships) at
      // placeholder tokens in the markdown so authors control their position.
      // Tokens: {{FEATURED}} and {{RELATIONSHIPS}}. If a token is absent, the
      // block is appended at the end as a fallback (so older pages still work).
      var assembled = bodyHtml;
      var usedFeatured = false, usedRel = false;
      // marked may wrap a lone token as <p>{{TOKEN}}</p>; strip that wrapper too.
      var featRe = /(<p>\s*)?\{\{FEATURED\}\}(\s*<\/p>)?/;
      var relRe  = /(<p>\s*)?\{\{RELATIONSHIPS\}\}(\s*<\/p>)?/;
      if (featRe.test(assembled)) { assembled = assembled.replace(featRe, contentLinks); usedFeatured = true; }
      if (relRe.test(assembled))  { assembled = assembled.replace(relRe, relHtml);       usedRel = true; }
      container.innerHTML = header + assembled +
        (usedRel ? '' : relHtml) +
        (usedFeatured ? '' : contentLinks);

      renderWikiImages(container);
      // Wire relationship links to load the related character's page
      container.querySelectorAll('.wiki-rel-link').forEach(function(el) {
        el.addEventListener('click', function(e) {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
          e.preventDefault();
          var link = resolveCharLink(this.getAttribute('data-target'));
          if (link) link.open();
        });
      });
      // Wire internal wiki links in character markdown
      container.querySelectorAll('.wiki-lore-link').forEach(function(el) {
        el.style.cssText = 'color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border-mid);';
        el.addEventListener('click', function(e) {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
          e.preventDefault();
          var t = this.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id === t; });
          if (isLore) loadLorePage(t);
          else {
            var link = resolveCharLink(t);
            if (link) link.open();
          }
        });
      });

      // "Jay's Secret Stash" easter-egg entrance: mounts the hidden wincing-Jay
      // sticker at the bottom of Jay's page (no-op for every other character).
      if (window.SinverseStash) window.SinverseStash.onCharPage(container, char);
    })
    .catch(function() {
      container.innerHTML = header + '<p style="color:var(--text-secondary);font-style:italic">No wiki page written yet for this character.</p>';
    });
}

// ── Browser history (back/forward) ────────────────────────────
window.addEventListener('popstate', function(e) {
  var state = e.state;
  if (!state) { loadLorePage('world-of-sinverse', false); return; }
  if (state.type === 'page') {
    if (state.id === 'intro') loadLorePage('world-of-sinverse', false);
    else if (state.id === 'faq') loadLorePage('faq', false);
    else showPage(state.id, false);
  }
  else if (state.type === 'character') loadCharPage(state.id, false);
  else if (state.type === 'fanchar') loadFanCharPage(state.id, false);
  else if (state.type === 'lore') loadLorePage(state.id, false);
  else if (state.type === 'category') showCategory(state.id, false);
});

// Restore from URL hash if returning from gallery/library
(function() {
  var hash = window.location.hash;
  if (hash && hash !== '#page-intro' && hash !== '#lore-world-of-sinverse') {
    // Will be handled by popstate-like restore after data loads
    window._restoreHash = hash;
  }
})();
history.replaceState({ type: 'lore', id: 'world-of-sinverse' }, '', window.location.hash || '#lore-world-of-sinverse');

// ── Search ────────────────────────────────────────────────────
var searchTimeout = null;
document.getElementById('wiki-search-input').addEventListener('input', function() {
  var q = this.value.trim();
  clearTimeout(searchTimeout);
  if (!q) return;
  searchTimeout = setTimeout(function(){ runSearch(q); }, 180);
});

document.getElementById('wiki-search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { this.value = ''; }
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    var q = this.value.trim();
    if (q) runSearch(q);
  }
});

function runSearch(q) {
  var ql = q.toLowerCase();
  var results = [];

  var qlLower = ql.toLowerCase();
  // Characters
  characters.forEach(function(c) {
    var score = 0;
    var cLower = c.name.toLowerCase();
    if (cLower === qlLower) score = 100;
    else if (cLower.startsWith(qlLower)) score = 80;
    else if (cLower.includes(qlLower)) score = 60;
    if (score) results.push({
      type: 'character', score: score,
      label: c.name,
      sub: ((c.species && c.species.length) ? c.species.join(' / ') : '') + ((c.faction && c.faction.length) ? ' · ' + c.faction.join(', ') : ''),
      img: c.profile_image || c.image || '',
      action: function(id){ return function(){ loadCharPage(id); }; }(c.id)
    });
  });

  // Lore pages
  LORE_PAGES.forEach(function(lp) {
    var score = 0;
    var lpLower = lp.label.toLowerCase();
    if (lpLower === qlLower) score = 100;
    else if (lpLower.startsWith(qlLower)) score = 80;
    else if (lpLower.includes(qlLower)) score = 60;
    if (score) results.push({
      type: 'lore', score: score,
      label: lp.label,
      sub: lp.section,
      action: function(id){ return function(){ loadLorePage(id); }; }(lp.id)
    });
  });

  // Timeline events
  timelineEvents.forEach(function(ev) {
    var score = 0;
    var evLower = ev.title.toLowerCase();
    if (evLower === qlLower) score = 100;
    else if (evLower.startsWith(qlLower)) score = 80;
    else if (evLower.includes(qlLower)) score = 60;
    else if (ev.summary && ev.summary.toLowerCase().includes(qlLower)) score = 30;
    if (score) results.push({
      type: 'timeline', score: score,
      label: ev.title,
      sub: fTDate(ev.date) + ' · Timeline event',
      action: function(id){ return function(){
        showPage('timeline');
        // Highlight the event
        setTimeout(function(){
          var evNode = document.querySelector('[data-ev-id="'+id+'"]');
          if (evNode) evNode.click();
        }, 100);
      }; }(ev.id)
    });
  });

  // FAQ questions (each accordion item is individually searchable)
  faqEntries.forEach(function(fe, idx) {
    var score = 0;
    var qLower = fe.question.toLowerCase();
    if (qLower === qlLower) score = 100;
    else if (qLower.startsWith(qlLower)) score = 80;
    else if (qLower.includes(qlLower)) score = 65;
    else if (fe.answer && fe.answer.toLowerCase().includes(qlLower)) score = 35;
    if (score) {
      // Short plain-text snippet from the answer for the sub-line
      var snippet = fe.answer.replace(/[#*_`>\-]/g, '').replace(/\s+/g, ' ').trim();
      if (snippet.length > 90) snippet = snippet.slice(0, 90).replace(/\s+\S*$/, '') + '…';
      results.push({
        type: 'faq', score: score,
        label: fe.question,
        sub: snippet || 'FAQ',
        action: function(i){ return function(){ openFaqItem(i); }; }(idx)
      });
    }
  });

  results.sort(function(a,b){ return b.score - a.score; });
  renderSearchResults(q, results);
}

var TYPE_LABELS = { character: 'Character', lore: 'Lore', timeline: 'Timeline', faq: 'FAQ' };
var TYPE_COLORS = { character: 'var(--accent)', lore: 'var(--accent-light)', timeline: 'var(--text-secondary)', faq: 'var(--accent-light)' };

// Open the FAQ page and expand the Nth accordion item (matching faqEntries order).
function openFaqItem(idx) {
  loadLorePage('faq');
  setTimeout(function() {
    var items = document.querySelectorAll('#lore-detail-content .wiki-faq-item, .wiki-faq-item');
    var target = items[idx];
    if (!target) return;
    if (!target.classList.contains('open')) target.classList.add('open');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

function renderSearchResults(q, results) {
  showPage('search', false);
  document.querySelectorAll('.wiki-nav-link').forEach(function(l){ l.classList.remove('active'); });
  document.getElementById('search-results-title').textContent =
    results.length ? 'Results for "' + q + '"' : 'No results for "' + q + '"';

  var list = document.getElementById('search-results-list');
  list.innerHTML = '';

  if (!results.length) {
    list.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;margin-top:1rem">No pages matched your search. Try a different term.</p>';
    return;
  }

  var ul = document.createElement('div');
  ul.style.cssText = 'display:flex;flex-direction:column;gap:1px;background:var(--border);margin-top:1.5rem;';

  results.forEach(function(r) {
    var row = document.createElement('div');
    row.style.cssText = 'background:var(--bg-panel);padding:1rem 1.5rem;cursor:pointer;display:flex;align-items:center;gap:1rem;transition:background 0.15s;';
    var thumb = r.img
      ? '<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg-inset);border:1px solid var(--border)"><img src="'+r.img+'" style="width:100%;height:100%;object-fit:cover" /></div>'
      : '';
    row.innerHTML =
      '<div style="font-family:var(--font-caps);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:'+TYPE_COLORS[r.type]+';width:80px;flex-shrink:0">'+TYPE_LABELS[r.type]+'</div>' +
      thumb +
      '<div style="flex:1">' +
        '<div style="font-family:var(--font-display);font-style:italic;font-size:1.1rem;color:var(--text-primary)">' + r.label + '</div>' +
        '<div style="font-family:var(--font-caps);font-size:0.6rem;letter-spacing:0.1em;color:var(--text-secondary);margin-top:0.25rem">' + (r.sub||'') + '</div>' +
      '</div>' +
      '<div style="color:var(--text-secondary);font-size:0.9rem">→</div>';
    row.addEventListener('mouseenter', function(){ this.style.background='var(--bg-inset)'; });
    row.addEventListener('mouseleave', function(){ this.style.background='var(--bg-panel)'; });
    row.addEventListener('click', r.action);
    ul.appendChild(row);
  });

  list.appendChild(ul);
}
</script>
