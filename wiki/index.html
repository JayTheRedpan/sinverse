  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .wiki-app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
      transition: grid-template-columns 0.25s ease;
    }

    /* ── Top bar ── */
    .wiki-topbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 2rem;
    }
    .wiki-header-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      opacity: 0.85;
      transition: opacity 0.2s;
      display: block;
    }
    .wiki-topbar-brand { display: flex; align-items: center; }
    .wiki-topbar-brand:hover .wiki-header-logo { opacity: 1; }

    .wiki-topbar-logo {
      font-family: var(--font-caps);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .wiki-topbar-sep { color: var(--border-mid); }
    .wiki-topbar-title-block {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .wiki-topbar-title {
      font-family: var(--font-caps);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      line-height: 1;
    }
    .wiki-topbar-subtitle {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1;
    }
    @media (max-width: 768px) {
      .wiki-topbar-title-block { display: none; }
    }
    .wiki-search {
      margin-left: auto;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem 0.85rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-primary);
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .wiki-search:focus { border-color: var(--accent); }
    .wiki-search::placeholder { color: var(--text-muted); }

    /* ── Sidebar ── */
    .wiki-sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem 0;
      /* Sidebar stays fixed — content scrolls in wiki-main */
      position: sticky;
      top: 0;
      height: 100%;
    }
    .wiki-nav-section { margin-bottom: 0.25rem; }
    .wiki-nav-heading {
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.5rem 1.5rem 0.25rem;
    }
    .wiki-nav-link {
      display: block;
      padding: 0.4rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      cursor: pointer;
    }
    .wiki-nav-link:hover { color: var(--text-primary); background: var(--bg-inset); }
    .wiki-nav-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg-inset); }
    .wiki-nav-divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 1.5rem; }
    .wiki-unit-toggle {
      display: flex;
      gap: 0;
      padding: 0.75rem 1.5rem 0.5rem;
    }
    .wiki-unit-btn {
      flex: 1;
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border-mid);
      color: var(--text-muted);
      padding: 0.35rem 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .wiki-unit-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .wiki-unit-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; margin-left: -1px; }
    .wiki-unit-btn:hover  { color: var(--accent); border-color: var(--accent); z-index: 1; position: relative; }
    .wiki-unit-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); z-index: 2; position: relative; }

    /* ── Main content ── */
    .wiki-main {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3rem 4rem;
      height: 100%;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }
    /* Constrain article prose width within the expanding main. Centering the
       container keeps header/body/relationships/featured aligned in one column
       so wide screens don't strand all the empty space on the right. */
    #char-detail-content,
    #lore-detail-content {
      max-width: min(1100px, 100%);
      margin: 0 auto;
    }
    .wiki-md-content,
    .wiki-char-content,
    .wiki-intro-body,
    .wiki-cat-body,
    .wiki-search-results {
      max-width: min(1100px, 100%);
    }

    /* ── Page sections ── */
    .wiki-page { display: none; }
    .wiki-page.active { display: block; }

    /* ── World intro ── */
    .wiki-intro-eyebrow {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .wiki-intro-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 3rem;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .wiki-intro-lead {
      font-family: var(--font-body);
      font-size: 1.15rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 2.5rem;
      border-left: 2px solid var(--accent);
      padding-left: 1.25rem;
    }
    .wiki-section-title {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .wiki-lore-body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 1.5rem;
    }
    .wiki-char-relationships { margin: 2rem 0; }
    .wiki-rel-list { list-style: none; padding: 0; margin: 0; }
    .wiki-rel-list li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .wiki-rel-list li:last-child { border-bottom: none; }
    .wiki-rel-type {
      display: inline-block;
      min-width: 5.5rem;
      font-family: var(--font-caps);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .wiki-rel-link {
      color: var(--text-primary);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: var(--border-mid);
    }
    .wiki-rel-link:hover { color: var(--accent-light); }
    .wiki-rel-note { color: var(--text-muted); font-style: italic; }
    .wiki-rel-none { color: var(--text-muted); font-style: italic; font-family: var(--font-body); }
    .wiki-lore-body + .wiki-section-title { margin-top: 2.5rem; }

    /* ── FAQ ── */
    .wiki-faq-list { margin-top: 1.5rem; }
    .wiki-faq-item { border-bottom: 1px solid var(--border); }
    .wiki-faq-item:first-child { border-top: 1px solid var(--border); }
    .wiki-faq-q {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 1.15rem 2.5rem 1.15rem 0;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-primary);
      position: relative;
      transition: color 0.15s;
    }
    .wiki-faq-q:hover { color: var(--accent); }
    .wiki-faq-q::after {
      content: '+';
      position: absolute;
      right: 0.25rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-body);
      font-style: normal;
      font-size: 1.4rem;
      color: var(--accent);
      transition: transform 0.2s;
    }
    .wiki-faq-item.open .wiki-faq-q::after { content: '\2212'; }
    .wiki-faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .wiki-faq-a-inner {
      padding: 0 0 1.25rem;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
    }
    .wiki-faq-item.open .wiki-faq-a { max-height: 1200px; }

    /* ── Lore cards ── */
    .wiki-lore-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
    }
    .wiki-lore-card {
      background: var(--bg-panel);
      padding: 1.25rem;
    }
    .wiki-lore-card-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .wiki-lore-card-body {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Timeline ── */
    .wiki-tl-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.5rem 0 0.25rem;
    }
    .wiki-tl-controls-hint {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .wiki-tl-zoom { display: flex; gap: 4px; }
    .wiki-tl-zoom-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1;
      min-width: 30px;
      height: 28px;
      padding: 0 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .wiki-tl-zoom-reset { font-family: var(--font-caps); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .wiki-tl-zoom-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .wiki-tl-zoom-btn:disabled { opacity: 0.35; cursor: default; }
    .wiki-tl-zoom-btn:disabled:hover { border-color: var(--border-mid); color: var(--text-secondary); background: transparent; }

    .wiki-timeline-wrap {
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 3rem 1rem 1.5rem;
      margin-bottom: 1rem;
      cursor: grab;
      /* Horizontal drag pans the timeline; vertical gestures still scroll page */
      touch-action: pan-x pan-y;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    .wiki-timeline-wrap:active { cursor: grabbing; }
    /* Don't let the browser start a text selection while dragging */
    .wiki-timeline-wrap.dragging { user-select: none; }
    .wiki-timeline-wrap::-webkit-scrollbar { height: 4px; }
    .wiki-timeline-wrap::-webkit-scrollbar-track { background: transparent; }
    .wiki-timeline-wrap::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .wiki-timeline-track {
      position: relative;
      min-width: max-content;
      height: 230px;            /* slim band strip + baseline + staggered labels */
      padding-bottom: 1rem;
    }
    /* Era band layer sits behind the events */
    .wiki-tl-bands {
      position: absolute;
      top: 18px; left: 0; right: 0;    /* leave clear space above for the TDay point label */
      height: 34px;             /* slim name-only strip */
      z-index: 0;
    }
    .wiki-tl-band {
      position: absolute;
      top: 0;
      height: 34px;
      box-sizing: border-box;
      border-left: 1px solid var(--border-mid);
      border-right: 1px solid var(--border-mid);
      padding: 0 0.6rem;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .wiki-tl-band.band-a { background: rgba(196,154,120,0.07); }
    .wiki-tl-band.band-b { background: rgba(196,154,120,0.14); }
    .wiki-tl-band.band-present {
      background: rgba(122,34,51,0.12);
      border-left: 1px dashed var(--wine);
    }
    .wiki-tl-band-name {
      font-family: var(--font-caps);
      font-size: 0.64rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* TDay vertical divider */
    .wiki-tl-divider {
      position: absolute;
      top: -18px;               /* extend up through the clear zone above the bands */
      width: 2px;
      height: 78px;
      background: var(--accent);
      z-index: 3;               /* above bands so the TDay label never collides */
    }
    .wiki-tl-divider-label {
      position: absolute;
      top: -4px;                /* sits in the clear space above every era band */
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--bg);
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
      border: 1px solid var(--accent);
      border-radius: 2px;
      z-index: 4;
    }
    .wiki-timeline-line {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-mid);
      z-index: 0;
    }
    .wiki-timeline-event {
      position: absolute;
      top: 44px;                /* dot sits on the baseline (52px) */
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 110px;
      cursor: pointer;
      transition: opacity 0.15s;
      /* The wide container shouldn't steal clicks from neighbours — only the
         actual dot/date/title (below) are clickable. */
      pointer-events: none;
    }
    .wiki-timeline-event > * { pointer-events: auto; }
    /* Hovered event rises above its neighbours so clicks land where you point */
    .wiki-timeline-event:hover { z-index: 5; }
    /* When zoomed out and events crowd together, collapse to dots only.
       The label reappears on hover and as the user zooms in. */
    .wiki-timeline-event.dot-only .wiki-tl-date,
    .wiki-timeline-event.dot-only .wiki-tl-title { display: none; }
    .wiki-timeline-event.dot-only .wiki-tl-dot::after { display: none; }
    .wiki-timeline-event.dot-only:hover .wiki-tl-date,
    .wiki-timeline-event.dot-only:hover .wiki-tl-title {
      display: block;
      position: absolute;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      padding: 0.2rem 0.45rem;
      white-space: nowrap;
      z-index: 6;
    }
    .wiki-timeline-event.dot-only:hover .wiki-tl-title { top: 2.6rem; }
    /* Fully culled when zoomed way out and dots would overlap */
    .wiki-timeline-event.tl-hidden { display: none; }
    /* Staggered events drop their labels lower to avoid collisions */
    .wiki-timeline-event.staggered { top: 44px; }
    .wiki-timeline-event.staggered .wiki-tl-date { margin-top: 2.6rem; }
    .wiki-timeline-event.staggered .wiki-tl-dot::after {
      content: '';
      position: absolute;
      top: 11px;
      left: 50%;
      width: 1px;
      height: 2.4rem;
      background: var(--border-mid);
      transform: translateX(-50%);
    }
    .wiki-tl-dot { position: relative; }
    .wiki-timeline-event:hover { opacity: 0.85; }
    .wiki-timeline-event.anchor .wiki-tl-dot {
      background: var(--accent);
      width: 18px;
      height: 18px;
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }
    .wiki-timeline-event.anchor .wiki-tl-date { font-size: 0.78rem; color: var(--text-primary); }
    .wiki-timeline-event.anchor .wiki-tl-title { font-size: 1.05rem; }
    .wiki-tl-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      margin: 0 0 0.6rem;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .wiki-timeline-event.anchor .wiki-tl-dot {
      background: var(--accent);
      width: 15px;
      height: 15px;
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }
    .wiki-timeline-event:hover .wiki-tl-dot { background: var(--accent); }
    .wiki-tl-date {
      font-family: var(--font-caps);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.35rem;
      text-align: center;
      font-weight: 600;
    }
    .wiki-timeline-event.anchor .wiki-tl-date {
      font-size: 1rem;
      color: var(--text-primary);
    }
    .wiki-tl-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.35;
    }

    /* Timeline detail panel — inline below track */
    .wiki-tl-detail {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      margin-top: 2rem;
      animation: tl-fade-in 0.2s ease;
    }
    @keyframes tl-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .wiki-tl-detail.open { display: block; }
    .wiki-tl-detail-era {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .wiki-tl-era-link { color: var(--accent); cursor: pointer; }
    .wiki-tl-era-link:hover { text-decoration: underline; }
    /* Clickable era bands get a subtle hover lift */
    .wiki-tl-band[style*="cursor: pointer"]:hover,
    .wiki-tl-band:hover { filter: brightness(1.25); }
    .wiki-tl-divider:hover .wiki-tl-divider-label { background: var(--accent); color: var(--bg); }
    .wiki-tl-detail-date {
      font-family: var(--font-caps);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .wiki-tl-detail-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 0.85rem;
    }
    .wiki-tl-detail-body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .tl-related {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .tl-related-label {
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.25rem;
    }
    .tl-related-link {
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.2rem 0.6rem;
      transition: border-color 0.15s;
    }

<script>
// ── Wiki image helpers ────────────────────────────────────────
function renderWikiImages(container) {
  // Group consecutive figures into grid wrappers
  var figures = container.querySelectorAll('.wiki-img-figure');
  figures.forEach(function(fig) {
    // Unwrap from <p> tags that marked sometimes wraps around images
    if (fig.parentElement && fig.parentElement.tagName === 'P') {
      fig.parentElement.replaceWith(fig);
    }
  });
  // Group consecutive figures into a grid
  var allFigs = Array.from(container.querySelectorAll('.wiki-img-figure'));
  if (!allFigs.length) return;
  var groups = [], cur = [];
  allFigs.forEach(function(fig, i) {
    cur.push(fig);
    var next = allFigs[i + 1];
    if (!next || next.previousElementSibling !== fig) {
      groups.push(cur.slice());
      cur = [];
    }
  });
  groups.forEach(function(group) {
    var grid = document.createElement('div');
    grid.className = 'wiki-img-grid';
    group[0].parentElement.insertBefore(grid, group[0]);
    group.forEach(function(fig) { grid.appendChild(fig); });
  });
  // Wire lightbox
  container.querySelectorAll('.wiki-img-figure').forEach(function(fig) {
    fig.addEventListener('click', function() {
      var img = fig.querySelector('.wiki-img');
      var title = fig.querySelector('.wiki-img-title');
      var sub = fig.querySelector('.wiki-img-sub');
      document.getElementById('wiki-lightbox-img').src = img ? img.src : '';
      document.getElementById('wiki-lightbox-title').textContent = title ? title.textContent : '';
      document.getElementById('wiki-lightbox-sub').textContent = sub ? sub.textContent : '';
      document.getElementById('wiki-lightbox').classList.add('open');
    });
  });
}

document.getElementById('wiki-lightbox-close').addEventListener('click', function() {
  document.getElementById('wiki-lightbox').classList.remove('open');
});
document.getElementById('wiki-lightbox').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('wiki-lightbox').classList.remove('open');
});

// Configure marked to prevent link navigation
if (typeof marked !== 'undefined') {
  var renderer = new marked.Renderer();

  renderer.image = function(token) {
    var src  = typeof token === 'object' ? token.href  : token;
    var alt  = typeof token === 'object' ? token.text  : (arguments[2] || '');
    // Parse "Title | Caption" from alt text
    var parts = alt.split('|');
    var title   = parts[0] ? parts[0].trim() : '';
    var caption = parts[1] ? parts[1].trim() : '';
    return '<figure class="wiki-img-figure">' +
      '<img src="' + src + '" alt="' + title + '" class="wiki-img" loading="lazy" />' +
      (title || caption
        ? '<figcaption class="wiki-img-caption">' +
            (title   ? '<span class="wiki-img-title">'   + title   + '</span>' : '') +
            (caption ? '<span class="wiki-img-sub">'     + caption + '</span>' : '') +
          '</figcaption>'
        : '') +
      '</figure>';
  };

  renderer.link = function(token) {
    // Newer marked passes a token object; older versions pass (href, title, text)
    var href = typeof token === 'object' ? (token.href || '') : (token || '');
    var text = typeof token === 'object' ? (token.text || '') : (arguments[2] || '');
    if (href && (href.indexOf('http') === 0 || href.indexOf('mailto') === 0)) {
      return '<a href="' + href + '" target="_blank" rel="noopener">' + text + '</a>';
    }
    return '<span class="wiki-lore-link" data-target="' + href + '">' + text + '</span>';
  };
  marked.use({ renderer: renderer });
}

// ── State ──────────────────────────────────────────────────────
var characters = [];
var timelineEvents = [];
var currentCharSlug = null;
var activeTagFilter = null;

var LORE_PAGES = []; // loaded from lore.json
var faqEntries = []; // [{question, answer}] parsed from lore/faq.md for search

// Parse the FAQ markdown into {question, answer} pairs so individual questions
// are searchable. Each "## Question" heading starts a new entry; the text until
// the next heading is its answer (used for snippet + secondary matching).
function buildFaqIndex(md) {
  faqEntries = [];
  if (!md) return;
  // Drop frontmatter
  md = md.replace(/^---[\s\S]*?---\s*/, '');
  var parts = md.split(/^##\s+/m);
  parts.forEach(function(block) {
    block = block.trim();
    if (!block) return;
    var nl = block.indexOf('\n');
    var question = (nl === -1 ? block : block.slice(0, nl)).trim();
    var answer = (nl === -1 ? '' : block.slice(nl + 1)).trim();
    if (question) faqEntries.push({ question: question, answer: answer });
  });
}

// ── Navigation ────────────────────────────────────────────────
function showPage(id, pushState) {
  clearTimeout(searchTimeout); // cancel pending search
  document.querySelectorAll('.wiki-page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.wiki-nav-link').forEach(function(l) { l.classList.remove('active'); });
  var page = document.getElementById('page-' + id);
  if (page) page.classList.add('active');
  var link = document.querySelector('[data-page="' + id + '"]');
  if (link) link.classList.add('active');
  if (pushState !== false) {
    history.pushState({ type: 'page', id: id }, '', '#page-' + id);
  }
  // Sidebar behaviour on desktop: collapse only for the timeline (for a wider
  // view), keep it open everywhere else. This is per-view and never persisted.
  if (window.innerWidth > 768) {
    var app = document.querySelector('.wiki-app');
    if (app) {
      if (id === 'timeline') app.classList.add('sidebar-collapsed');
      else app.classList.remove('sidebar-collapsed');
    }
  }
  // When the timeline becomes visible, fit the full span to the viewport then
  // centre on TDay. (It can't be measured while hidden, so do it now.)
  if (id === 'timeline') {
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        fitTimelineToViewport();
        centerTimelineOnTDay();
      });
    });
  }
}

// Single delegated listener on the sidebar — handles static and dynamic links
document.getElementById('wiki-main').addEventListener('click', function(e) {
  var card = e.target.closest('[data-href]');
  if (card) { window.location.href = card.getAttribute('data-href'); return; }
  var loreLink = e.target.closest('.wiki-lore-link[data-target]');
  if (loreLink) {
    var t = loreLink.getAttribute('data-target');
    var isLore = LORE_PAGES.find(function(p){ return p.id===t; });
    if (isLore) { loadLorePage(t); return; }
    var cByName = characters.find(function(c){ return c.name.toLowerCase()===t.toLowerCase(); });
    if (cByName) { loadCharPage(cByName.id); return; }
  }
});

document.querySelector('.wiki-sidebar').addEventListener('click', function(e) {
  var link = e.target.closest('.wiki-nav-link');
  if (!link) return;
  document.querySelectorAll('.wiki-nav-link').forEach(function(l){ l.classList.remove('active'); });
  link.classList.add('active');

  var page = link.getAttribute('data-page');
  var cat  = link.getAttribute('data-category');
  var charId = link.getAttribute('data-char-id');
  var lore = link.getAttribute('data-lore');

  if (charId) { loadCharPage(parseInt(charId)); }
  else if (lore) { loadLorePage(lore); }
  else if (cat) { showCategory(cat); }
  else if (page) { showPage(page); }
});


// ── Load data ─────────────────────────────────────────────────
var wikiMetric = localStorage.getItem('wiki-metric') === 'true';

// Format an in-universe date integer (years relative to TDay) as a T±N label
function fTDate(d) {
  if (d === null || d === undefined || d === '') return 'TBD';
  var n = parseInt(d, 10);
  if (isNaN(n)) return 'TBD';
  if (n === 0) return 'T\u00b10';
  return n > 0 ? 'T+' + n : 'T' + n;  // negative already has minus sign
}

function fH(inches) {
  if (wikiMetric) {
    var cm = Math.round(inches * 2.54);
    if (cm >= 100) return (cm / 100).toFixed(2).replace(/\.?0+$/, '') + ' m';
    return cm + ' cm';
  }
  var ft = Math.floor(inches / 12), ins = Math.round(inches % 12);
  return ft + "'" + ins + '"';
}
function fW(lbs) {
  if (!lbs) return '—';
  if (wikiMetric) {
    var kg = lbs * 0.453592;
    if (kg >= 1000) return (kg/1000).toFixed(1).replace(/\.0$/,'') + ' t';
    return Math.round(kg).toLocaleString() + ' kg';
  }
  // Switch to tons at ~1 ton (2000 lbs) so imperial and metric agree on scale.
  if (lbs >= 2000) return (lbs/2000).toFixed(1).replace(/\.0$/,'') + ' tons';
  return Math.round(lbs).toLocaleString() + ' lbs';
}
// Length: stay in inches until 12" (a penis length reads as 5", not 0'5"),
// then switch to feet/inches. Metric: cm until 100, then metres.
function fLen(inches) {
  if (wikiMetric) {
    var cm = Math.round(inches * 2.54);
    if (cm >= 100) return (cm / 100).toFixed(2).replace(/\.?0+$/, '') + ' m';
    return cm + ' cm';
  }
  if (inches >= 12) {
    var ft = Math.floor(inches / 12), ins = Math.round(inches % 12);
    return ft + "'" + ins + '"';
  }
  return (Math.round(inches * 10) / 10) + '"';
}

var galleryItems = [];
var libraryItems = [];
var erasData = [];

Promise.all([
  fetch('../_data/characters.json').then(function(r){ return r.json(); }),
  fetch('timeline.json').then(function(r){ return r.json(); }),
  fetch('lore.json').then(function(r){ return r.json(); }),
  fetch('../gallery/gallery.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('../library/library.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('eras.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('lore/faq.md').then(function(r){ return r.text(); }).catch(function(){ return ''; })
]).then(function(results) {
  characters = results[0];
  timelineEvents = results[1];
  LORE_PAGES = results[2];
  galleryItems = results[3];
  libraryItems = results[4];
  erasData = results[5] || [];
  buildFaqIndex(results[6] || '');
  buildLoreSidebar();
  buildTimeline();
  initTimelineZoom();
  buildCharGrid(characters);

  // Restore page from URL hash if returning via browser Back from gallery/library
  var restoreHash = window._restoreHash;
  if (restoreHash) {
    window._restoreHash = null;
    var charMatch = restoreHash.match(/^#char-(.+)$/);
    var loreMatch = restoreHash.match(/^#lore-(.+)$/);
    var catMatch  = restoreHash.match(/^#cat-(.+)$/);
    var pageMatch = restoreHash.match(/^#page-(.+)$/);
    if (charMatch) {
      var ref = decodeURIComponent(charMatch[1]);
      var c = characters.find(function(x){ return x.wiki === ref; })
           || (/^\d+$/.test(ref) ? characters.find(function(x){ return x.id === parseInt(ref); }) : null);
      if (c) loadCharPage(c.id, false);
    }
    else if (loreMatch) { loadLorePage(loreMatch[1], false); }
    else if (catMatch) {
      var section = decodeURIComponent(catMatch[1].replace(/-/g, ' '));
      // Capitalise each word to match section names
      section = section.replace(/\w/g, function(c){ return c.toUpperCase(); });
      showCategory(section, false);
    } else if (pageMatch) { showPage(pageMatch[1], false); }
    return; // skip ?character= param handling below
  }

  // Handle ?character= param from gallery/library links
  var urlParams = new URLSearchParams(window.location.search);
  var charParam = urlParams.get('character');
  if (charParam) {
    var charNameParam = decodeURIComponent(charParam).toLowerCase();
    var matchChar = characters.find(function(c){ return c.name.toLowerCase() === charNameParam; });
    if (matchChar) {
      loadCharPage(matchChar.id);
    } else {
      // Character not in characters.json — show dedicated not-found page
      document.getElementById('nf-name').textContent = decodeURIComponent(charParam);
      showPage('not-found', false);
      history.replaceState({ type: 'page', id: 'not-found' }, '', '#not-found');
    }
  } else {
    // Fresh visit with no deep-link: show the default landing page.
    loadLorePage('world-of-sinverse', false);
  }
}).catch(function(e) {
  console.error('Failed to load wiki data:', e);
});

// ── Lore sidebar ─────────────────────────────────────────────
function buildLoreSidebar() {
  console.log('[nav] buildLoreSidebar called, LORE_PAGES:', LORE_PAGES ? LORE_PAGES.length : 'undefined');
  var container = document.getElementById('sidebar-lore-cats');
  container.innerHTML = '';
  var sections = [];
  LORE_PAGES.forEach(function(lp) {
    if (sections.indexOf(lp.section) === -1) sections.push(lp.section);
  });
  sections.forEach(function(sec) {
    var a = document.createElement('a');
    a.className = 'wiki-nav-link';
    a.setAttribute('data-category', sec);
    a.textContent = sec;
    container.appendChild(a);
  });
}

function showCategory(section, pushState) {
  if (pushState !== false) history.pushState({ type: 'category', id: section }, '', '#cat-' + section.toLowerCase().replace(/\s+/g, '-'));
  document.getElementById('cat-eyebrow').textContent = 'Browse';
  document.getElementById('cat-title').textContent = section;
  var grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  var items = LORE_PAGES.filter(function(lp){ return lp.section === section; });
  // Render as a simple card list
  var list = document.createElement('div');
  list.style.cssText = 'display:flex;flex-direction:column;gap:1px;background:var(--border);';
  items.forEach(function(lp) {
    var card = document.createElement('div');
    card.style.cssText = 'background:var(--bg-panel);padding:1.1rem 1.5rem;cursor:pointer;transition:background 0.15s;';
    card.innerHTML = '<div style="font-family:var(--font-display);font-style:italic;font-size:1.15rem;color:var(--text-primary);margin-bottom:0.25rem">' + lp.label + '</div>';
    card.addEventListener('mouseenter', function(){ this.style.background='var(--bg-inset)'; });
    card.addEventListener('mouseleave', function(){ this.style.background='var(--bg-panel)'; });
    card.addEventListener('click', function(){ loadLorePage(lp.id); });
    list.appendChild(card);
  });
  grid.appendChild(list);
  showPage('category', false);
}


// Render FAQ markdown (## Question followed by answer paragraphs) as an accordion.
function renderFaqMarkdown(md) {
  // Split on level-2 headings; each becomes a Q/A item.
  var parts = md.split(/^##\s+/m).filter(function(s){ return s.trim(); });
  // Any preamble before the first ## (no heading marker) shows as lead text.
  var lead = '';
  if (md.trim() && md.trim().indexOf('##') !== 0) {
    var pre = md.split(/^##\s+/m)[0].trim();
    if (pre) { lead = '<p class="wiki-lore-body" style="margin-top:1rem">' + marked.parseInline(pre) + '</p>'; parts.shift(); }
  }
  var items = parts.map(function(block) {
    var nl = block.indexOf('\n');
    var question = (nl < 0 ? block : block.slice(0, nl)).trim();
    var answer   = (nl < 0 ? '' : block.slice(nl + 1)).trim();
    return '<div class="wiki-faq-item">' +
             '<button class="wiki-faq-q">' + marked.parseInline(question) + '</button>' +
             '<div class="wiki-faq-a"><div class="wiki-faq-a-inner">' + marked.parse(answer) + '</div></div>' +
           '</div>';
  }).join('');
  return lead + '<div class="wiki-faq-list">' + items + '</div>';
}

function loadLorePage(id, pushState) {
  // Resolve aliases (e.g. the "era-tday" Eras entry points to the detailed
  // "tday" page) so both categories share a single source page.
  var aliasEntry = LORE_PAGES.find(function(p){ return p.id === id; });
  if (aliasEntry && aliasEntry.aliasOf) { id = aliasEntry.aliasOf; }
  // lp is the manifest entry if this page is a categorised lore page; top-level
  // pages (world-of-sinverse, faq) have no manifest entry and that's fine —
  // their title/eyebrow come from the markdown frontmatter.
  var lp = LORE_PAGES.find(function(p){ return p.id === id; }) || { id: id, label: id, section: '' };
  var container = document.getElementById('lore-detail-content');
  container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;padding:2rem 0">Loading…</p>';
  showPage('lore', false);
  if (pushState !== false) history.pushState({ type: 'lore', id: id }, '', '#lore-' + id);
  // Highlight sidebar
  document.querySelectorAll('.wiki-nav-link').forEach(function(l){ l.classList.remove('active'); });
  var loreNavLink = document.querySelector('.wiki-nav-link[data-lore="' + id + '"]');
  if (loreNavLink) loreNavLink.classList.add('active');

  var loadId = id; // capture to detect stale fetch
  fetch('lore/' + id + '.md')
    .then(function(r){ return r.ok ? r.text() : null; })
    .then(function(md) {
      // Discard if another navigation happened while fetching
      if (!document.getElementById('page-lore').classList.contains('active')) return;
      if (!md) {
        container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic">No page found.</p>';
        return;
      }
      // Strip frontmatter, extract title + eyebrow + faq flag
      var titleMatch   = md.match(new RegExp('^title: *(.+)$', 'm'));
      var eyebrowMatch = md.match(new RegExp('^eyebrow: *(.+)$', 'm'));
      var isFaq        = /^faq: *true *$/m.test(md);
      var title   = titleMatch ? titleMatch[1].trim() : lp.label;
      var eyebrow = eyebrowMatch ? eyebrowMatch[1].trim() : (lp.section || 'Lore');
      var stripped = md.replace(new RegExp('^---[^]*?---\n'), '');

      var body;
      if (isFaq) {
        body = renderFaqMarkdown(stripped);
      } else {
        // marked renderer handles [link](id) → wiki-lore-link spans
        body = '<div class="wiki-md-content">' + marked.parse(stripped) + '</div>';
      }
      container.innerHTML =
        '<div class="wiki-intro-eyebrow">' + eyebrow + '</div>' +
        '<h1 class="wiki-intro-title">' + title + '</h1>' +
        body;
      renderWikiImages(container);
      // Wire lore links
      container.querySelectorAll('.wiki-lore-link').forEach(function(el) {
        el.style.cssText = 'color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border-mid);';
        el.addEventListener('click', function() {
          var t = this.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id===t; });
          if (isLore) loadLorePage(t);
          else {
            // Try match by name (e.g. [Sin](sin)) then by numeric id
            var cByName = characters.find(function(c){ return c.name.toLowerCase() === t.toLowerCase(); });
            if (cByName) loadCharPage(cByName.id);
            else {
              var charId = parseInt(t);
              if (!isNaN(charId)) loadCharPage(charId);
            }
          }
        });
      });
    });
}


// Sidebar collapse toggle (desktop)
var sidebarToggle = document.getElementById('wiki-sidebar-toggle');
// Align the toggle flush with the bottom of the topbar (auto-tracks its height)
function alignSidebarToggle() {
  var tb = document.querySelector('.wiki-topbar');
  if (tb && sidebarToggle) sidebarToggle.style.top = tb.offsetHeight + 'px';
}
alignSidebarToggle();
window.addEventListener('resize', alignSidebarToggle);
var wikiApp = document.querySelector('.wiki-app');
if (sidebarToggle && wikiApp) {
  // Restore saved state
  // Unit toggle — two-button pair
  var wikiBtnImp = document.getElementById('wiki-btn-imperial');
  var wikiBtnMet = document.getElementById('wiki-btn-metric');
  function applyWikiUnit() {
    if (wikiBtnImp) wikiBtnImp.classList.toggle('active', !wikiMetric);
    if (wikiBtnMet) wikiBtnMet.classList.toggle('active',  wikiMetric);
    // Update any visible height/length values in place
    document.querySelectorAll('.char-stat-val[data-inches]').forEach(function(el) {
      el.textContent = fH(parseFloat(el.getAttribute('data-inches')));
    });
  }
  applyWikiUnit();
  if (wikiBtnImp) wikiBtnImp.addEventListener('click', function() {
    wikiMetric = false; localStorage.setItem('wiki-metric', 'false'); applyWikiUnit();
  });
  if (wikiBtnMet) wikiBtnMet.addEventListener('click', function() {
    wikiMetric = true;  localStorage.setItem('wiki-metric', 'true');  applyWikiUnit();
  });

  // Sidebar always starts open on load; collapse is a per-view/manual action
  // and is not persisted across visits.
  sidebarToggle.addEventListener('click', function() {
    wikiApp.classList.toggle('sidebar-collapsed');
  });
}

// ── Timeline ──────────────────────────────────────────────────
var TL_PX_PER_YEAR = 88;        // horizontal scale, adjusted by zoom controls
var TL_PX_MIN = 6, TL_PX_MAX = 200, TL_PX_STEP = 22, TL_PX_DEFAULT = 88;

function buildTimeline() {
  var container = document.getElementById('timeline-container');
  container.innerHTML = '';

  // --- Scale setup ---------------------------------------------------------
  // Events are positioned by their actual date so era widths reflect real
  // time spans. Null-date events (ongoing/TBD) go in a "Present" zone at the end.
  var PX_PER_YEAR = TL_PX_PER_YEAR;  // horizontal scale (zoom-controlled)
  var EDGE_PAD    = 90;       // padding at each end of the track
  var PRESENT_W   = 240;      // width of the ongoing/TBD zone

  function evDate(ev) {
    return (ev.date === null || ev.date === undefined) ? null : (parseInt(ev.date, 10) || 0);
  }

  var dated = timelineEvents.filter(function(ev){ return evDate(ev) !== null; });
  var undated = timelineEvents.filter(function(ev){ return evDate(ev) === null; });

  // Determine the year range across both events and eras
  var years = dated.map(evDate);
  erasData.forEach(function(era){
    if (era.start !== null && era.start !== undefined) years.push(era.start);
    if (era.end   !== null && era.end   !== undefined) years.push(era.end);
  });
  if (!years.length) years = [0];
  var minYear = Math.min.apply(null, years);
  var maxYear = Math.max.apply(null, years);
  // Pad the range slightly so edge eras/events aren't flush against the ends
  minYear -= 1; maxYear += 1;

  function xForYear(y) { return EDGE_PAD + (y - minYear) * PX_PER_YEAR; }
  var datedWidth = xForYear(maxYear) + EDGE_PAD;
  var totalWidth = datedWidth + (undated.length ? PRESENT_W : 0);

  // --- Track scaffold ------------------------------------------------------
  var trackWrap = document.createElement('div');
  trackWrap.className = 'wiki-timeline-wrap';

  var track = document.createElement('div');
  track.className = 'wiki-timeline-track';
  track.style.width = totalWidth + 'px';
  track.style.minWidth = totalWidth + 'px';

  // --- Era bands (behind events) -------------------------------------------
  var bandLayer = document.createElement('div');
  bandLayer.className = 'wiki-tl-bands';

  // Clicking an era band/divider opens its lore page (era-<id>), if it exists.
  function wireEraClick(el, eraId) {
    var loreId = 'era-' + eraId;
    var exists = LORE_PAGES.find(function(p){ return p.id === loreId; });
    if (!exists) return;
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      loadLorePage(loreId);
    });
  }

  erasData.forEach(function(era, i) {
    if (era.point) {
      // A single-moment era (TDay) — render as a vertical divider, not a band
      var x = xForYear(era.start);
      var div = document.createElement('div');
      div.className = 'wiki-tl-divider';
      div.style.left = x + 'px';
      div.innerHTML = '<span class="wiki-tl-divider-label">' + era.name + '</span>';
      div.title = era.description ? era.description + ' — click to read more' : '';
      wireEraClick(div, era.id);
      bandLayer.appendChild(div);
      return;
    }
    var startY = (era.start === null || era.start === undefined) ? minYear : era.start;
    var endY   = (era.end   === null || era.end   === undefined) ? maxYear : era.end;
    var left  = xForYear(startY);
    // Era boundaries are shared instants (one era's end == the next era's start),
    // so a band spans exactly start→end with no extra year — adjacent bands meet
    // cleanly at the boundary without overlapping.
    var right = xForYear(endY);
    var band = document.createElement('div');
    band.className = 'wiki-tl-band ' + (i % 2 === 0 ? 'band-a' : 'band-b');
    band.style.left  = left + 'px';
    band.style.width = (right - left) + 'px';
    band.innerHTML = '<div class="wiki-tl-band-name">' + era.name + '</div>';
    band.title = (era.description || era.name) + ' — click to read more';
    wireEraClick(band, era.id);
    bandLayer.appendChild(band);
  });

  // Present / ongoing zone for undated events
  if (undated.length) {
    var pband = document.createElement('div');
    pband.className = 'wiki-tl-band band-present';
    pband.style.left  = datedWidth + 'px';
    pband.style.width = PRESENT_W + 'px';
    pband.innerHTML = '<div class="wiki-tl-band-name">The Present</div>';
    bandLayer.appendChild(pband);
  }

  track.appendChild(bandLayer);

  // --- Baseline line -------------------------------------------------------
  var line = document.createElement('div');
  line.className = 'wiki-timeline-line';
  track.appendChild(line);

  // --- Detail panel --------------------------------------------------------
  var detail = document.createElement('div');
  detail.className = 'wiki-tl-detail';
  detail.id = 'tl-detail';
  var openId = null;

  // --- Event markers -------------------------------------------------------
  function eraForDate(d) {
    if (d === null || d === undefined) return null;
    // Prefer an exact point-era match (e.g. TDay at year 0)
    for (var p = 0; p < erasData.length; p++) {
      if (erasData[p].point && erasData[p].start === d) return erasData[p];
    }
    // Then prefer a non-point era that STARTS at this year (boundary years
    // belong to the era beginning there, not the one ending there)
    for (var q = 0; q < erasData.length; q++) {
      if (!erasData[q].point && erasData[q].start === d) return erasData[q];
    }
    // Otherwise fall back to whichever range contains the year
    for (var i = 0; i < erasData.length; i++) {
      var e = erasData[i];
      if (e.point) continue;
      var s = (e.start === null || e.start === undefined) ? -Infinity : e.start;
      var en = (e.end === null || e.end === undefined) ? Infinity : e.end;
      if (d >= s && d <= en) return e;
    }
    return null;
  }
  function eraEyebrowHtml(d) {
    var e = eraForDate(d);
    if (!e) return 'The Present';
    var loreId = 'era-' + e.id;
    var exists = LORE_PAGES.find(function(p){ return p.id === loreId; });
    if (exists) {
      return '<span class="wiki-lore-link wiki-tl-era-link" data-target="' + loreId + '">' + e.name + '</span>';
    }
    return e.name;
  }

  function placeEvent(ev, x, stagger) {
    var node = document.createElement('div');
    node.className = 'wiki-timeline-event' + (ev.era === 'anchor' ? ' anchor' : '') + (stagger ? ' staggered' : '');
    node.style.left = x + 'px';

    var dot = document.createElement('div');
    dot.className = 'wiki-tl-dot';
    var date = document.createElement('div');
    date.className = 'wiki-tl-date';
    date.textContent = fTDate(ev.date);
    var title = document.createElement('div');
    title.className = 'wiki-tl-title';
    title.textContent = ev.title;

    node.appendChild(dot);
    node.appendChild(date);
    node.appendChild(title);
    node.setAttribute('data-ev-id', ev.id);

    node.addEventListener('click', function() {
      var wasOpen = openId === ev.id;
      document.querySelectorAll('.wiki-tl-dot').forEach(function(d){ d.style.background = ''; });
      if (wasOpen) { detail.classList.remove('open'); openId = null; return; }
      dot.style.background = 'var(--accent)';
      var relatedHtml = '';
      if (ev.tags && ev.tags.length) {
        var relLinks = ev.tags.map(function(tag) {
          var lp = LORE_PAGES.find(function(p){ return p.id === tag; });
          var ch = characters.find(function(c){ return c.name.toLowerCase() === tag; });
          if (lp) return '<span class="tl-related-link wiki-lore-link" data-target="' + tag + '">' + lp.label + '</span>';
          if (ch) return '<span class="tl-related-link wiki-lore-link" data-target="' + ch.name.toLowerCase() + '">' + ch.name + '</span>';
          return null;
        }).filter(Boolean);
        if (relLinks.length) relatedHtml = '<div class="tl-related"><span class="tl-related-label">Related</span>' + relLinks.join('') + '</div>';
      }
      detail.innerHTML =
        '<button class="wiki-tl-detail-close" id="tl-close">Close \u2715</button>' +
        '<div class="wiki-tl-detail-era">' + eraEyebrowHtml(evDate(ev)) + '</div>' +
        '<div class="wiki-tl-detail-date">' + fTDate(ev.date) + '</div>' +
        '<div class="wiki-tl-detail-title">' + ev.title + '</div>' +
        '<div class="wiki-tl-detail-body">' + ev.summary + '</div>' +
        relatedHtml;
      detail.classList.add('open');
      openId = ev.id;
      document.getElementById('tl-close').addEventListener('click', function(e) {
        e.stopPropagation();
        detail.classList.remove('open');
        dot.style.background = '';
        openId = null;
      });
      detail.querySelectorAll('.wiki-lore-link').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          var t = this.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id===t; });
          if (isLore) loadLorePage(t);
          else {
            var cByName = characters.find(function(c){ return c.name.toLowerCase()===t.toLowerCase(); });
            if (cByName) loadCharPage(cByName.id);
          }
        });
      });
    });

    track.appendChild(node);
  }

  dated.slice().sort(function(a,b){ return evDate(a) - evDate(b); })
       .forEach(function(ev, i){ placeEvent(ev, xForYear(evDate(ev)), i % 2 === 1); });

  // Undated events spread across the Present zone
  undated.forEach(function(ev, i) {
    var x = datedWidth + (PRESENT_W / (undated.length + 1)) * (i + 1);
    placeEvent(ev, x, i % 2 === 1);
  });

  trackWrap.appendChild(track);
  container.appendChild(trackWrap);
  enableDragScroll(trackWrap);
  // Remember where TDay (T±0) sits so the view can centre on it,
  // and the dated year span so the view can fit-to-content.
  trackWrap._tdayX = xForYear(0);
  trackWrap._minYear = minYear;
  trackWrap._maxYear = maxYear;
  trackWrap._edgePad = EDGE_PAD;

  var fn = document.createElement('p');
  fn.className = 'wiki-tl-footnote';
  fn.innerHTML = 'Dates relative to TDay (T&plusmn;0) — <em>T-N</em> = N years before; <em>T+N</em> = N years after. Bands mark the eras; click any event to expand.';
  container.appendChild(fn);
  container.appendChild(detail);

  // Collapse crowded event labels to dots at the current zoom level
  applyEventDensity();
}


// Drag-to-pan for the timeline (mouse + touch via pointer events). Suppresses
// the click that would otherwise fire on an event after a real drag.
function enableDragScroll(el) {
  var isDown = false, startX = 0, startScroll = 0, moved = false;
  var DRAG_THRESHOLD = 5; // px before it counts as a drag (not a click)

  el.style.cursor = 'grab';

  el.addEventListener('pointerdown', function(e) {
    // Ignore non-primary buttons
    if (e.button !== undefined && e.button !== 0) return;
    isDown = true;
    moved = false;
    startX = e.clientX;
    startScroll = el.scrollLeft;
    el.style.cursor = 'grabbing';
    el.style.userSelect = 'none';
  });

  el.addEventListener('pointermove', function(e) {
    if (!isDown) return;
    var dx = e.clientX - startX;
    if (Math.abs(dx) > DRAG_THRESHOLD) {
      moved = true;
      // Capture the pointer once we know it's a drag so it keeps tracking
      // even if the cursor leaves the element.
      if (el.setPointerCapture) { try { el.setPointerCapture(e.pointerId); } catch (err) {} }
    }
    if (moved) {
      el.scrollLeft = startScroll - dx;
      e.preventDefault();
    }
  });

  function endDrag(e) {
    if (!isDown) return;
    isDown = false;
    el.style.cursor = 'grab';
    el.style.userSelect = '';
    if (el.releasePointerCapture && e && e.pointerId !== undefined) {
      try { el.releasePointerCapture(e.pointerId); } catch (err) {}
    }
  }
  el.addEventListener('pointerup', endDrag);
  el.addEventListener('pointercancel', endDrag);
  el.addEventListener('pointerleave', function(e) { if (!el.hasPointerCapture || !el.hasPointerCapture(e.pointerId)) endDrag(e); });

  // Swallow the click that follows a drag, so panning doesn't open a detail panel
  el.addEventListener('click', function(e) {
    if (moved) {
      e.stopPropagation();
      e.preventDefault();
      moved = false;
    }
  }, true);
}


// Zoom controls for the timeline. Adjusting the scale rebuilds the timeline,
// preserving the scroll centre so the view stays anchored.
function rebuildTimelinePreservingCenter() {
  var wrap = document.querySelector('.wiki-timeline-wrap');
  var centerRatio = 0.5;
  if (wrap && wrap.scrollWidth > wrap.clientWidth) {
    centerRatio = (wrap.scrollLeft + wrap.clientWidth / 2) / wrap.scrollWidth;
  }
  buildTimeline();
  var nw = document.querySelector('.wiki-timeline-wrap');
  if (nw && nw.scrollWidth > nw.clientWidth) {
    nw.scrollLeft = centerRatio * nw.scrollWidth - nw.clientWidth / 2;
  }
  updateZoomButtons();
}

// Rebuild the timeline while keeping the content under a given screen x-offset
// (relative to the wrap's left edge) anchored in place — used for wheel zoom.
function rebuildTimelineAnchoredAt(offsetX) {
  var wrap = document.querySelector('.wiki-timeline-wrap');
  // Convert the cursor's screen x to the YEAR under it, using the pre-zoom
  // scale. After rebuild we scroll so that same year sits back under the
  // cursor. (A width-ratio anchor drifts because the edge padding and the
  // "Present" zone are fixed-width and don't scale with zoom.)
  var anchorYear = null;
  if (wrap && wrap._minYear !== undefined) {
    var contentX = wrap.scrollLeft + offsetX;           // x within the track
    anchorYear = wrap._minYear + (contentX - wrap._edgePad) / TL_PX_PER_YEAR_PREV();
  }
  buildTimeline();
  var nw = document.querySelector('.wiki-timeline-wrap');
  if (nw && anchorYear !== null && nw._minYear !== undefined) {
    var newContentX = nw._edgePad + (anchorYear - nw._minYear) * TL_PX_PER_YEAR;
    nw.scrollLeft = newContentX - offsetX;
  }
  _tlPrevScale = null;
  updateZoomButtons();
}
// The scale used to render the timeline currently on screen. We snapshot it
// before each zoom so the anchor conversion uses the pre-change scale.
var _tlPrevScale = null;
function TL_PX_PER_YEAR_PREV() { return _tlPrevScale !== null ? _tlPrevScale : TL_PX_PER_YEAR; }

// Choose an initial zoom so the entire dated span fits the viewport width
// (clamped to the zoom limits), then rebuild at that scale. This keeps even a
// very long era on-screen at first load; the user can zoom in for detail.
function fitTimelineToViewport() {
  var wrap = document.querySelector('.wiki-timeline-wrap');
  if (!wrap || wrap._minYear === undefined) return;
  var span = wrap._maxYear - wrap._minYear;
  if (span <= 0) return;
  var avail = wrap.clientWidth - (wrap._edgePad * 2);
  if (avail <= 0) return;
  var fitPx = avail / span;
  // Clamp into the allowed zoom range; round to a tidy step
  fitPx = Math.max(TL_PX_MIN, Math.min(TL_PX_MAX, Math.floor(fitPx)));
  if (fitPx !== TL_PX_PER_YEAR) {
    TL_PX_PER_YEAR = fitPx;
    buildTimeline();
    updateZoomButtons();
  }
}


// Level-of-detail for events. Two thresholds, applied left-to-right per row
// (staggered vs not, which don't collide vertically):
//   • DOT_GAP   — if a dot is closer than this to the last *visible* dot, hide
//                 it entirely so far-out views don't smear into a blob.
//   • LABEL_GAP — a visible dot only shows its label if it clears this much
//                 room from the last *labelled* dot; otherwise it's dot-only.
// The TDay anchor always stays fully visible.
function applyEventDensity() {
  var track = document.querySelector('.wiki-timeline-track');
  if (!track) return;
  var DOT_GAP = 13;
  var LABEL_GAP = 110;
  var events = Array.prototype.slice.call(track.querySelectorAll('.wiki-timeline-event'));
  events.sort(function(a, b){ return parseFloat(a.style.left) - parseFloat(b.style.left); });
  var lastDot   = { top: -Infinity, bottom: -Infinity };
  var lastLabel = { top: -Infinity, bottom: -Infinity };
  events.forEach(function(ev) {
    var x = parseFloat(ev.style.left) || 0;
    var row = ev.classList.contains('staggered') ? 'bottom' : 'top';

    // Anchor (TDay) is never culled
    if (ev.classList.contains('anchor')) {
      ev.classList.remove('dot-only', 'tl-hidden');
      lastDot[row] = x; lastLabel[row] = x;
      return;
    }

    // Tier 1: hide the dot if it would overlap the previous visible dot
    if (x - lastDot[row] < DOT_GAP) {
      ev.classList.add('tl-hidden');
      ev.classList.remove('dot-only');
      return;
    }
    ev.classList.remove('tl-hidden');
    lastDot[row] = x;

    // Tier 2: show the label only if there's room; otherwise dot-only
    if (x - lastLabel[row] < LABEL_GAP) {
      ev.classList.add('dot-only');
    } else {
      ev.classList.remove('dot-only');
      lastLabel[row] = x;
    }
  });
}

// Scroll the timeline so TDay (T\u00b10) is centred in the viewport.
function centerTimelineOnTDay() {
  var wrap = document.querySelector('.wiki-timeline-wrap');
  if (!wrap || wrap._tdayX === undefined) return;
  var target = wrap._tdayX - wrap.clientWidth / 2;
  wrap.scrollLeft = Math.max(0, target);
}

function updateZoomButtons() {
  var out = document.getElementById('tl-zoom-out');
  var inc = document.getElementById('tl-zoom-in');
  if (out) out.disabled = TL_PX_PER_YEAR <= TL_PX_MIN;
  if (inc) inc.disabled = TL_PX_PER_YEAR >= TL_PX_MAX;
}

function initTimelineZoom() {
  var out = document.getElementById('tl-zoom-out');
  var inc = document.getElementById('tl-zoom-in');
  var reset = document.getElementById('tl-zoom-reset');
  if (out) out.addEventListener('click', function() {
    TL_PX_PER_YEAR = Math.max(TL_PX_MIN, TL_PX_PER_YEAR / 1.35);
    rebuildTimelinePreservingCenter();
  });
  if (inc) inc.addEventListener('click', function() {
    TL_PX_PER_YEAR = Math.min(TL_PX_MAX, TL_PX_PER_YEAR * 1.35);
    rebuildTimelinePreservingCenter();
  });
  if (reset) reset.addEventListener('click', function() {
    // "Fit" returns to the whole-span view centred on TDay
    fitTimelineToViewport();
    centerTimelineOnTDay();
  });

  // Wheel over the timeline zooms (toward the cursor) instead of scrolling the
  // page. Attached to the container so it persists across rebuilds.
  var container = document.getElementById('timeline-container');
  if (container && !container._wheelZoomBound) {
    container._wheelZoomBound = true;
    var lastWheelZoom = 0;
    container.addEventListener('wheel', function(e) {
      var wrap = e.target.closest ? e.target.closest('.wiki-timeline-wrap') : null;
      if (!wrap) return;
      var delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
      if (delta === 0) return;
      e.preventDefault();
      // Light throttle so one trackpad swipe doesn't fire dozens of rebuilds
      var now = Date.now();
      if (now - lastWheelZoom < 60) return;
      lastWheelZoom = now;
      var rect = wrap.getBoundingClientRect();
      var offsetX = e.clientX - rect.left;   // cursor x within the wrap
      var prev = TL_PX_PER_YEAR;
      // Multiplicative zoom — each tick scales by a fixed ratio, so the change
      // feels the same whether you're zoomed way out or way in (additive steps
      // felt fine when zoomed in but doubled the scale when zoomed out).
      var factor = delta < 0 ? 1.18 : 1 / 1.18;
      var next = TL_PX_PER_YEAR * factor;
      next = Math.max(TL_PX_MIN, Math.min(TL_PX_MAX, next));
      if (Math.abs(next - prev) > 0.01) {
        _tlPrevScale = prev;          // remember the on-screen scale for anchoring
        TL_PX_PER_YEAR = next;
        rebuildTimelineAnchoredAt(offsetX);
      }
    }, { passive: false });
  }

  updateZoomButtons();
}

// ── Character grid ────────────────────────────────────────────
function buildCharGrid(chars) {
  chars = chars.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
  var grid = document.getElementById('char-grid');
  grid.innerHTML = '';

  // Tags
  var allTags = {};

  chars.forEach(function(c) {
    var card = document.createElement('a');
    card.className = 'wiki-char-card';
    card.href = 'javascript:void(0)';

    var imgEl = document.createElement('img');
    imgEl.className = 'wiki-char-portrait';
    imgEl.src = c.profile_image || c.image || '';
    imgEl.alt = c.name;
    if (!c.profile_image && !c.image) {
      imgEl.style.filter = 'invert(0.72) sepia(0.25) saturate(450%) hue-rotate(350deg) brightness(0.88)';
      // Use headshot silhouette placeholder
      imgEl.src = 'https://res.cloudinary.com/dq40xaaux/image/upload/v1779738249/giantess_ktiwfb.png';
    }

    var name = document.createElement('div');
    name.className = 'wiki-char-name';
    name.textContent = c.name;

    var species = document.createElement('div');
    species.className = 'wiki-char-species';
    species.textContent = c.species || '';

    card.appendChild(imgEl);
    card.appendChild(name);
    card.appendChild(species);

    if (c.faction) {
      var tag = document.createElement('div');
      tag.className = 'wiki-char-tag';
      tag.textContent = c.faction;
      card.appendChild(tag);
    }

    card.addEventListener('click', function() { loadCharPage(c.id); });
    grid.appendChild(card);
  });
}

// ── Character detail page ─────────────────────────────────────
function loadCharPage(charId, pushState) {
  var char = characters.find(function(c){ return c.id === charId; });
  if (!char) return;

  var slug = char.wiki || char.name.toLowerCase().replace(/\s+/g, '-');
  var container = document.getElementById('char-detail-content');
  container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;padding:2rem 0">Loading…</p>';
  showPage('character', false);
  if (pushState !== false) history.pushState({ type: 'character', id: charId, slug: slug }, '', '#char-' + slug);

  // Build stat block from JSON
  var statRows = [
    ['Species',    char.species || '—'],
    ['Pronouns',   char.pronouns || '—'],
    ['Height',     '<span class="char-stat-val" data-inches="' + char.height + '">' + fH(char.height) + '</span>'],
    ['Weight',     char.weight ? fW(char.weight) : '—'],
    ['Faction',    char.faction || '—'],
  ];
  if (char.transformed_by) {
    var xfLabel = char.transformed_by.split('-').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
    statRows.push(['Transformed by', xfLabel]);
  }
  if (char.anatomy && char.anatomy.penis && char.length) {
    var rawLenIn = char.length * (char.length_correction||1);
    var lenStr = fLen(rawLenIn);
    statRows.push(['Length', '<span class="char-stat-val" data-inches="' + rawLenIn + '">' + lenStr + '</span>']);
  }

  var statTable = '<table class="wiki-stat-table">' +
    statRows.map(function(r){ return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>'; }).join('') +
    '</table>';

  var heroSrc = char.profile_image || char.image || '';
  var heroHtml = heroSrc
    ? '<div class="wiki-char-hero"><img src="' + heroSrc + '" alt="' + char.name + '" /></div>'
    : '<div class="wiki-char-hero"><div class="wiki-char-hero-placeholder">No image yet</div></div>';

  var header = '<div class="wiki-char-header">' +
    heroHtml +
    '<div class="wiki-char-meta">' +
      '<div class="wiki-char-meta-name">' + char.name + '</div>' +
      '<div class="wiki-char-meta-sub">' + (char.faction || '') + '</div>' +
      statTable +
    '</div>' +
  '</div>';

  // Try to load markdown
  fetch('characters/' + slug + '.md')
    .then(function(r) { return r.ok ? r.text() : null; })
    .then(function(md) {
      if (!document.getElementById('page-character').classList.contains('active')) return;
      var bodyHtml = '';
      if (md && typeof marked !== 'undefined') {
        // Strip frontmatter
        var stripped = md.replace(/^---[\s\S]*?---\n/, '');
        bodyHtml = '<div class="wiki-md-content">' + marked.parse(stripped) + '</div>';
      } else {
        bodyHtml = '<p style="color:var(--text-secondary);font-style:italic">No wiki page written yet for this character.</p>';
      }
      var charName = char.name;
      var charNameLower = charName.toLowerCase();
      var galleryCount = galleryItems.filter(function(g){
        return g.characters && g.characters.map(function(c){return c.toLowerCase();}).indexOf(charNameLower) > -1;
      }).length;
      var libraryCount = libraryItems.filter(function(l){
        return l.characters && l.characters.map(function(c){return c.toLowerCase();}).indexOf(charNameLower) > -1;
      }).length;

      var gUrl = '../gallery/?character=' + encodeURIComponent(charName.toLowerCase());
      var lUrl = '../library/?character=' + encodeURIComponent(charName.toLowerCase());
      var gSub = galleryCount === 0 ? 'No artworks yet' : (galleryCount === 1 ? '1 artwork' : galleryCount + ' artworks');
      var lSub = libraryCount === 0 ? 'No stories yet' : (libraryCount === 1 ? '1 story' : libraryCount + ' stories');
      var contentLinks =
        '<div class="wiki-char-content-links">' +
          '<div class="wiki-section-h">Featured Content</div>' +
          '<div class="wiki-char-content-row">' +
            '<div class="wiki-char-content-card" data-href="' + gUrl + '">' +
              '<div class="wiki-char-content-card-count">' + galleryCount + '</div>' +
              '<div>' +
                '<div class="wiki-char-content-card-label">Gallery</div>' +
                '<div class="wiki-char-content-card-sub">' + gSub + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="wiki-char-content-card" data-href="' + lUrl + '">' +
              '<div class="wiki-char-content-card-count">' + libraryCount + '</div>' +
              '<div>' +
                '<div class="wiki-char-content-card-label">Library</div>' +
                '<div class="wiki-char-content-card-sub">' + lSub + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      // Relationships — auto-rendered from characters.json (single source of
      // truth). Always shown, so an absence of relationships is itself clear.
      var relInner;
      if (char.relationships && char.relationships.length) {
        var relRows = char.relationships.map(function(rel) {
          var target = characters.find(function(c){ return c.name.toLowerCase() === String(rel.name).toLowerCase(); });
          var nameHtml = target
            ? '<span class="wiki-rel-link" data-target="' + target.name.toLowerCase() + '">' + rel.name + '</span>'
            : rel.name;
          var noteHtml = rel.note ? ' <span class="wiki-rel-note">— ' + rel.note + '</span>' : '';
          return '<li><span class="wiki-rel-type">' + (rel.type || 'Connection') + '</span> ' + nameHtml + noteHtml + '</li>';
        }).join('');
        relInner = '<ul class="wiki-rel-list">' + relRows + '</ul>';
      } else {
        relInner = '<p class="wiki-rel-none">No known relationships on record.</p>';
      }
      var relHtml =
        '<div class="wiki-char-relationships">' +
          '<div class="wiki-section-h">Relationships</div>' +
          relInner +
        '</div>';

      // Place the auto-generated blocks (Featured Content, Relationships) at
      // placeholder tokens in the markdown so authors control their position.
      // Tokens: {{FEATURED}} and {{RELATIONSHIPS}}. If a token is absent, the
      // block is appended at the end as a fallback (so older pages still work).
      var assembled = bodyHtml;
      var usedFeatured = false, usedRel = false;
      // marked may wrap a lone token as <p>{{TOKEN}}</p>; strip that wrapper too.
      var featRe = /(<p>\s*)?\{\{FEATURED\}\}(\s*<\/p>)?/;
      var relRe  = /(<p>\s*)?\{\{RELATIONSHIPS\}\}(\s*<\/p>)?/;
      if (featRe.test(assembled)) { assembled = assembled.replace(featRe, contentLinks); usedFeatured = true; }
      if (relRe.test(assembled))  { assembled = assembled.replace(relRe, relHtml);       usedRel = true; }
      container.innerHTML = header + assembled +
        (usedRel ? '' : relHtml) +
        (usedFeatured ? '' : contentLinks);

      renderWikiImages(container);
      // Wire relationship links to load the related character's page
      container.querySelectorAll('.wiki-rel-link').forEach(function(el) {
        el.addEventListener('click', function() {
          var t = this.getAttribute('data-target');
          var cId = characters.find(function(c){ return c.name.toLowerCase() === t.toLowerCase(); });
          if (cId) loadCharPage(cId.id);
        });
      });
      // Wire internal wiki links in character markdown
      container.querySelectorAll('.wiki-lore-link').forEach(function(el) {
        el.style.cssText = 'color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border-mid);';
        el.addEventListener('click', function() {
          var t = this.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id === t; });
          if (isLore) loadLorePage(t);
          else {
            var cId = characters.find(function(c){ return c.name.toLowerCase() === t.toLowerCase(); });
            if (cId) loadCharPage(cId.id);
          }
        });
      });
    })
    .catch(function() {
      container.innerHTML = header + '<p style="color:var(--text-secondary);font-style:italic">No wiki page written yet for this character.</p>';
    });
}

// ── Browser history (back/forward) ────────────────────────────
window.addEventListener('popstate', function(e) {
  var state = e.state;
  if (!state) { loadLorePage('world-of-sinverse', false); return; }
  if (state.type === 'page') {
    if (state.id === 'intro') loadLorePage('world-of-sinverse', false);
    else if (state.id === 'faq') loadLorePage('faq', false);
    else showPage(state.id, false);
  }
  else if (state.type === 'character') loadCharPage(state.id, false);
  else if (state.type === 'lore') loadLorePage(state.id, false);
  else if (state.type === 'category') showCategory(state.id, false);
});

// Restore from URL hash if returning from gallery/library
(function() {
  var hash = window.location.hash;
  if (hash && hash !== '#page-intro' && hash !== '#lore-world-of-sinverse') {
    // Will be handled by popstate-like restore after data loads
    window._restoreHash = hash;
  }
})();
history.replaceState({ type: 'lore', id: 'world-of-sinverse' }, '', window.location.hash || '#lore-world-of-sinverse');

// ── Search ────────────────────────────────────────────────────
var searchTimeout = null;
document.getElementById('wiki-search-input').addEventListener('input', function() {
  var q = this.value.trim();
  clearTimeout(searchTimeout);
  if (!q) return;
  searchTimeout = setTimeout(function(){ runSearch(q); }, 180);
});

document.getElementById('wiki-search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { this.value = ''; }
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    var q = this.value.trim();
    if (q) runSearch(q);
  }
});

function runSearch(q) {
  var ql = q.toLowerCase();
  var results = [];

  var qlLower = ql.toLowerCase();
  // Characters
  characters.forEach(function(c) {
    var score = 0;
    var cLower = c.name.toLowerCase();
    if (cLower === qlLower) score = 100;
    else if (cLower.startsWith(qlLower)) score = 80;
    else if (cLower.includes(qlLower)) score = 60;
    if (score) results.push({
      type: 'character', score: score,
      label: c.name,
      sub: c.species + (c.faction ? ' · ' + c.faction : ''),
      img: c.profile_image || c.image || '',
      action: function(id){ return function(){ loadCharPage(id); }; }(c.id)
    });
  });

  // Lore pages
  LORE_PAGES.forEach(function(lp) {
    var score = 0;
    var lpLower = lp.label.toLowerCase();
    if (lpLower === qlLower) score = 100;
    else if (lpLower.startsWith(qlLower)) score = 80;
    else if (lpLower.includes(qlLower)) score = 60;
    if (score) results.push({
      type: 'lore', score: score,
      label: lp.label,
      sub: lp.section,
      action: function(id){ return function(){ loadLorePage(id); }; }(lp.id)
    });
  });

  // Timeline events
  timelineEvents.forEach(function(ev) {
    var score = 0;
    var evLower = ev.title.toLowerCase();
    if (evLower === qlLower) score = 100;
    else if (evLower.startsWith(qlLower)) score = 80;
    else if (evLower.includes(qlLower)) score = 60;
    else if (ev.summary && ev.summary.toLowerCase().includes(qlLower)) score = 30;
    if (score) results.push({
      type: 'timeline', score: score,
      label: ev.title,
      sub: fTDate(ev.date) + ' · Timeline event',
      action: function(id){ return function(){
        showPage('timeline');
        // Highlight the event
        setTimeout(function(){
          var evNode = document.querySelector('[data-ev-id="'+id+'"]');
          if (evNode) evNode.click();
        }, 100);
      }; }(ev.id)
    });
  });

  // FAQ questions (each accordion item is individually searchable)
  faqEntries.forEach(function(fe, idx) {
    var score = 0;
    var qLower = fe.question.toLowerCase();
    if (qLower === qlLower) score = 100;
    else if (qLower.startsWith(qlLower)) score = 80;
    else if (qLower.includes(qlLower)) score = 65;
    else if (fe.answer && fe.answer.toLowerCase().includes(qlLower)) score = 35;
    if (score) {
      // Short plain-text snippet from the answer for the sub-line
      var snippet = fe.answer.replace(/[#*_`>\-]/g, '').replace(/\s+/g, ' ').trim();
      if (snippet.length > 90) snippet = snippet.slice(0, 90).replace(/\s+\S*$/, '') + '…';
      results.push({
        type: 'faq', score: score,
        label: fe.question,
        sub: snippet || 'FAQ',
        action: function(i){ return function(){ openFaqItem(i); }; }(idx)
      });
    }
  });

  results.sort(function(a,b){ return b.score - a.score; });
  renderSearchResults(q, results);
}

var TYPE_LABELS = { character: 'Character', lore: 'Lore', timeline: 'Timeline', faq: 'FAQ' };
var TYPE_COLORS = { character: 'var(--accent)', lore: 'var(--accent-light)', timeline: 'var(--text-secondary)', faq: 'var(--accent-light)' };

// Open the FAQ page and expand the Nth accordion item (matching faqEntries order).
function openFaqItem(idx) {
  loadLorePage('faq');
  setTimeout(function() {
    var items = document.querySelectorAll('#lore-detail-content .wiki-faq-item, .wiki-faq-item');
    var target = items[idx];
    if (!target) return;
    if (!target.classList.contains('open')) target.classList.add('open');
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 200);
}

function renderSearchResults(q, results) {
  showPage('search', false);
  document.querySelectorAll('.wiki-nav-link').forEach(function(l){ l.classList.remove('active'); });
  document.getElementById('search-results-title').textContent =
    results.length ? 'Results for "' + q + '"' : 'No results for "' + q + '"';

  var list = document.getElementById('search-results-list');
  list.innerHTML = '';

  if (!results.length) {
    list.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;margin-top:1rem">No pages matched your search. Try a different term.</p>';
    return;
  }

  var ul = document.createElement('div');
  ul.style.cssText = 'display:flex;flex-direction:column;gap:1px;background:var(--border);margin-top:1.5rem;';

  results.forEach(function(r) {
    var row = document.createElement('div');
    row.style.cssText = 'background:var(--bg-panel);padding:1rem 1.5rem;cursor:pointer;display:flex;align-items:center;gap:1rem;transition:background 0.15s;';
    var thumb = r.img
      ? '<div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--bg-inset);border:1px solid var(--border)"><img src="'+r.img+'" style="width:100%;height:100%;object-fit:cover" /></div>'
      : '';
    row.innerHTML =
      '<div style="font-family:var(--font-caps);font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;color:'+TYPE_COLORS[r.type]+';width:80px;flex-shrink:0">'+TYPE_LABELS[r.type]+'</div>' +
      thumb +
      '<div style="flex:1">' +
        '<div style="font-family:var(--font-display);font-style:italic;font-size:1.1rem;color:var(--text-primary)">' + r.label + '</div>' +
        '<div style="font-family:var(--font-caps);font-size:0.6rem;letter-spacing:0.1em;color:var(--text-secondary);margin-top:0.25rem">' + (r.sub||'') + '</div>' +
      '</div>' +
      '<div style="color:var(--text-secondary);font-size:0.9rem">→</div>';
    row.addEventListener('mouseenter', function(){ this.style.background='var(--bg-inset)'; });
    row.addEventListener('mouseleave', function(){ this.style.background='var(--bg-panel)'; });
    row.addEventListener('click', r.action);
    ul.appendChild(row);
  });

  list.appendChild(ul);
}
</script>
