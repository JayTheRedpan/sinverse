  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .wiki-app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      overflow: hidden;
      transition: grid-template-columns 0.25s ease;
    }

    /* ── Top bar ── */
    .wiki-topbar {
      grid-column: 1 / -1;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.75rem 2rem;
    }
    .wiki-header-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      opacity: 0.85;
      transition: opacity 0.2s;
      display: block;
    }
    .wiki-topbar-brand { display: flex; align-items: center; }
    .wiki-topbar-brand:hover .wiki-header-logo { opacity: 1; }

    .wiki-topbar-logo {
      font-family: var(--font-caps);
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
    }
    .wiki-topbar-sep { color: var(--border-mid); }
    .wiki-topbar-title-block {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }
    .wiki-topbar-title {
      font-family: var(--font-caps);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      line-height: 1;
    }
    .wiki-topbar-subtitle {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1;
    }
    @media (max-width: 768px) {
      .wiki-topbar-title-block { display: none; }
    }
    .wiki-search {
      margin-left: auto;
      background: var(--bg-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem 0.85rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-primary);
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
    .wiki-search:focus { border-color: var(--accent); }
    .wiki-search::placeholder { color: var(--text-muted); }

    /* ── Sidebar ── */
    .wiki-sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.5rem 0;
      /* Sidebar stays fixed — content scrolls in wiki-main */
      position: sticky;
      top: 0;
      height: 100%;
      z-index: 2;   /* sit above the timeline's sticky era bar (z-index:1) */
    }
    .wiki-nav-section { margin-bottom: 0.25rem; }
    .wiki-nav-heading {
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.5rem 1.5rem 0.25rem;
    }
    .wiki-cat-subhead {
      font-family: var(--font-caps);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 0.85rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .wiki-nav-link {
      display: block;
      padding: 0.4rem 1.5rem;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.15s;
      border-left: 2px solid transparent;
      cursor: pointer;
    }
    .wiki-nav-link:hover { color: var(--text-primary); background: var(--bg-inset); }
    .wiki-nav-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--bg-inset); }
    .wiki-nav-divider { border: none; border-top: 1px solid var(--border); margin: 0.75rem 1.5rem; }
    .wiki-unit-toggle {
      display: flex;
      gap: 0;
      padding: 0.75rem 1.5rem 0.5rem;
    }
    .wiki-unit-btn {
      flex: 1;
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border-mid);
      color: var(--text-muted);
      padding: 0.35rem 0;
      cursor: pointer;
      transition: all 0.15s;
    }
    .wiki-unit-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .wiki-unit-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; margin-left: -1px; }
    .wiki-unit-btn:hover  { color: var(--accent); border-color: var(--accent); z-index: 1; position: relative; }
    .wiki-unit-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); z-index: 2; position: relative; }

    /* ── Main content ── */
    .wiki-main {
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3rem 4rem;
      height: 100%;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }
    /* Constrain article prose width within the expanding main. Centering the
       container keeps header/body/relationships/featured aligned in one column
       so wide screens don't strand all the empty space on the right. */
    #char-detail-content,
    #lore-detail-content {
      max-width: min(1100px, 100%);
      margin: 0 auto;
    }
    .wiki-md-content,
    .wiki-char-content,
    .wiki-intro-body,
    .wiki-cat-body,
    .wiki-search-results {
      max-width: min(1100px, 100%);
    }

    /* ── Page sections ── */
    .wiki-page { display: none; }
    .wiki-page.active { display: block; }

    /* ── World intro ── */
    .wiki-intro-eyebrow {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .wiki-intro-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 3rem;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }
    .wiki-intro-lead {
      font-family: var(--font-body);
      font-size: 1.15rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 2.5rem;
      border-left: 2px solid var(--accent);
      padding-left: 1.25rem;
    }
    .wiki-section-title {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .wiki-lore-body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 1.5rem;
    }
    .wiki-char-relationships { margin: 2rem 0; }
    .wiki-rel-list { list-style: none; padding: 0; margin: 0; }
    .wiki-rel-list li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .wiki-rel-list li:last-child { border-bottom: none; }
    .wiki-rel-type {
      display: inline-block;
      min-width: 5.5rem;
      font-family: var(--font-caps);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .wiki-rel-link {
      color: var(--text-primary);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: var(--border-mid);
    }
    .wiki-rel-link:hover { color: var(--accent-light); }
    .wiki-rel-note { color: var(--text-muted); font-style: italic; }
    .wiki-rel-none { color: var(--text-muted); font-style: italic; font-family: var(--font-body); }
    .wiki-lore-body + .wiki-section-title { margin-top: 2.5rem; }

    /* ── FAQ ── */
    .wiki-faq-list { margin-top: 1.5rem; }
    .wiki-faq-item { border-bottom: 1px solid var(--border); }
    .wiki-faq-item:first-child { border-top: 1px solid var(--border); }
    .wiki-faq-q {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 1.15rem 2.5rem 1.15rem 0;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text-primary);
      position: relative;
      transition: color 0.15s;
    }
    .wiki-faq-q:hover { color: var(--accent); }
    .wiki-faq-q::after {
      content: '+';
      position: absolute;
      right: 0.25rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--font-body);
      font-style: normal;
      font-size: 1.4rem;
      color: var(--accent);
      transition: transform 0.2s;
    }
    .wiki-faq-item.open .wiki-faq-q::after { content: '\2212'; }
    .wiki-faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .wiki-faq-a-inner {
      padding: 0 0 1.25rem;
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
    }
    .wiki-faq-item.open .wiki-faq-a { max-height: 1200px; }

    /* ── Lore cards ── */
    .wiki-lore-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
    }
    .wiki-lore-card {
      background: var(--bg-panel);
      padding: 1.25rem;
    }
    .wiki-lore-card-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .wiki-lore-card-body {
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* ── Timeline ── */
    .wiki-tl-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.5rem 0 0.25rem;
    }
    .wiki-tl-controls-hint {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .wiki-tl-zoom { display: flex; gap: 4px; }
    .wiki-tl-zoom-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1;
      min-width: 30px;
      height: 28px;
      padding: 0 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .wiki-tl-zoom-reset { font-family: var(--font-caps); font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; }
    .wiki-tl-zoom-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .wiki-tl-zoom-btn:disabled { opacity: 0.35; cursor: default; }
    .wiki-tl-zoom-btn:disabled:hover { border-color: var(--border-mid); color: var(--text-secondary); background: transparent; }

    .wiki-timeline-wrap {
      position: relative;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 3rem 1rem 1.5rem;
      margin-bottom: 1rem;
      cursor: grab;
      /* Horizontal drag pans the timeline; vertical gestures still scroll page */
      touch-action: pan-x pan-y;
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    .wiki-timeline-wrap:active { cursor: grabbing; }
    /* Don't let the browser start a text selection while dragging */
    .wiki-timeline-wrap.dragging { user-select: none; }
    .wiki-timeline-wrap::-webkit-scrollbar { height: 4px; }
    .wiki-timeline-wrap::-webkit-scrollbar-track { background: transparent; }
    .wiki-timeline-wrap::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }

    .wiki-timeline-track {
      position: relative;
      min-width: max-content;
      height: 230px;            /* slim band strip + baseline + staggered labels */
      padding-bottom: 1rem;
    }
    /* Era band layer sits behind the events */
    .wiki-tl-bands {
      position: absolute;
      top: 18px; left: 0; right: 0;    /* leave clear space above for the TDay point label */
      height: 34px;             /* slim name-only strip */
      z-index: 0;
    }
    .wiki-tl-band {
      position: absolute;
      top: 0;
      height: 34px;
      box-sizing: border-box;
      border-left: 1px solid var(--border-mid);
      border-right: 1px solid var(--border-mid);
      padding: 0 0.6rem;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .wiki-tl-band.band-a { background: rgba(196,154,120,0.07); }
    .wiki-tl-band.band-b { background: rgba(196,154,120,0.14); }
    .wiki-tl-band.band-present {
      background: rgba(122,34,51,0.12);
      border-left: 1px dashed var(--wine);
    }
    .wiki-tl-band-name {
      font-family: var(--font-caps);
      font-size: 0.64rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* TDay vertical divider */
    .wiki-tl-divider {
      position: absolute;
      top: -18px;               /* extend up through the clear zone above the bands */
      width: 2px;
      height: 78px;
      background: var(--accent);
      z-index: 3;               /* above bands so the TDay label never collides */
    }
    .wiki-tl-divider-label {
      position: absolute;
      top: -4px;                /* sits in the clear space above every era band */
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--bg);
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
      border: 1px solid var(--accent);
      border-radius: 2px;
      z-index: 4;
    }
    .wiki-timeline-line {
      position: absolute;
      top: 52px;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-mid);
      z-index: 0;
    }
    .wiki-timeline-event {
      position: absolute;
      top: 44px;                /* dot sits on the baseline (52px) */
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 110px;
      cursor: pointer;
      transition: opacity 0.15s;
      /* The wide container shouldn't steal clicks from neighbours — only the
         actual dot/date/title (below) are clickable. */
      pointer-events: none;
    }
    .wiki-timeline-event > * { pointer-events: auto; }
    /* Hovered event rises above its neighbours so clicks land where you point */
    .wiki-timeline-event:hover { z-index: 5; }
    /* When zoomed out and events crowd together, collapse to dots only.
       The label reappears on hover and as the user zooms in. */
    .wiki-timeline-event.dot-only .wiki-tl-date,
    .wiki-timeline-event.dot-only .wiki-tl-title { display: none; }
    .wiki-timeline-event.dot-only .wiki-tl-dot::after { display: none; }
    .wiki-timeline-event.dot-only:hover .wiki-tl-date,
    .wiki-timeline-event.dot-only:hover .wiki-tl-title {
      display: block;
      position: absolute;
      top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      padding: 0.2rem 0.45rem;
      white-space: nowrap;
      z-index: 6;
    }
    .wiki-timeline-event.dot-only:hover .wiki-tl-title { top: 2.6rem; }
    /* Fully culled when zoomed way out and dots would overlap */
    .wiki-timeline-event.tl-hidden { display: none; }
    /* Staggered events drop their labels lower to avoid collisions */
    .wiki-timeline-event.staggered { top: 44px; }
    .wiki-timeline-event.staggered .wiki-tl-date { margin-top: 2.6rem; }
    .wiki-timeline-event.staggered .wiki-tl-dot::after {
      content: '';
      position: absolute;
      top: 11px;
      left: 50%;
      width: 1px;
      height: 2.4rem;
      background: var(--border-mid);
      transform: translateX(-50%);
    }
    .wiki-tl-dot { position: relative; }
    .wiki-timeline-event:hover { opacity: 0.85; }
    .wiki-timeline-event.anchor .wiki-tl-dot {
      background: var(--accent);
      width: 18px;
      height: 18px;
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }
    .wiki-timeline-event.anchor .wiki-tl-date { font-size: 0.78rem; color: var(--text-primary); }
    .wiki-timeline-event.anchor .wiki-tl-title { font-size: 1.05rem; }
    .wiki-tl-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      margin: 0 0 0.6rem;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .wiki-timeline-event.anchor .wiki-tl-dot {
      background: var(--accent);
      width: 15px;
      height: 15px;
      box-shadow: 0 0 0 4px var(--bg), 0 0 0 6px var(--accent);
    }
    .wiki-timeline-event:hover .wiki-tl-dot { background: var(--accent); }
    .wiki-tl-date {
      font-family: var(--font-caps);
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      color: var(--accent);
      margin-bottom: 0.35rem;
      text-align: center;
      font-weight: 600;
    }
    .wiki-timeline-event.anchor .wiki-tl-date {
      font-size: 1rem;
      color: var(--text-primary);
    }
    .wiki-tl-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.35;
    }

    /* Timeline detail panel — inline below track */
    .wiki-tl-detail {
      display: none;
      background: var(--bg-panel);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      margin-top: 2rem;
      animation: tl-fade-in 0.2s ease;
    }
    @keyframes tl-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .wiki-tl-detail.open { display: block; }
    .wiki-tl-detail-era {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .wiki-tl-era-link { color: var(--accent); cursor: pointer; }
    .wiki-tl-era-link:hover { text-decoration: underline; }
    /* Clickable era bands get a subtle hover lift */
    .wiki-tl-band[style*="cursor: pointer"]:hover,
    .wiki-tl-band:hover { filter: brightness(1.25); }
    .wiki-tl-divider:hover .wiki-tl-divider-label { background: var(--accent); color: var(--bg); }
    .wiki-tl-detail-date {
      font-family: var(--font-caps);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .wiki-tl-detail-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 0.85rem;
    }
    .wiki-tl-detail-body {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }
    .tl-related {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }
    .tl-related-label {
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-right: 0.25rem;
    }
    .tl-related-link {
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.2rem 0.6rem;
      transition: border-color 0.15s;
    }
    .tl-related-link:hover { border-color: var(--accent); }
    .wiki-lore-card { transition: background 0.15s; }
    .wiki-lore-card.wiki-lore-link:hover { background: var(--bg-inset); }

    .wiki-sidebar-toggle {
      position: absolute;
      left: 280px;
      top: 0;
      background: var(--bg-panel);
      border: 1px solid var(--border-bright);
      border-left: none;
      border-radius: 0 var(--radius) var(--radius) 0;
      width: 20px;
      height: 52px;
      font-size: 1rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: left 0.25s ease, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 0;
    }
    .wiki-sidebar-toggle:hover { color: var(--accent); }
    .wiki-app.sidebar-collapsed .wiki-sidebar-toggle {
      left: 0;
      border-radius: 0 var(--radius) var(--radius) 0;
      width: 32px;
      border-color: var(--accent);
      color: var(--accent);
      border-left: none;
    }
    .wiki-app.sidebar-collapsed .wiki-sidebar-toggle .wiki-toggle-arrow {
      display: inline-block;
      transform: scaleX(-1);
    }
    @media (max-width: 1024px) { .wiki-sidebar-toggle { display: none !important; } }

    /* Collapsed sidebar state */
    @media (min-width: 1025px) {
      .wiki-app.sidebar-collapsed {
        grid-template-columns: 0 1fr;
      }
      .wiki-app.sidebar-collapsed .wiki-sidebar {
        overflow: hidden;
        padding: 0;
        border-right: none;
      }
    }

    .wiki-sidebar, .wiki-app {
      transition: grid-template-columns 0.25s ease;
    }
    .wiki-sidebar {
      transition: width 0.25s ease, padding 0.25s ease;
    }

    .wiki-not-found-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 50vh;
      text-align: center;
      padding: 4rem 2rem;
      opacity: 0.7;
    }
    .wiki-not-found-glyph {
      font-size: 2.5rem;
      color: var(--accent);
      opacity: 0.3;
      margin-bottom: 0.5rem;
    }
    .wiki-not-found-label {
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .wiki-not-found-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
    }
    .wiki-not-found-text {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.8;
    }
    .wiki-tl-footnote {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 1rem;
      padding: 0 1rem;
      text-align: center;
    }
    .wiki-tl-footnote em { color: var(--text-secondary); font-style: normal; }

    .wiki-tl-detail-close {
      float: right;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      cursor: pointer;
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      padding: 0.2rem 0.5rem;
      margin-top: -0.1rem;
      transition: border-color 0.15s;
    }
    .wiki-tl-detail-close:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Character index ── */
    .wiki-char-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
    }
    .wiki-char-filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: 1px solid var(--border-mid, rgba(196,154,120,0.25));
      border-radius: var(--radius, 4px);
      color: var(--text-secondary, #b8a898);
      font-family: var(--font-caps, 'Cormorant SC', serif);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 0.75rem;
    }
    .wiki-char-filter-toggle:hover { border-color: var(--accent, #c49a78); color: var(--accent, #c49a78); }
    .wiki-char-filter-toggle-caret { display: inline-block; transition: transform 0.18s; font-size: 0.7em; }
    .wiki-char-filter-toggle[aria-expanded="true"] .wiki-char-filter-toggle-caret { transform: rotate(90deg); }
    .wiki-char-filter-active {
      color: var(--accent, #c49a78);
      font-size: 0.9em;
      letter-spacing: 0.05em;
    }
    .wiki-char-filters-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s ease;
    }
    .wiki-char-filters-panel.open { max-height: 320px; }
    .wiki-char-filter {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .wiki-char-filter-label {
      font-family: var(--font-caps, 'Cormorant SC', serif);
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted, #7a6a5a);
    }
    .wiki-char-filter select {
      background: var(--bg-inset, #1a1410);
      border: 1px solid var(--border-mid, rgba(196,154,120,0.25));
      border-radius: var(--radius, 4px);
      color: var(--text-primary, #f0e8df);
      font-family: var(--font-body, 'EB Garamond', serif);
      font-size: 0.85rem;
      padding: 0.35rem 0.5rem;
      cursor: pointer;
      min-width: 9rem;
    }
    .wiki-char-filter select:focus { outline: none; border-color: var(--accent, #c49a78); }
    .wiki-char-filter-reset {
      align-self: flex-end;
      background: none;
      border: 1px solid var(--border-mid, rgba(196,154,120,0.25));
      border-radius: var(--radius, 4px);
      color: var(--text-muted, #7a6a5a);
      font-family: var(--font-caps, 'Cormorant SC', serif);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .wiki-char-filter-reset:hover { border-color: var(--accent, #c49a78); color: var(--accent, #c49a78); }
    .wiki-char-count {
      font-family: var(--font-caps, 'Cormorant SC', serif);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted, #7a6a5a);
      margin-bottom: 1rem;
    }
    .wiki-char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
    }
    .wiki-char-card {
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 1rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .wiki-char-card:hover { background: var(--bg-inset); }
    .wiki-char-portrait {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--border-mid);
      margin-bottom: 0.65rem;
    }
    .wiki-char-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1rem;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 0.2rem;
    }
    .wiki-char-species {
      font-family: var(--font-caps);
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }
    .wiki-char-tag {
      display: inline-block;
      font-family: var(--font-caps);
      font-size: 0.48rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      margin-top: 0.4rem;
    }

    /* ── Character page ── */
    .wiki-char-header {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      align-items: flex-start;
    }
    .wiki-char-hero {
      height: 420px;          /* fixed height so every character page lines up */
      width: auto;            /* width follows the image's aspect ratio */
      max-width: 520px;       /* cap so a very wide image can't blow out the row */
      flex-shrink: 0;
      border-radius: var(--radius);
      border: 1px solid var(--border-mid);
      overflow: hidden;
      background: var(--bg-inset);
    }
    .wiki-char-hero img {
      height: 100%;           /* fill the fixed height */
      width: auto;            /* width fits the character image's scale — no cropping */
      max-width: 100%;        /* if it hits the cap, contain instead of crop */
      object-fit: contain;
      display: block;
    }
    .wiki-char-hero-placeholder {
      width: 240px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .wiki-char-meta { flex: 1; }
    .wiki-char-meta-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 2.5rem;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    .wiki-char-hero-col {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      align-items: stretch;
    }
    .wiki-char-creator {
      display: block;
      text-align: center;
      font-size: 0.82rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.7rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .wiki-char-creator:hover { border-color: var(--accent); background: rgba(196, 154, 120, 0.1); }
    .wiki-char-meta-sub {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .wiki-stat-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-body);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .wiki-stat-table tr { border-bottom: 1px solid var(--border); }
    .wiki-stat-table tr:last-child { border-bottom: none; }
    .wiki-stat-table td:first-child {
      color: var(--text-secondary);
      padding: 0.4rem 1rem 0.4rem 0;
      width: 110px;
      font-family: var(--font-caps);
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      vertical-align: top;
      padding-top: 0.5rem;
    }
    .wiki-stat-table td:last-child {
      color: var(--text-primary);
      padding: 0.4rem 0;
    }

    /* Rendered markdown */
    /* ── Wiki image gallery ── */
    .wiki-md-content .wiki-img-figure {
      display: inline-flex;
      flex-direction: column;
      break-inside: avoid;
      margin: 0;
    }
    /* When multiple images follow h2 Gallery, lay them out in a grid */
    .wiki-md-content p:has(.wiki-img-figure),
    .wiki-md-content .wiki-img-figure {
      margin-bottom: 0;
    }
    /* Wrap consecutive figures in a grid via JS — see renderWikiImages() */
    .wiki-img-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      margin: 1rem 0 1.5rem;
    }
    .wiki-img-grid .wiki-img-figure {
      background: var(--bg-panel);
      overflow: hidden;
      cursor: pointer;
    }
    .wiki-img-grid .wiki-img-figure:hover { background: var(--bg-inset); }
    .wiki-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: opacity 0.2s;
    }
    .wiki-img-figure:hover .wiki-img { opacity: 0.9; }
    .wiki-img-caption {
      padding: 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .wiki-img-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.88rem;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .wiki-img-sub {
      font-family: var(--font-body);
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    /* Lightbox */
    .wiki-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 400;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      padding: 2rem;
    }
    .wiki-lightbox.open { display: flex; }
    .wiki-lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
    }
    .wiki-lightbox-caption {
      text-align: center;
    }
    .wiki-lightbox-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--text-primary);
    }
    .wiki-lightbox-sub {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
    .wiki-lightbox-close {
      position: absolute;
      top: 1.25rem; right: 1.5rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-secondary);
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
    }
    .wiki-lightbox-close:hover { border-color: var(--accent); color: var(--accent); }

    .wiki-md-content h2 {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--text-primary);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    /* Auto-generated section headers (Featured Content, Relationships) styled to
       match the markdown <h2> headers so the page reads as one consistent doc. */
    .wiki-section-h {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--text-primary);
      margin: 2rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .wiki-md-content h3 {
      font-family: var(--font-caps);
      font-size: 0.95rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-light);
      font-weight: 600;
      margin: 1.75rem 0 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    /* Flanking marks (the "== text ==" look) added via CSS so the markdown
       stays clean — author just writes "### After TDay". */
    .wiki-md-content h3::before,
    .wiki-md-content h3::after {
      content: "";
      height: 1px;
      background: var(--accent-dim, var(--border-mid));
      flex: 0 0 1.4rem;
    }
    .wiki-md-content h3::after { flex: 1; }
    .wiki-md-content p {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin-bottom: 1rem;
    }
    .wiki-md-content ul {
      padding-left: 1.25rem;
      margin-bottom: 1rem;
    }
    .wiki-md-content li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 0.25rem;
    }
    .wiki-md-content em { font-style: italic; }
    .wiki-md-content strong { font-weight: 600; color: var(--text-primary); }
    .wiki-md-content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    .wiki-md-content th {
      font-family: var(--font-caps);
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .wiki-md-content td {
      padding: 0.5rem 0.75rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-body);
      line-height: 1.6;
    }

    /* ── Character content links ── */
    .wiki-char-content-links {
      margin-top: 2.5rem;
    }
    .wiki-char-content-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .wiki-char-content-card {
      flex: 1;
      min-width: 200px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.15s, background 0.15s;
      cursor: pointer;
    }
    .wiki-char-content-card:hover { border-color: var(--accent); background: var(--bg-inset); }
    .wiki-char-content-card-count {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 2rem;
      font-weight: 300;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
    }
    .wiki-char-content-card-label {
      font-family: var(--font-caps);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }
    .wiki-char-content-card-sub {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .wiki-char-content-none {
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.75rem;
    }

    .wiki-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-secondary);
      cursor: pointer;
      margin-bottom: 2rem;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }
    .wiki-back-btn:hover { color: var(--accent); }

    /* ── Tags ── */

    /* Mobile menu button — hidden on desktop */
    .wiki-mobile-menu-btn {
      display: none;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem 0.75rem;
      font-family: var(--font-caps);
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
      cursor: pointer;
      margin-left: auto;
    }
    .wiki-mobile-menu-btn:hover { border-color: var(--accent); color: var(--accent); }
    .wiki-mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 299;
    }

    @media (max-width: 768px) {
      /* Grid: topbar full width, no sidebar, main fills rest */
      .wiki-app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
        height: 100vh;
        height: 100dvh;
      }
      .wiki-sidebar { display: none; }
      .wiki-main {
        padding: 1.5rem 1.25rem;
        max-width: 100%;
        overflow-y: auto;
        height: 100%;
        box-sizing: border-box;
      }
      /* Show mobile menu button AND keep search visible (fills the row) */
      .wiki-search {
        display: block;
        margin-left: 0;
        flex: 1;
        min-width: 0;
        width: auto;
      }
      .wiki-mobile-menu-btn { display: flex; flex-shrink: 0; }
      /* Topbar */
      .wiki-topbar { padding: 0.75rem 1rem; gap: 0.75rem; }
      .wiki-topbar-sep { display: none; }
      .wiki-topbar-title-block { display: none; }
      /* Sidebar as fixed drawer */
      .wiki-sidebar.mobile-open {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 52px; left: 0; bottom: 0;
        z-index: 300;
        width: 80%;
        max-width: 300px;
        box-shadow: 4px 0 24px rgba(0,0,0,0.6);
        overflow-y: auto;
      }
      /* Content fixes */
      .wiki-tl-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1.5rem 0 0.25rem;
    }
    .wiki-tl-controls-hint {
      font-family: var(--font-caps);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .wiki-tl-zoom { display: flex; gap: 4px; }
    .wiki-tl-zoom-btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 3px;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1;
      min-width: 30px;
      height: 28px;
      padding: 0 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;

    .wiki-timeline-wrap { overflow-x: auto; }

    /* ── Timeline (vertical, era-grouped) ── */
    .wiki-vtl-controls { display:flex; align-items:center; justify-content:center; margin:1.5rem 0 0.85rem; }

      background:transparent; border:none; color:var(--text-muted);

    .wiki-vtl-seg button.on { background:var(--accent-dim); color:var(--accent); }
    .wiki-vtl-seg button + button { border-left:1px solid var(--border-mid); }

    /* Era jump-nav: a full-width band that sticks to the top of the timeline
       as you scroll. This browser sticks at the scroll container's CONTENT
       edge, which is below .wiki-main's top padding — so top must be the
       NEGATIVE of that padding (-3rem desktop, -1.5rem ≤768px) to dock flush
       under the header with no gap. z-index:1 keeps it above timeline content
       but below the sidebar (z-index:2), so it never covers sidebar or header.
       Negative side margins break it out of .wiki-main's padding for full

    .wiki-vtl-nav {
      position:sticky; top:-3rem; z-index:1;
      background:var(--bg);

      flex:0 0 auto; background:transparent; border:1px solid var(--border-mid);

      padding:0.32rem 0.7rem; border-radius:999px; cursor:pointer; white-space:nowrap;
      transition:color var(--transition), background var(--transition), border-color var(--transition);

    .wiki-vtl-pill:hover { color:var(--text-secondary); border-color:var(--era-accent); background:var(--accent-glow); }

    /* timeline body */
    #timeline-container { position:relative; }
    .wiki-vtl-era { position:relative; padding-left:2.6rem; scroll-margin-top:80px; --era-accent:var(--accent); }
    .wiki-vtl-era::before {
      content:""; position:absolute; left:7px; top:0; bottom:0; width:2px;
      background:var(--era-accent-line, var(--border-mid));
    }
    .wiki-vtl-era:first-child::before { top:1.9rem; }
    .wiki-vtl-era:last-child::before  { bottom:auto; height:2.4rem; }

    .wiki-vtl-era-head {
      position:relative; padding:1.5rem 0 0.55rem; cursor:pointer; user-select:none;

<script>
// ── Wiki image helpers ────────────────────────────────────────
function renderWikiImages(container) {
  // Group consecutive figures into grid wrappers
  var figures = container.querySelectorAll('.wiki-img-figure');
  figures.forEach(function(fig) {
    // Unwrap from <p> tags that marked sometimes wraps around images
    if (fig.parentElement && fig.parentElement.tagName === 'P') {
      fig.parentElement.replaceWith(fig);
    }
  });
  // Group consecutive figures into a grid
  var allFigs = Array.from(container.querySelectorAll('.wiki-img-figure'));
  if (!allFigs.length) return;
  var groups = [], cur = [];
  allFigs.forEach(function(fig, i) {
    cur.push(fig);
    var next = allFigs[i + 1];
    if (!next || next.previousElementSibling !== fig) {
      groups.push(cur.slice());
      cur = [];
    }
  });
  groups.forEach(function(group) {
    var grid = document.createElement('div');
    grid.className = 'wiki-img-grid';
    group[0].parentElement.insertBefore(grid, group[0]);
    group.forEach(function(fig) { grid.appendChild(fig); });
  });
  // Wire lightbox
  container.querySelectorAll('.wiki-img-figure').forEach(function(fig) {
    fig.addEventListener('click', function() {
      var img = fig.querySelector('.wiki-img');
      var title = fig.querySelector('.wiki-img-title');
      var sub = fig.querySelector('.wiki-img-sub');
      document.getElementById('wiki-lightbox-img').src = img ? img.src : '';
      document.getElementById('wiki-lightbox-title').textContent = title ? title.textContent : '';
      document.getElementById('wiki-lightbox-sub').textContent = sub ? sub.textContent : '';
      document.getElementById('wiki-lightbox').classList.add('open');
    });
  });
}

document.getElementById('wiki-lightbox-close').addEventListener('click', function() {
  document.getElementById('wiki-lightbox').classList.remove('open');
});
document.getElementById('wiki-lightbox').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('wiki-lightbox').classList.remove('open');
});

// Configure marked to prevent link navigation
if (typeof marked !== 'undefined') {
  var renderer = new marked.Renderer();

  renderer.image = function(token) {
    var src  = typeof token === 'object' ? token.href  : token;
    var alt  = typeof token === 'object' ? token.text  : (arguments[2] || '');
    // Parse "Title | Caption" from alt text
    var parts = alt.split('|');
    var title   = parts[0] ? parts[0].trim() : '';
    var caption = parts[1] ? parts[1].trim() : '';
    return '<figure class="wiki-img-figure">' +
      '<img src="' + src + '" alt="' + title + '" class="wiki-img" loading="lazy" />' +
      (title || caption
        ? '<figcaption class="wiki-img-caption">' +
            (title   ? '<span class="wiki-img-title">'   + title   + '</span>' : '') +
            (caption ? '<span class="wiki-img-sub">'     + caption + '</span>' : '') +
          '</figcaption>'
        : '') +
      '</figure>';
  };

  renderer.link = function(token) {
    // Newer marked passes a token object; older versions pass (href, title, text)
    var href = typeof token === 'object' ? (token.href || '') : (token || '');
    var text = typeof token === 'object' ? (token.text || '') : (arguments[2] || '');
    if (href && (href.indexOf('http') === 0 || href.indexOf('mailto') === 0)) {
      return '<a href="' + href + '" target="_blank" rel="noopener">' + text + '</a>';
    }
    // Normalize relative link paths to a bare id. Body markdown across the wiki
    // links to lore/characters inconsistently — `../lore/x`, `../x`, or bare `x` —
    // but the click resolver matches data-target exactly against a lore id or
    // character slug. Strip the relative prefixes (and any .md) so every style
    // resolves the same way.
    var target = href
      .replace(/^\.\.\/lore\//, '')
      .replace(/^\.\.\/characters\//, '')
      .replace(/^\.\.\//, '')
      .replace(/\.md$/, '');
    // Render a REAL anchor with a resolvable deep-link href, so middle-click and
    // right-click "open in new tab" work natively. data-target is kept for the
    // fast in-page click path (see the #wiki-main click handler). Resolve the
    // target's type now (data is loaded before any body markdown is parsed) so
    // the href deep-links correctly on a fresh load.
    var deepHref = '#' + target; // safe fallback
    var asLore = LORE_PAGES.find(function(p){ return p.id === target; });
    if (asLore) {
      deepHref = '#lore-' + target;
    } else {
      var asChar = characters.find(function(c){ return c.name.toLowerCase() === target.toLowerCase(); })
                || characters.find(function(c){ return (c.wiki || '') === target; });
      if (asChar) deepHref = '#char-' + (asChar.wiki || asChar.id);
    }
    return '<a class="wiki-lore-link" href="' + deepHref + '" data-target="' + target + '">' + text + '</a>';
  };
  marked.use({ renderer: renderer });
}

// Parse the FAQ markdown into {question, answer} pairs so individual questions
// are searchable. Each "## Question" heading starts a new entry; the text until
// the next heading is its answer (used for snippet + secondary matching).
function buildFaqIndex(md) {
  faqEntries = [];
  if (!md) return;
  // Drop frontmatter
  md = md.replace(/^---[\s\S]*?---\s*/, '');
  var parts = md.split(/^##\s+/m);
  parts.forEach(function(block) {
    block = block.trim();
    if (!block) return;
    var nl = block.indexOf('\n');
    var question = (nl === -1 ? block : block.slice(0, nl)).trim();
    var answer = (nl === -1 ? '' : block.slice(nl + 1)).trim();
    if (question) faqEntries.push({ question: question, answer: answer });
  });
}

var wikiMetric = localStorage.getItem('wiki-metric') === 'true';

// Format an in-universe date integer (years relative to TDay) as a T±N label
function fTDate(d) {
  if (d === null || d === undefined || d === '') return 'TBD';
  var n = parseInt(d, 10);
  if (isNaN(n)) return 'TBD';
  if (n === 0) return 'T\u00b10';
  return n > 0 ? 'T+' + n : 'T' + n;  // negative already has minus sign
}

function fH(inches) {
  if (wikiMetric) {
    var cm = Math.round(inches * 2.54);
    if (cm >= 100) return (cm / 100).toFixed(2).replace(/\.?0+$/, '') + ' m';
    return cm + ' cm';
  }
  var ft = Math.floor(inches / 12), ins = Math.round(inches % 12);
  return ft + "'" + ins + '"';
}
function fW(lbs) {
  if (!lbs) return '—';
  if (wikiMetric) {
    var kg = lbs * 0.453592;
    if (kg >= 1000) return (kg/1000).toFixed(1).replace(/\.0$/,'') + ' t';
    return Math.round(kg).toLocaleString() + ' kg';
  }
  // Switch to tons at ~1 ton (2000 lbs) so imperial and metric agree on scale.
  if (lbs >= 2000) return (lbs/2000).toFixed(1).replace(/\.0$/,'') + ' tons';
  return Math.round(lbs).toLocaleString() + ' lbs';
}
// Length: stay in inches until 12" (a penis length reads as 5", not 0'5"),
// then switch to feet/inches. Metric: cm until 100, then metres.
function fLen(inches) {
  if (wikiMetric) {
    var cm = Math.round(inches * 2.54);
    if (cm >= 100) return (cm / 100).toFixed(2).replace(/\.?0+$/, '') + ' m';
    return cm + ' cm';
  }
  if (inches >= 12) {
    var ft = Math.floor(inches / 12), ins = Math.round(inches % 12);
    return ft + "'" + ins + '"';
  }
  return (Math.round(inches * 10) / 10) + '"';
}

var galleryItems = [];
var libraryItems = [];
var erasData = [];
var fanCharacters = [];
var contributorsData = [];

Promise.all([
  fetch('../_data/characters.json').then(function(r){ return r.json(); }),
  fetch('timeline.json').then(function(r){ return r.json(); }),
  fetch('lore.json').then(function(r){ return r.json(); }),
  fetch('../gallery/gallery.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('../library/library.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('eras.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('lore/faq.md').then(function(r){ return r.text(); }).catch(function(){ return ''; }),
  fetch('size-classes.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('../_data/fan-characters.json').then(function(r){ return r.json(); }).catch(function(){ return []; }),
  fetch('../contributors/contributors.json').then(function(r){ return r.json(); }).catch(function(){ return []; })
]).then(function(results) {
  characters = results[0];
  timelineEvents = results[1];
  LORE_PAGES = results[2];
  galleryItems = results[3];
  libraryItems = results[4];
  erasData = results[5] || [];
  buildFaqIndex(results[6] || '');
  SIZE_BUCKETS = results[7] || [];
  // Fan characters can be hidden site-wide with "active": false in their JSON.
  // Filtering here removes them from the grid, detail pages, name resolution,
  // and Featured Content counts in one place.
  fanCharacters = (results[8] || []).filter(function(c){ return c.active !== false; });
  // Contributors — used to link a fan character back to its creator's profile.
  contributorsData = results[9] || [];
  buildLoreSidebar();
  buildTimeline();
  initTimelineView();
  canonCharGrid.build(characters);
  if (FAN_CHARACTERS_ENABLED) fanCharGrid.build(fanCharacters);

  // Restore page from URL hash if returning via browser Back from gallery/library
  var restoreHash = window._restoreHash;
  if (restoreHash) {
    window._restoreHash = null;
    var charMatch = restoreHash.match(/^#char-(.+)$/);
    var fanMatch  = restoreHash.match(/^#fanchar-(.+)$/);
    var loreMatch = restoreHash.match(/^#lore-(.+)$/);
    var catMatch  = restoreHash.match(/^#cat-(.+)$/);
    var pageMatch = restoreHash.match(/^#page-(.+)$/);
    if (fanMatch) {
      var fref = decodeURIComponent(fanMatch[1]);
      var fc = fanCharacters.find(function(x){ return x.wiki === fref; })
            || (/^\d+$/.test(fref) ? fanCharacters.find(function(x){ return x.id === parseInt(fref); }) : null);
      if (fc) loadFanCharPage(fc.id, false);
    }
    else if (charMatch) {
      var ref = decodeURIComponent(charMatch[1]);
      var c = characters.find(function(x){ return x.wiki === ref; })
           || (/^\d+$/.test(ref) ? characters.find(function(x){ return x.id === parseInt(ref); }) : null);
      if (c) loadCharPage(c.id, false);
    }
    else if (loreMatch) { loadLorePage(loreMatch[1], false); }
    else if (catMatch) {
      // Resolve the slug back to a REAL section name by slugifying each known
      // section and comparing - reconstructing the name from the slug is fragile
      // (capitalisation, multi-word, ampersands) and breaks the exact-match
      // filter in showCategory. Matching against actual data is reliable.
      var catSlug = decodeURIComponent(catMatch[1]).toLowerCase();
      var catSections = [];
      LORE_PAGES.forEach(function(lp){ if (catSections.indexOf(lp.section) === -1) catSections.push(lp.section); });
      var section = catSections.find(function(s){
        return s.toLowerCase().replace(/\s+/g, '-') === catSlug;
      });
      if (section) showCategory(section, false);
      else showPage('not-found', false);
    } else if (pageMatch) { showPage(pageMatch[1], false); }
    return; // skip ?character= param handling below
  }

  // Handle ?character= param from gallery/library links. The value is a
  // character handle (bare name, or "canon:"/"fan:" prefixed, or a wiki slug).
  var urlParams = new URLSearchParams(window.location.search);
  var charParam = urlParams.get('character');
  if (charParam) {
    var charLink = resolveCharLink(decodeURIComponent(charParam));
    if (charLink) {
      charLink.open();
    } else {
      // Not in either character set — show dedicated not-found page
      document.getElementById('nf-name').textContent = decodeURIComponent(charParam).replace(/^(canon|fan)\s*:\s*/i, '');
      showPage('not-found', false);
      history.replaceState({ type: 'page', id: 'not-found' }, '', '#not-found');
    }
  } else {
    // Fresh visit with no deep-link: show the default landing page.
    loadLorePage('world-of-sinverse', false);
  }
}).catch(function(e) {
  console.error('Failed to load wiki data:', e);
});

// Derive the deep-link hash for a nav element from its data-* attributes, so
// every nav link/card can carry a real href (enables middle/right-click → new
// tab) while plain left-clicks still use fast in-page navigation.
function navHashFor(el) {
  if (!el) return null;
  var charId = el.getAttribute('data-char-id');
  var lore   = el.getAttribute('data-lore');
  var cat    = el.getAttribute('data-category');

    var c = characters.find(function(x){ return x.id === parseInt(charId); });

  }

function showCategory(section, pushState) {
  if (pushState !== false) history.pushState({ type: 'category', id: section }, '', '#cat-' + section.toLowerCase().replace(/\s+/g, '-'));
  document.getElementById('cat-eyebrow').textContent = 'Browse';
  document.getElementById('cat-title').textContent = section;
  var grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  var items = LORE_PAGES.filter(function(lp){ return lp.section === section; });

  // Helper: build a single clickable lore card.
  function makeCard(lp) {
    var card = document.createElement('a');
    card.href = '#lore-' + lp.id;
    card.style.cssText = 'display:block;text-decoration:none;background:var(--bg-panel);padding:1.1rem 1.5rem;cursor:pointer;transition:background 0.15s;';
    card.innerHTML = '<div style="font-family:var(--font-display);font-style:italic;font-size:1.15rem;color:var(--text-primary);margin-bottom:0.25rem">' + lp.label + '</div>';
    card.addEventListener('mouseenter', function(){ this.style.background='var(--bg-inset)'; });
    card.addEventListener('mouseleave', function(){ this.style.background='var(--bg-panel)'; });
    card.addEventListener('click', function(e){
      if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
      e.preventDefault();
      loadLorePage(lp.id);
    });
    return card;
  }

  // Determine the sub-groups present in this section, preserving first-seen order.
  var groupOrder = [];
  items.forEach(function(lp) {
    var g = lp.group || '';
    if (groupOrder.indexOf(g) === -1) groupOrder.push(g);
  });
  // Sub-group only when there's real grouping (more than one named group, or a
  // single named group alongside ungrouped items). A section with no groups at
  // all renders as the original flat list.
  var hasGroups = groupOrder.some(function(g){ return g !== ''; }) &&
                  (groupOrder.length > 1 || groupOrder[0] !== '');

  if (!hasGroups) {
    var list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:1px;background:var(--border);';
    items.forEach(function(lp) { list.appendChild(makeCard(lp)); });
    grid.appendChild(list);
    showPage('category', false);
    return;
  }

  // Render each sub-group with a heading, then its cards. Ungrouped items (if
  // any) fall under a trailing "More" heading so nothing is lost.
  groupOrder.forEach(function(g) {
    var groupItems = items.filter(function(lp){ return (lp.group || '') === g; });
    if (!groupItems.length) return;
    var heading = document.createElement('div');
    heading.className = 'wiki-cat-subhead';
    heading.textContent = g || 'More';
    grid.appendChild(heading);
    var list = document.createElement('div');
    list.style.cssText = 'display:flex;flex-direction:column;gap:1px;background:var(--border);margin-bottom:1.75rem;';
    groupItems.forEach(function(lp) { list.appendChild(makeCard(lp)); });
    grid.appendChild(list);
  });
  showPage('category', false);
}


// Render FAQ markdown (## Question followed by answer paragraphs) as an accordion.
function renderFaqMarkdown(md) {
  // Split on level-2 headings; each becomes a Q/A item.
  var parts = md.split(/^##\s+/m).filter(function(s){ return s.trim(); });
  // Any preamble before the first ## (no heading marker) shows as lead text.
  var lead = '';
  if (md.trim() && md.trim().indexOf('##') !== 0) {
    var pre = md.split(/^##\s+/m)[0].trim();
    if (pre) { lead = '<p class="wiki-lore-body" style="margin-top:1rem">' + marked.parseInline(pre) + '</p>'; parts.shift(); }
  }
  var items = parts.map(function(block) {
    var nl = block.indexOf('\n');
    var question = (nl < 0 ? block : block.slice(0, nl)).trim();
    var answer   = (nl < 0 ? '' : block.slice(nl + 1)).trim();
    return '<div class="wiki-faq-item">' +
             '<button class="wiki-faq-q">' + marked.parseInline(question) + '</button>' +
             '<div class="wiki-faq-a"><div class="wiki-faq-a-inner">' + marked.parse(answer) + '</div></div>' +
           '</div>';
  }).join('');
  return lead + '<div class="wiki-faq-list">' + items + '</div>';
}

function loadLorePage(id, pushState) {
  // Resolve aliases (e.g. the "era-tday" Eras entry points to the detailed
  // "tday" page) so both categories share a single source page.
  var aliasEntry = LORE_PAGES.find(function(p){ return p.id === id; });
  if (aliasEntry && aliasEntry.aliasOf) { id = aliasEntry.aliasOf; }
  // lp is the manifest entry if this page is a categorised lore page; top-level
  // pages (world-of-sinverse, faq) have no manifest entry and that's fine —
  // their title/eyebrow come from the markdown frontmatter.
  var lp = LORE_PAGES.find(function(p){ return p.id === id; }) || { id: id, label: id, section: '' };
  var container = document.getElementById('lore-detail-content');
  container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic;padding:2rem 0">Loading…</p>';
  showPage('lore', false);
  if (pushState !== false) history.pushState({ type: 'lore', id: id }, '', '#lore-' + id);
  // Highlight sidebar
  document.querySelectorAll('.wiki-nav-link').forEach(function(l){ l.classList.remove('active'); });
  var loreNavLink = document.querySelector('.wiki-nav-link[data-lore="' + id + '"]');
  if (loreNavLink) loreNavLink.classList.add('active');

  var loadId = id; // capture to detect stale fetch
  fetch('lore/' + id + '.md')
    .then(function(r){ return r.ok ? r.text() : null; })
    .then(function(md) {
      // Discard if another navigation happened while fetching
      if (!document.getElementById('page-lore').classList.contains('active')) return;
      if (!md) {
        container.innerHTML = '<p style="color:var(--text-secondary);font-style:italic">No page found.</p>';
        return;
      }
      // Strip frontmatter, extract title + eyebrow + faq flag
      var titleMatch   = md.match(new RegExp('^title: *(.+)$', 'm'));
      var eyebrowMatch = md.match(new RegExp('^eyebrow: *(.+)$', 'm'));
      var isFaq        = /^faq: *true *$/m.test(md);
      var title   = titleMatch ? titleMatch[1].trim() : lp.label;
      var eyebrow = eyebrowMatch ? eyebrowMatch[1].trim() : (lp.section || 'Lore');
      var stripped = md.replace(new RegExp('^---[^]*?---\n'), '');

      var body;
      if (isFaq) {
        body = renderFaqMarkdown(stripped);
      } else {
        // marked renderer handles [link](id) → wiki-lore-link spans
        body = '<div class="wiki-md-content">' + marked.parse(stripped) + '</div>';
      }
      container.innerHTML =
        '<div class="wiki-intro-eyebrow">' + eyebrow + '</div>' +
        '<h1 class="wiki-intro-title">' + title + '</h1>' +
        body;
      renderWikiImages(container);
      // Wire lore links
      container.querySelectorAll('.wiki-lore-link').forEach(function(el) {
        el.style.cssText = 'color:var(--accent);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border-mid);';
        el.addEventListener('click', function(e) {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return; // let new-tab clicks through
          e.preventDefault();
          var t = this.getAttribute('data-target');
          var isLore = LORE_PAGES.find(function(p){ return p.id===t; });
          if (isLore) loadLorePage(t);
          else {
            // Try match by name (e.g. [Sin](sin)) then by numeric id
            var cByName = characters.find(function(c){ return c.name.toLowerCase() === t.toLowerCase(); });
            if (cByName) loadCharPage(cByName.id);
            else {
              var charId = parseInt(t);
              if (!isNaN(charId)) loadCharPage(charId);
            }
          }
        });
      });
    });
}
