<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sinverse — Admin</title>
<style>
  :root {
    --bg: #110d0b;
    --bg-panel: #1a1410;
    --bg-card: #201810;
    --border: rgba(196,154,120,0.12);
    --border-mid: rgba(196,154,120,0.25);
    --accent: #c49a78;
    --wine: #7a2233;
    --green: #5a9a6a;
    --amber: #c4963a;
    --text-primary: #f0e8df;
    --text-secondary: #b8a898;
    --text-muted: #7a6a5a;
    --font-caps: 'Cormorant SC', serif;
    --font-body: 'EB Garamond', serif;
    --radius: 4px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text-primary); font-family: var(--font-body); min-height: 100vh; padding: 2rem; }

  h1 { font-family: var(--font-caps); font-size: 1.4rem; letter-spacing: 0.2em; color: var(--accent); margin-bottom: 0.25rem; }
  .subtitle { font-family: var(--font-caps); font-size: 0.6rem; letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 2rem; }

  .summary-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1.25rem;
    min-width: 120px;
    text-align: center;
  }
  .summary-n { font-family: var(--font-caps); font-size: 1.6rem; color: var(--accent); }
  .summary-n.red  { color: var(--wine); }
  .summary-n.amber { color: var(--amber); }
  .summary-n.green { color: var(--green); }
  .summary-label { font-family: var(--font-caps); font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.2rem; }

  .module { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; overflow: hidden; }
  .module-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); }
  .module-name { font-family: var(--font-caps); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-secondary); flex: 1; }
  .module-status { font-family: var(--font-caps); font-size: 0.55rem; letter-spacing: 0.1em; }
  .status-ok     { color: var(--green); }
  .status-warn   { color: var(--amber); }
  .status-error  { color: var(--wine); }
  .status-loading { color: var(--text-muted); }

  .issue-list { padding: 0.5rem 0; }
  .issue { display: flex; gap: 0.75rem; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; align-items: baseline; }
  .issue:last-child { border-bottom: none; }
  .issue-sev { font-family: var(--font-caps); font-size: 0.5rem; letter-spacing: 0.08em; flex-shrink: 0; padding-top: 0.15rem; }
  .sev-error  { color: var(--wine); }
  .sev-warn   { color: var(--amber); }
  .sev-info   { color: var(--text-muted); }
  .issue-msg  { color: var(--text-secondary); line-height: 1.5; }
  .issue-msg code { font-family: monospace; font-size: 0.8rem; color: var(--accent); background: rgba(196,154,120,0.08); padding: 0.05rem 0.3rem; border-radius: 2px; }
  .no-issues { padding: 0.75rem 1rem; font-style: italic; color: var(--text-muted); font-size: 0.85rem; }

  .run-btn {
    font-family: var(--font-caps);
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius);
    color: var(--accent);
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2rem;
  }
  .run-btn:hover { border-color: var(--accent); background: rgba(196,154,120,0.08); }
</style>
</head>
<body>

<h1>Sinverse Admin</h1>
<p class="subtitle">Content health dashboard — not linked from the public site</p>

<button class="run-btn" id="run-btn">↻ Re-run checks</button>

<div class="summary-row" id="summary-row">
  <div class="summary-card"><div class="summary-n" id="sum-errors">—</div><div class="summary-label">Errors</div></div>
  <div class="summary-card"><div class="summary-n" id="sum-warnings">—</div><div class="summary-label">Warnings</div></div>
  <div class="summary-card"><div class="summary-n" id="sum-ok">—</div><div class="summary-label">Modules OK</div></div>
</div>

<div id="modules"></div>

<script>
const BASE = window.location.pathname.replace(/\/admin\/?$/, '/');

// ── Fetch helpers ─────────────────────────────────────────────
async function fetchJSON(path) {
  const r = await fetch(BASE + path);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + path);
  return r.json();
}
async function fetchText(path) {
  const r = await fetch(BASE + path);
  if (!r.ok) return null;
  return r.text();
}
async function exists(path) {
  try { const r = await fetch(BASE + path, {method:'HEAD'}); return r.ok; } catch { return false; }
}

// ── Module renderer ───────────────────────────────────────────
function renderModule(id, label, issues) {
  const el = document.getElementById('mod-' + id);
  const header = el.querySelector('.module-status');
  const body   = el.querySelector('.issue-list');

  const errors   = issues.filter(i => i.sev === 'error');
  const warnings = issues.filter(i => i.sev === 'warn');

  if (!issues.length) {
    header.textContent = '✓ All clear';
    header.className = 'module-status status-ok';
    body.innerHTML = '<div class="no-issues">No issues found.</div>';
  } else {
    header.textContent = (errors.length ? errors.length + ' error' + (errors.length > 1 ? 's' : '') : '') +
      (errors.length && warnings.length ? ' · ' : '') +
      (warnings.length ? warnings.length + ' warning' + (warnings.length > 1 ? 's' : '') : '');
    header.className = 'module-status ' + (errors.length ? 'status-error' : 'status-warn');
    body.innerHTML = issues.map(i =>
      '<div class="issue">' +
        '<span class="issue-sev sev-' + i.sev + '">' + i.sev.toUpperCase() + '</span>' +
        '<span class="issue-msg">' + i.msg + '</span>' +
      '</div>'
    ).join('');
  }
  return { errors: errors.length, warnings: warnings.length };
}

function issue(sev, msg) { return { sev, msg }; }
function err(msg)  { return issue('error', msg); }
function warn(msg) { return issue('warn',  msg); }
function info(msg) { return issue('info',  msg); }

// ── Shared integrity helpers ──────────────────────────────────
// Flags records sharing an id and records missing an id entirely.
// `label` is what the id collides on (for the message); `nameOf` pulls a
// human label for each record so the message is readable.
function checkIds(records, label, nameOf) {
  const issues = [];
  const seen = new Map();   // id -> [names]
  let missing = 0;
  records.forEach(r => {
    const id = r && r.id;
    if (id === undefined || id === null || id === '') { missing++; return; }
    const key = String(id);
    if (!seen.has(key)) seen.set(key, []);
    seen.get(key).push(nameOf ? nameOf(r) : key);
  });
  const dupes = [...seen.entries()].filter(([, names]) => names.length > 1);
  if (dupes.length) {
    issues.push(err(dupes.length + ' duplicate ' + label + ' id(s): ' +
      dupes.map(([id, names]) => '<code>' + id + '</code> (' + names.join(', ') + ')').join('; ')));
  }
  if (missing) issues.push(err(missing + ' ' + label + ' record(s) missing an id entirely'));
  return issues;
}

// The slug the wiki actually fetches for a character: explicit `wiki` field
// wins, otherwise a name-derived slug. Mirrors loadCharPage in the wiki.
function charSlug(c) {
  return c.wiki || (c.name || '').toLowerCase().replace(/\s+/g, '-');
}

// Canon factions — used to flag likely typos in faction tags.
const KNOWN_FACTIONS = ['SinCorp', 'The Paws', 'The Resistance', 'The Wilds'];

// Resolve a relationship handle to a character across canon + fan, mirroring the
// wiki's resolveCharLink: optional "canon:"/"fan:" prefix, match by name OR wiki
// slug (case-insensitive), canon first then fan. Fan characters flagged
// active:false are treated as absent. Returns { char, isFan } | null.
function resolveCharName(handle, canon, fan) {
  const raw = String(handle == null ? '' : handle).trim();
  const m = raw.match(/^\s*(canon|fan)\s*:\s*(.+)$/i);
  const set = m ? m[1].toLowerCase() : null;
  const key = (m ? m[2] : raw).trim().toLowerCase();
  const matches = x =>
    (x.name && x.name.toLowerCase() === key) ||
    (x.wiki && String(x.wiki).toLowerCase() === key) ||
    ((x.name || '').toLowerCase().replace(/\s+/g, '-') === key);
  const activeFan = (fan || []).filter(c => c.active !== false);
  let c = null, f = null;
  if (set === 'canon')      c = canon.find(matches);
  else if (set === 'fan')   f = activeFan.find(matches);
  else { c = canon.find(matches); if (!c) f = activeFan.find(matches); }
  if (c) return { char: c, isFan: false };
  if (f) return { char: f, isFan: true };
  return null;
}

// ── Checks ────────────────────────────────────────────────────
async function checkCharacters(chars) {
  const issues = checkIds(chars, 'character', c => c.name || '(unnamed)');

  // Portrait presence: a single clear flag for "no displayable image at all".
  // (The old build assumed a separate image/profile_image split that the
  //  current data model no longer enforces, so that sub-check was dropped.)
  const noPortrait = chars.filter(c => !c.image && !c.profile_image);
  if (noPortrait.length) issues.push(warn(noPortrait.length + ' character(s) with no image: ' + noPortrait.map(c => '<code>' + c.name + '</code>').join(', ')));

  // Wiki .md presence — resolved the way the wiki actually resolves it
  // (char.wiki || name-slug), so a custom `wiki` slug no longer false-flags.
  const missing = [];
  for (const c of chars) {
    const ok = await exists('wiki/characters/' + charSlug(c) + '.md');
    if (!ok) missing.push(c.name + ' → ' + charSlug(c) + '.md');
  }
  if (missing.length) issues.push(warn(missing.length + ' character(s) missing wiki .md file: ' + missing.map(n => '<code>' + n + '</code>').join(', ')));

  // Missing height — needed for size-ref scaling and the stats page.
  const noHeight = chars.filter(c => c.height == null || c.height === '');
  if (noHeight.length) issues.push(warn(noHeight.length + ' character(s) missing height: ' + noHeight.map(c => '<code>' + c.name + '</code>').join(', ')));

  // Faction hygiene — flag values outside the known set (usually a typo, or a
  // genuinely new faction that should be added to KNOWN_FACTIONS in this checker).
  const badFaction = new Set();
  chars.forEach(c => (c.faction || []).forEach(f => { if (KNOWN_FACTIONS.indexOf(f) === -1) badFaction.add(f); }));
  if (badFaction.size) issues.push(warn('Unrecognized faction value(s): ' + [...badFaction].map(f => '<code>' + f + '</code>').join(', ') + ' — typo, or add to the checker if new'));

  return issues;
}

// ── Fan characters ────────────────────────────────────────────
// Validates _data/fan-characters.json: ids, core fields, the active flag, the
// backing wiki .md (active ones only), and name collisions with canon.
async function checkFanCharacters(fan, canon, contribs) {
  const issues = checkIds(fan, 'fan character', c => c.name || '(unnamed)');
  if (!fan.length) { issues.push(info('No fan characters defined.')); return issues; }

  const canonNames = new Set((canon || []).map(c => (c.name || '').toLowerCase()));
  const contribIds = new Set((contribs || []).map(c => String(c.id).toLowerCase()));
  fan.forEach(c => {
    if (c.active !== undefined && typeof c.active !== 'boolean')
      issues.push(warn('Fan character <code>' + (c.name || c.id) + '</code> has a non-boolean <code>active</code> value'));
    if (c.height == null || c.height === '')
      issues.push(warn('Fan character <code>' + (c.name || c.id) + '</code> missing height'));
    if (!c.image && !c.profile_image)
      issues.push(info('Fan character <code>' + (c.name || c.id) + '</code> has no image'));
    if (canonNames.has((c.name || '').toLowerCase()))
      issues.push(info('Fan character <code>' + c.name + '</code> shares a name with a canon character — reference it as <code>fan:' + c.name + '</code> where it matters'));
    // Contributor avatar link must point at a real contributor id.
    if (c.contributor && !contribIds.has(String(c.contributor).toLowerCase()))
      issues.push(err('Fan character <code>' + c.name + '</code> has contributor <code>' + c.contributor + '</code>, which is not a known contributor id'));
  });

  // Active fan characters should have a backing .md; inactive ones are hidden
  // on purpose, so a missing file for them is fine.
  for (const c of fan) {
    if (c.active === false) continue;
    const ok = await exists('wiki/fan-characters/' + charSlug(c) + '.md');
    if (!ok) issues.push(warn('Fan character <code>' + c.name + '</code> missing wiki .md (wiki/fan-characters/' + charSlug(c) + '.md)'));
  }
  return issues;
}

// ── Relationships ─────────────────────────────────────────────
// Validates the relationship graph across canon + fan: every relationship name
// must resolve to a real (active) character, and same-set relationships are
// checked for reciprocity (one-directional links are reported as info, since
// fan→canon links are intentionally one-way).
function checkRelationships(canon, fan) {
  const issues = [];
  const activeFan = (fan || []).filter(c => c.active !== false);
  const all = canon.map(c => ({ c, isFan: false })).concat(activeFan.map(c => ({ c, isFan: true })));
  const relName = rel => rel && (typeof rel === 'string' ? rel : rel.name);

  // Dangling references
  all.forEach(({ c, isFan }) => {
    (c.relationships || []).forEach(rel => {
      const nm = relName(rel);
      const tag = isFan ? '[fan] ' : '';
      if (!nm) { issues.push(warn(tag + 'Character <code>' + c.name + '</code> has a relationship entry with no name')); return; }
      if (!resolveCharName(nm, canon, fan))
        issues.push(err(tag + 'Character <code>' + c.name + '</code> lists a relationship to <code>' + nm + '</code>, which resolves to no active character'));
    });
  });

  // Reciprocity for same-set pairs (canon↔canon, fan↔fan). Cross-set (fan→canon)
  // is expected to be one-way, so it's excluded from the noise.
  const listsBack = (fromChar, targetChar) => (fromChar.relationships || []).some(rel => {
    const t = resolveCharName(relName(rel), canon, fan);
    return t && t.char === targetChar;
  });
  const oneWay = [];
  all.forEach(({ c, isFan }) => {
    (c.relationships || []).forEach(rel => {
      const t = resolveCharName(relName(rel), canon, fan);
      if (t && t.isFan === isFan && !listsBack(t.char, c)) oneWay.push(c.name + ' → ' + t.char.name);
    });
  });
  if (oneWay.length) issues.push(info(oneWay.length + ' one-directional relationship(s) within the same set (fine if intentional): ' + oneWay.map(p => '<code>' + p + '</code>').join(', ')));

  return issues;
}

// ── Wiki links ────────────────────────────────────────────────
// Scans character, fan-character, and lore markdown for internal [label](target)
// links and flags bare-slug targets that don't resolve to a lore page, a
// character, or an era. External URLs, anchors, and image embeds are ignored.
async function checkWikiLinks(canon, fan, lorePages, validTargets) {
  const issues = [];
  const files = [];
  canon.forEach(c => files.push({ label: c.name, path: 'wiki/characters/' + charSlug(c) + '.md' }));
  (fan || []).forEach(c => { if (c.active !== false) files.push({ label: c.name + ' (fan)', path: 'wiki/fan-characters/' + charSlug(c) + '.md' }); });
  (lorePages || []).forEach(p => { if (!p.aliasOf) files.push({ label: 'lore/' + p.id, path: 'wiki/lore/' + p.id + '.md' }); });

  const linkRe = /\[[^\]]*\]\(([^)]+)\)/g;
  const broken = [];
  await Promise.all(files.map(async f => {
    const text = await fetchText(f.path);
    if (text == null) return;
    let m;
    while ((m = linkRe.exec(text)) !== null) {
      let target = m[1].trim();
      if (!target || target.startsWith('#') || /^https?:/i.test(target) || target.startsWith('mailto:') || target.startsWith('data:')) continue;
      const slug = target.split('#')[0].split('?')[0].replace(/\/+$/, '').split('/').pop().toLowerCase();
      if (slug && !validTargets.has(slug)) broken.push(f.label + ' → <code>' + m[1] + '</code>');
    }
  }));
  if (broken.length) issues.push(warn(broken.length + ' internal wiki link(s) that don\'t resolve to a page: ' + broken.slice(0, 50).join(', ') + (broken.length > 50 ? ', …' : '')));
  else issues.push(info('All internal wiki links resolve.'));
  return issues;
}

async function checkContributors(contribs, gallery, library, cyoa) {
  const issues = checkIds(contribs, 'contributor', c => c.name || c.id || '(unnamed)');
  const contribIds = new Set(contribs.map(c => c.id));
  // An artist/author may be a single id or an array (collab); flatten to ids.
  const idsOf = v => Array.isArray(v) ? v : (v != null ? [v] : []);

  // Gallery artists
  const badArtists = [...new Set(gallery.flatMap(g => idsOf(g.artist)).filter(a => a && !contribIds.has(a)))];
  if (badArtists.length) issues.push(err('Gallery references unknown contributor id(s): ' + badArtists.map(a => '<code>' + a + '</code>').join(', ')));

  // Library authors
  const libIds = library.flatMap(s => idsOf(s.author)).filter(Boolean);
  const badAuthors = [...new Set(libIds.filter(a => !contribIds.has(a)))];
  if (badAuthors.length) issues.push(err('Library references unknown contributor id(s): ' + badAuthors.map(a => '<code>' + a + '</code>').join(', ')));

  // CYOA authors (from all loaded adventures)
  const badCyoaAuthors = [...new Set(cyoa.filter(n => n.author && n.author !== 'Anonymous' && !contribIds.has(n.author)).map(n => n.author))];
  if (badCyoaAuthors.length) issues.push(err('CYOA references unknown contributor id(s): ' + badCyoaAuthors.map(a => '<code>' + a + '</code>').join(', ')));

  // Missing avatars
  const noAvatar = contribs.filter(c => !c.avatar);
  if (noAvatar.length) issues.push(info(noAvatar.length + ' contributor(s) missing avatar: ' + noAvatar.map(c => '<code>' + c.name + '</code>').join(', ')));

  return issues;
}

// Validates a record list's relates_to cross-links against the real id sets
// of both modules. Catches dangling targets (link renders as nothing) and
// self-links. `selfModule` is this list's own module name.
function checkRelations(records, selfModule, galleryIds, libraryIds) {
  const issues = [];
  const sets = { gallery: galleryIds, library: libraryIds };
  records.forEach(r => {
    (r.relates_to || []).forEach(rel => {
      if (!rel || !rel.module || rel.id == null) {
        issues.push(warn('[' + selfModule + '] item <code>' + r.id + '</code> has a malformed relates_to entry'));
        return;
      }
      const tid = parseInt(rel.id, 10);
      if (rel.module === selfModule && tid === r.id) {
        issues.push(info('[' + selfModule + '] item <code>' + r.id + '</code> links to itself in relates_to'));
        return;
      }
      const targetSet = sets[rel.module];
      if (!targetSet) {
        issues.push(warn('[' + selfModule + '] item <code>' + r.id + '</code> relates_to unknown module <code>' + rel.module + '</code>'));
      } else if (!targetSet.has(tid)) {
        issues.push(err('[' + selfModule + '] item <code>' + r.id + '</code> relates_to missing ' + rel.module + ' id <code>' + rel.id + '</code>'));
      }
    });
  });
  return issues;
}

// Validates each record's `lore` tags against the set of real lore-page ids
// from wiki/lore.json. A tag that doesn't resolve renders as a dead wiki link,
// so flag it. `loreIds` is the Set of valid ids.
function checkLore(records, selfModule, loreIds) {
  const issues = [];
  (records || []).forEach(r => {
    (r.lore || []).forEach(id => {
      if (typeof id !== 'string' || !id) {
        issues.push(warn('[' + selfModule + '] item <code>' + r.id + '</code> has a malformed lore tag'));
      } else if (!loreIds.has(id)) {
        issues.push(err('[' + selfModule + '] item <code>' + r.id + '</code> lore tag <code>' + id + '</code> has no matching page in lore.json'));
      }
    });
  });
  return issues;
}

async function checkGallery(gallery, galleryIds, libraryIds, loreIds) {
  const issues = checkIds(gallery, 'gallery', g => g.title || ('id ' + g.id));
  const noTitle = gallery.filter(g => !g.title);
  // scene needs `image`; charref may use `image` OR an `images` array (multiple
  // reference views) — exactly what the viewer accepts. comic/set are checked below.
  const hasCharrefImages = g => g.type === 'charref' && g.images && g.images.length;
  const noImage = gallery.filter(g => g.type !== 'comic' && g.type !== 'set' && !g.image && !hasCharrefImages(g));
  const noPages = gallery.filter(g => g.type === 'comic' && (!g.pages || !g.pages.length));
  const noSet   = gallery.filter(g => g.type === 'set' && (!g.images || !g.images.length));
  if (noTitle.length) issues.push(warn(noTitle.length + ' gallery item(s) missing title (ids: ' + noTitle.map(g => g.id).join(', ') + ')'));
  if (noImage.length) issues.push(err(noImage.length + ' single gallery item(s) missing image URL (ids: ' + noImage.map(g => g.id).join(', ') + ')'));
  if (noPages.length) issues.push(err(noPages.length + ' comic(s) with no pages (ids: ' + noPages.map(g => g.id).join(', ') + ')'));
  if (noSet.length)   issues.push(err(noSet.length + ' set(s) with no images (ids: ' + noSet.map(g => g.id).join(', ') + ')'));
  issues.push(...checkRelations(gallery, 'gallery', galleryIds, libraryIds));
  issues.push(...checkLore(gallery, 'gallery', loreIds));
  return issues;
}

async function checkLibrary(library, galleryIds, libraryIds, loreIds) {
  const issues = checkIds(library, 'library', s => s.title || ('id ' + s.id));
  for (const story of library) {
    if (story.file) {
      const ok = await exists('library/' + story.file);
      if (!ok) issues.push(err('Story file not found: <code>' + story.file + '</code> (id: ' + story.id + ')'));
    }
    if (story.chapters) {
      for (const ch of story.chapters) {
        if (ch.file) {
          const ok = await exists('library/' + ch.file);
          if (!ok) issues.push(err('Chapter file not found: <code>' + ch.file + '</code> (story id: ' + story.id + ')'));
        }
      }
    }
  }
  issues.push(...checkRelations(library, 'library', galleryIds, libraryIds));
  issues.push(...checkLore(library, 'library', loreIds));
  return issues;
}

async function checkCYOA(manifest) {
  const issues = checkIds(manifest, 'cyoa adventure', a => a.title || a.id || '(untitled)');
  let allNodes = [];

  for (const adv of manifest) {
    let nodes = [], mdText = null;
    try {
      nodes = await fetchJSON('cyoa/adventures/' + adv.id + '.json');
    } catch(e) {
      issues.push(err('Adventure JSON not found: <code>cyoa/adventures/' + adv.id + '.json</code>'));
      continue;
    }

    mdText = await fetchText('cyoa/adventures/' + adv.id + '.md');
    const mdIds = new Set();
    if (mdText) {
      mdText.split(/^## /m).forEach(s => {
        const id = s.split('\n')[0].trim();
        if (id) mdIds.add(id);
      });
    } else {
      issues.push(err('Adventure markdown not found: <code>cyoa/adventures/' + adv.id + '.md</code>'));
    }

    // Duplicate node ids within this adventure — silently collapsed by the
    // routing Set, so two nodes sharing an id means one is unreachable.
    const nodeSeen = new Map();
    nodes.forEach(n => {
      const k = String(n.id);
      nodeSeen.set(k, (nodeSeen.get(k) || 0) + 1);
    });
    const dupNodes = [...nodeSeen.entries()].filter(([, n]) => n > 1).map(([id]) => id);
    if (dupNodes.length) issues.push(err('[' + adv.id + '] duplicate node id(s): ' + dupNodes.map(i => '<code>' + i + '</code>').join(', ')));

    const nodeIds = new Set(nodes.map(n => String(n.id)));

    // Nodes missing from md
    for (const n of nodes) {
      if (mdText && !mdIds.has(String(n.id))) {
        issues.push(warn('[' + adv.id + '] Node <code>' + n.id + '</code> has no text in .md'));
      }
    }

    // nextId references to nonexistent nodes
    for (const n of nodes) {
      for (const c of (n.choices || [])) {
        if (c.nextId !== null && c.nextId !== undefined && !nodeIds.has(String(c.nextId))) {
          issues.push(err('[' + adv.id + '] Node <code>' + n.id + '</code> choice "' + c.text + '" points to missing node <code>' + c.nextId + '</code>'));
        }
      }
    }

    allNodes = allNodes.concat(nodes);
  }

  return { issues, nodes: allNodes };
}

// ── Stash ─────────────────────────────────────────────────────
// Self-contained module (stash/stash.json). Validates ids, basic content, and
// relates_to integrity: in-stash targets must exist; external {module,id}
// cross-links must point at gallery/library and resolve there.
function checkStash(stash, galleryIds, libraryIds) {
  const issues = checkIds(stash, 'stash', s => s.title || ('id ' + s.id));
  const stashIds = new Set(stash.map(s => s.id).filter(v => v != null));
  const noTitle = stash.filter(s => !s.title);
  if (noTitle.length) issues.push(warn(noTitle.length + ' stash item(s) missing title (ids: ' + noTitle.map(s => s.id).join(', ') + ')'));
  // Stash images come in three shapes, mirroring the gallery: a comic (pages[]),
  // a set (images[]), or a single image (image). Flag each only for its own
  // missing content, not for lacking a single `image` field it never uses.
  const imgItems = stash.filter(s => s.kind === 'image');
  const noSingle = imgItems.filter(s => !(s.pages && s.pages.length) && !(s.images && s.images.length) && !s.image);
  const emptyComic = imgItems.filter(s => s.pages && !s.pages.length);
  const emptySet   = imgItems.filter(s => s.images && !s.images.length);
  if (noSingle.length)   issues.push(err(noSingle.length + ' stash image(s) missing image URL (ids: ' + noSingle.map(s => s.id).join(', ') + ')'));
  if (emptyComic.length) issues.push(err(emptyComic.length + ' stash comic(s) with no pages (ids: ' + emptyComic.map(s => s.id).join(', ') + ')'));
  if (emptySet.length)   issues.push(err(emptySet.length + ' stash set(s) with no images (ids: ' + emptySet.map(s => s.id).join(', ') + ')'));

  stash.forEach(s => {
    (s.relates_to || []).forEach(rel => {
      // External cross-link: { module: 'gallery'|'library', id }
      if (rel && typeof rel === 'object' && rel.module) {
        const sets = { gallery: galleryIds, library: libraryIds };
        const set = sets[rel.module];
        const tid = parseInt(rel.id, 10);
        if (!set) issues.push(warn('[stash] item <code>' + s.id + '</code> relates_to unknown module <code>' + rel.module + '</code>'));
        else if (!set.has(tid)) issues.push(err('[stash] item <code>' + s.id + '</code> relates_to missing ' + rel.module + ' id <code>' + rel.id + '</code>'));
      } else {
        // In-stash reference: bare id or { id }
        const tid = parseInt((rel && typeof rel === 'object') ? rel.id : rel, 10);
        if (isNaN(tid)) issues.push(warn('[stash] item <code>' + s.id + '</code> has a malformed relates_to entry'));
        else if (!stashIds.has(tid)) issues.push(err('[stash] item <code>' + s.id + '</code> relates_to missing stash id <code>' + tid + '</code>'));
      }
    });
  });
  return issues;
}

// ── Wiki ──────────────────────────────────────────────────────
// Validates the three wiki data files together: lore.json (page manifest),
// eras.json, and timeline.json. Checks ids, that each lore page has a .md
// file, and that every timeline entry's era resolves to a real era.
async function checkWiki(lorePages, eras, timeline) {
  const issues = [];
  issues.push(...checkIds(lorePages, 'lore page', p => p.label || p.id));
  issues.push(...checkIds(eras, 'era', e => e.name || e.id));
  issues.push(...checkIds(timeline, 'timeline event', t => t.title || t.id));

  // Each lore page should have a backing markdown file.
  for (const p of lorePages) {
    if (p.aliasOf) continue; // alias entries reuse another page's file
    const ok = await exists('wiki/lore/' + p.id + '.md');
    if (!ok) issues.push(warn('Lore page <code>' + p.id + '</code> has no markdown file (wiki/lore/' + p.id + '.md)'));
  }

  // Timeline events reference eras; flag any era id that doesn't exist.
  const eraIds = new Set((eras || []).map(e => e.id).filter(Boolean));
  // eras.json ids are like "pre-sin"; timeline uses an `era` key — only flag
  // when it clearly doesn't match any known era id or era-name slug.
  const eraSlugs = new Set([...eraIds]);
  (eras || []).forEach(e => { if (e.name) eraSlugs.add(String(e.name).toLowerCase().replace(/\s+/g, '-')); });
  (timeline || []).forEach(t => {
    if (t.era && !eraIds.has(t.era) && !eraSlugs.has(String(t.era).toLowerCase())) {
      issues.push(warn('Timeline event <code>' + (t.id || t.title) + '</code> references unknown era <code>' + t.era + '</code>'));
    }
  });
  return issues;
}

// ── Size Ref ──────────────────────────────────────────────────
// Validates the size-reference data: objects.json (props) and the silhouette
// list in defaults.json. Checks ids and required display fields.
function checkSizeref(objects, defaults) {
  const issues = checkIds(objects, 'sizeref object', o => o.label || o.id);
  objects.forEach(o => {
    if (!o.label) issues.push(warn('Sizeref object <code>' + o.id + '</code> missing label'));
    if (o.height == null) issues.push(err('Sizeref object <code>' + o.id + '</code> missing height'));
    if (!o.image) issues.push(warn('Sizeref object <code>' + o.id + '</code> missing image'));
  });
  const sils = (defaults && defaults.height_silhouettes) || [];
  issues.push(...checkIds(sils, 'silhouette', s => s.label || s.id));
  sils.forEach(s => {
    if (!s.url) issues.push(warn('Silhouette <code>' + s.id + '</code> missing url'));
  });
  return issues;
}

// ── Community ─────────────────────────────────────────────────
// Validates community.json: announcements, the platform signpost, and the
// contact form's Google Form wiring.
function checkCommunity(data) {
  const issues = [];
  if (!data || !Object.keys(data).length) {
    issues.push(warn('community.json is empty or missing'));
    return issues;
  }
  const ann = data.announcements || [];
  issues.push(...checkIds(ann, 'announcement', a => a.title || ('id ' + a.id)));
  const okLevels = ['info', 'important', 'critical'];
  ann.forEach(a => {
    if (a.level && okLevels.indexOf(String(a.level).toLowerCase()) === -1) {
      issues.push(warn('Announcement <code>' + (a.id || a.title) + '</code> has unknown level <code>' + a.level + '</code>'));
    }
    if (!a.date) issues.push(warn('Announcement <code>' + (a.id || a.title) + '</code> has no date'));
  });

  const platforms = data.platforms || [];
  // Platform ids are strings; checkIds handles dup/missing on the id field.
  issues.push(...checkIds(platforms, 'platform', p => p.label || p.id));
  const okStatus = ['up', 'standby', 'down'];
  const okRoles  = ['primary', 'fallback', 'beacon'];
  platforms.forEach(p => {
    if (p.status && okStatus.indexOf(String(p.status).toLowerCase()) === -1) {
      issues.push(err('Platform <code>' + p.id + '</code> has invalid status <code>' + p.status + '</code> (expected up/standby/down)'));
    }
    if (p.role && okRoles.indexOf(String(p.role).toLowerCase()) === -1) {
      issues.push(warn('Platform <code>' + p.id + '</code> has unknown role <code>' + p.role + '</code>'));
    }
    if (!p.url || /REPLACE_ME/.test(p.url)) {
      issues.push(warn('Platform <code>' + p.id + '</code> has a missing or placeholder URL'));
    }
  });
  const primaries = platforms.filter(p => p.role === 'primary').length;
  if (platforms.length && primaries === 0) issues.push(warn('No platform is marked role "primary"'));
  if (primaries > 1) issues.push(warn(primaries + ' platforms marked "primary" (expected one)'));

  // Contact form: if a Google Form action is set, every field needs an entry id.
  const contact = data.contact || {};
  if (contact.enabled !== false) {
    const action = contact.google_form_action || '';
    if (!action) {
      issues.push(warn('Contact form has no google_form_action set'));
    } else if (!/\/formResponse$/.test(action) || /REPLACE/.test(action)) {
      issues.push(err('Contact google_form_action looks wrong (should end in /formResponse and contain no placeholder)'));
    }
    const fields = contact.fields || [];
    const noEntry = fields.filter(f => !f.entry || /REPLACE/.test(f.entry));
    if (action && noEntry.length) {
      issues.push(err(noEntry.length + ' contact field(s) missing a Google Form entry id: ' + noEntry.map(f => '<code>' + f.name + '</code>').join(', ')));
    }
    // Duplicate entry ids would send two answers to one question.
    const seen = {}, dupes = [];
    fields.forEach(f => { if (f.entry) { if (seen[f.entry]) dupes.push(f.entry); seen[f.entry] = true; } });
    if (dupes.length) issues.push(err('Duplicate contact entry id(s): ' + dupes.map(d => '<code>' + d + '</code>').join(', ')));
  }
  return issues;
}

// ── Main runner ────────────────────────────────────────────────
async function run() {
  document.getElementById('run-btn').disabled = true;
  document.getElementById('run-btn').textContent = 'Running…';
  document.querySelectorAll('.module-status').forEach(el => {
    el.textContent = 'Checking…';
    el.className = 'module-status status-loading';
  });
  document.querySelectorAll('.issue-list').forEach(el => el.innerHTML = '');

  let totalErrors = 0, totalWarnings = 0, totalOk = 0;

  // Load core data
  const [chars, contribs, gallery, library, cyoaManifest, lorePages, eras, timeline, stash, srObjects, srDefaults, community, fanChars] = await Promise.all([
    fetchJSON('_data/characters.json').catch(() => []),
    fetchJSON('contributors/contributors.json').catch(() => []),
    fetchJSON('gallery/gallery.json').catch(() => []),
    fetchJSON('library/library.json').catch(() => []),
    fetchJSON('cyoa/cyoa.json').catch(() => []),
    fetchJSON('wiki/lore.json').catch(() => []),
    fetchJSON('wiki/eras.json').catch(() => []),
    fetchJSON('wiki/timeline.json').catch(() => []),
    fetchJSON('stash/stash.json').catch(() => []),
    fetchJSON('sizeref/objects.json').catch(() => []),
    fetchJSON('sizeref/defaults.json').catch(() => ({})),
    fetchJSON('community/community.json').catch(() => ({})),
    fetchJSON('_data/fan-characters.json').catch(() => []),
  ]);

  const cyoaResult = await checkCYOA(cyoaManifest);
  const cyoaNodes  = cyoaResult.nodes;

  // id sets used to validate relates_to cross-links between modules
  const galleryIds = new Set(gallery.map(g => g.id).filter(v => v != null));
  const libraryIds = new Set(library.map(s => s.id).filter(v => v != null));
  // valid lore-page ids, for validating gallery/library `lore` tags
  const loreIds = new Set((lorePages || []).map(p => p.id).filter(Boolean));

  // Valid internal wiki-link targets (bare slugs): lore page ids, character
  // slugs (canon + fan), and era ids / name-slugs.
  const validTargets = new Set();
  (lorePages || []).forEach(p => { if (p.id) validTargets.add(String(p.id).toLowerCase()); });
  chars.forEach(c => validTargets.add(charSlug(c).toLowerCase()));
  (fanChars || []).forEach(c => validTargets.add(charSlug(c).toLowerCase()));
  (eras || []).forEach(e => {
    if (e.id) validTargets.add(String(e.id).toLowerCase());
    if (e.name) validTargets.add(String(e.name).toLowerCase().replace(/\s+/g, '-'));
  });

  const checks = [
    { id: 'characters',     fn: () => checkCharacters(chars) },
    { id: 'fan-characters', fn: () => checkFanCharacters(fanChars, chars, contribs) },
    { id: 'relationships',  fn: () => Promise.resolve(checkRelationships(chars, fanChars)) },
    { id: 'contributors',   fn: () => checkContributors(contribs, gallery, library, cyoaNodes) },
    { id: 'gallery',        fn: () => checkGallery(gallery, galleryIds, libraryIds, loreIds) },
    { id: 'library',        fn: () => checkLibrary(library, galleryIds, libraryIds, loreIds) },
    { id: 'cyoa',           fn: () => Promise.resolve(cyoaResult.issues) },
    { id: 'wiki',           fn: () => checkWiki(lorePages, eras, timeline) },
    { id: 'wiki-links',     fn: () => checkWikiLinks(chars, fanChars, lorePages, validTargets) },
    { id: 'stash',          fn: () => checkStash(stash, galleryIds, libraryIds) },
    { id: 'sizeref',        fn: () => checkSizeref(srObjects, srDefaults) },
    { id: 'community',      fn: () => Promise.resolve(checkCommunity(community)) },
  ];

  for (const c of checks) {
    const issues = await c.fn();
    const res = renderModule(c.id, c.id, issues);
    totalErrors   += res.errors;
    totalWarnings += res.warnings;
    if (!res.errors && !res.warnings) totalOk++;
  }

  const sumE = document.getElementById('sum-errors');
  const sumW = document.getElementById('sum-warnings');
  const sumO = document.getElementById('sum-ok');
  sumE.textContent = totalErrors;
  sumW.textContent = totalWarnings;
  sumO.textContent = totalOk + ' / ' + checks.length;
  sumE.className = 'summary-n ' + (totalErrors   ? 'red'   : 'green');
  sumW.className = 'summary-n ' + (totalWarnings ? 'amber' : 'green');
  sumO.className = 'summary-n ' + (totalOk === checks.length ? 'green' : 'amber');

  document.getElementById('run-btn').disabled = false;
  document.getElementById('run-btn').textContent = '↻ Re-run checks';
}

// ── Build module shells ────────────────────────────────────────
const MODULES = [
  { id: 'characters',     label: 'Characters' },
  { id: 'fan-characters', label: 'Fan Characters' },
  { id: 'relationships',  label: 'Relationships' },
  { id: 'contributors',   label: 'Contributors' },
  { id: 'gallery',        label: 'Gallery' },
  { id: 'library',        label: 'Library' },
  { id: 'cyoa',           label: 'CYOA' },
  { id: 'wiki',           label: 'Wiki' },
  { id: 'wiki-links',     label: 'Wiki Links' },
  { id: 'stash',          label: 'Stash' },
  { id: 'sizeref',        label: 'Size Ref' },
  { id: 'community',      label: 'Community' },
];

const container = document.getElementById('modules');
MODULES.forEach(m => {
  container.innerHTML +=
    '<div class="module" id="mod-' + m.id + '">' +
      '<div class="module-header">' +
        '<span class="module-name">' + m.label + '</span>' +
        '<span class="module-status status-loading">Waiting…</span>' +
      '</div>' +
      '<div class="issue-list"></div>' +
    '</div>';
});

document.getElementById('run-btn').addEventListener('click', run);
run();
</script>
